# WP0 dev infra. Postgres ships with pgvector (ADR-0007/0021); River uses the
# same Postgres. Pin by digest before CI (architecture/09).
services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: margince
      POSTGRES_PASSWORD: margince
      POSTGRES_DB: margince
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
  minio:
    image: minio/minio:latest
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    ports: ["9000:9000", "9001:9001"]
    volumes: ["minio-data:/data"]
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 10
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_started
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 minioadmin minioadmin; do sleep 1; done;
      mc mb --ignore-existing local/transcripts;
      echo 'bucket transcripts ready';
      "
volumes:
  pgdata: {}
  minio-data: {}
