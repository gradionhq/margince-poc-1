name: SonarQube

# Cost control: SonarQube Cloud analysis runs ONLY on promotion PRs — those
# targeting `staging` (main -> staging) or `production` (staging -> production).
# Regular feature -> main PRs are NOT scanned. Draft PRs are skipped per the job
# guard below, matching the CI workflow. Exclusions live in sonar-project.properties
# and mirror the .coderabbit.yaml ignore rules.
on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [staging, production]

jobs:
  sonarqube:
    name: sonarqube
    # Skip draft PRs — only scan once a promotion PR is ready.
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          # Full history so SonarQube computes new-code / blame accurately.
          fetch-depth: 0
      - name: SonarQube scan
        uses: SonarSource/sonarqube-scan-action@713881670b6b3676cda39549040e2d88c70d582e  # v8.2.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          # SonarQube Cloud host. Use https://sonarqube.com if your org is on the
          # newer domain; https://sonarcloud.io for the classic one.
          SONAR_HOST_URL: https://sonarcloud.io
