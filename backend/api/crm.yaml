  # -------------------------- /relationships --------------------------------
  /relationships:
    get:
      tags: [Relationships]
      operationId: listRelationships
      summary: List relationships (employment, deal_stakeholder, or partner edges).
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/IncludeArchived'
        - name: kind
          in: query
          schema: { type: string, enum: [employment, deal_stakeholder, partner_of, referred_by, co_sell_with] }
        - name: person_id
          in: query
          schema: { type: string, format: uuid }
        - name: organization_id
          in: query
          schema: { type: string, format: uuid }
        - name: deal_id
          in: query
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: A page of relationships.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RelationshipListResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
    post:
      tags: [Relationships]
      operationId: createRelationship
      summary: Create a relationship edge (employment or deal stakeholder).
      description: |
        `employment` requires person_id + organization_id; `deal_stakeholder` requires
        deal_id + person_id. At most one current-primary employer per person.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateRelationshipRequest' }
            examples:
              employment:
                value:
                  kind: employment
                  person_id: 018f3a1b-0000-7000-8000-000000000010
                  organization_id: 018f3a1b-0000-7000-8000-000000000020
                  role: vp_engineering
                  is_current_primary: true
                  source: ui
                  captured_by: 'human:018f3a1b-0000-7000-8000-000000000001'
              stakeholder:
                value:
                  kind: deal_stakeholder
                  deal_id: 018f3a1b-0000-7000-8000-000000000030
                  person_id: 018f3a1b-0000-7000-8000-000000000010
                  role: champion
                  source: ui
                  captured_by: 'human:018f3a1b-0000-7000-8000-000000000001'
      responses:
        '201':
          description: Created relationship.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Relationship' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '409': { $ref: '#/components/responses/Conflict' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /relationships/{id}:
    parameters:
