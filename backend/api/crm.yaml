  # ------------------------------ /invoices ---------------------------------
  /invoices:
    get:
      tags: [Invoices]
      operationId: listInvoices
      summary: List invoices (cursor-paginated).
      x-mcp-tool: { verb: search_records, record_type: invoice, tier: green }
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: A page of invoices.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/InvoiceListResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
    post:
      tags: [Invoices]
      operationId: generateInvoice
      summary: Generate an invoice from an accepted offer.
      description: |
        Derives net/tax/gross_minor and currency from the referenced offer — those fields
        are NOT accepted from the caller. The offer must be in `accepted` status (409 otherwise).
        invoice_number must be unique per workspace (409 on collision).
      x-mcp-tool: { verb: create_record, record_type: invoice, tier: green }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/GenerateInvoiceRequest' }
            examples:
              minimal:
                value:
                  offer_id: '018f3a1b-0000-7000-8000-000000000010'
                  invoice_number: INV-2026-001
                  source: ui
                  captured_by: 'human:018f3a1b-0000-7000-8000-000000000001'
      responses:
        '201':
          description: Generated invoice (totals derived from the offer snapshot).
          headers:
            Location: { schema: { type: string } }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Invoice' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404':
          description: The referenced offer was not found.
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }
              examples:
                offer_not_found:
                  value:
                    type: 'https://errors.margince.com/not_found'
                    title: Not Found
                    status: 404
                    code: not_found
                    detail: The referenced offer was not found.
        '409':
          description: Offer not accepted, duplicate invoice number, or reconciliation mismatch.
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }
              examples:
                offer_not_accepted:
                  value:
                    type: 'https://errors.margince.com/offer_not_accepted'
                    title: Offer Not Accepted
                    status: 409
                    code: offer_not_accepted
                    detail: The offer must be in accepted status to generate an invoice.
                invoice_number_duplicate:
                  value:
                    type: 'https://errors.margince.com/invoice_number_duplicate'
                    title: Duplicate Invoice Number
                    status: 409
                    code: invoice_number_duplicate
                    detail: An invoice with this number already exists in the workspace.
        '422': { $ref: '#/components/responses/ValidationError' }

  /invoices/{id}:
    parameters:
      - $ref: '#/components/parameters/Id'
    get:
      tags: [Invoices]
      operationId: getInvoice
      summary: Get an invoice by id.
      x-mcp-tool: { verb: read_record, record_type: invoice, tier: green }
      responses:
        '200':
          description: The invoice.
          content:
