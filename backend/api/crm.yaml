          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }
        '401':
          description: Unauthenticated.

  # ------------------------------ /deal-rooms --------------------------------

  /deal-rooms/{id}/publish:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    post:
      tags: [DealRooms]
      operationId: publishDealRoom
      summary: Publish a deal room (internal — requires deal_room/publish grant). Refused when consent_state ∉ {granted}.
      description: |
        Sets `published_at = now()` on the deal room. Refused with 409 when `consent_state`
        is `pending` or `revoked` (the disclosed-consent gate). Writes exactly one `audit_log`
        entry (action=publish). Idempotent if already published (returns the room unchanged
        with 200). Requires the `deal_room/publish` RBAC grant — gated under `workspaceWrap →
        requireAuth` with an explicit RBAC check.
      responses:
        '200':
          description: The deal room after publish (published_at set).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DealRoom' }
        '409':
          description: Consent not granted — publish refused.
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }
              examples:
                consent_not_granted:
                  value:
                    type: 'https://errors.margince.com/consent_not_granted'
                    title: Consent Not Granted
                    status: 409
                    code: consent_not_granted
                    detail: The deal room cannot be published until consent_state is granted.
        '404': { $ref: '#/components/responses/NotFound' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /deal-rooms/by-token:
    get:
      tags: [DealRooms]
      operationId: resolveDealRoomByToken
      summary: Resolve a published deal room by its access token (unauthenticated public accessor).
      description: |
        Returns the deal room only when all three conditions hold: the room is published
        (`published_at IS NOT NULL`), `consent_state = 'granted'`, and the presented
        `access_token` matches. Any other condition returns 404 — never leaks existence.
        This endpoint is unauthenticated (no RBAC) — it is the external read path for
        recipients of a published deal-room link.
      security: []
      parameters:
        - name: token
          in: query
          required: true
          schema: { type: string }
          description: The access_token for the deal room.
        - name: workspace_id
          in: query
          required: true
          schema: { type: string, format: uuid }
          description: The workspace the deal room belongs to.
      responses:
        '200':
          description: The published, consent-granted deal room.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DealRoom' }
        '404':
          description: No published, consent-granted room found for this token + workspace.
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }

  # ---------------------------- /attachments ---------------------------------
  # RD-WIRE-1 — object-store reference metadata; bytes via presigned blob-seam
  # URLs (ADR-0051), never the JSON API. Mirrors the existing `attachment`
  # table (migration 000009_lists_tags_attachments.up.sql).
  /attachments:
    get:
      tags: [Attachments]
      operationId: listAttachments
      summary: List attachments (object-store references; cursor-paginated, filterable by entity).
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/IncludeArchived'
        - name: entity_type
          in: query
          schema: { type: string, enum: [person, organization, deal, lead, activity] }
          description: Filter to attachments bound to an entity type (with entity_id).
        - name: entity_id
          in: query
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: A page of attachments.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AttachmentListResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
    post:
      tags: [Attachments]
      operationId: createAttachment
      summary: Register attachment metadata and mint a presigned upload URL.
      description: |
        Two-phase upload (ADR-0051): this call registers the file's metadata against a
        record and returns `upload_url`, a presigned URL the client PUTs the bytes to
        directly against the blob-storage seam — bytes never ride this JSON call. The row
        starts `scan_status: scanning`; `download_url` on a later `getAttachment`/
        `listAttachments` read is populated once the virus scan completes clean
        (RD-PARAM-5).
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateAttachmentRequest' }
            examples:
              minimal:
                value:
                  entity_type: deal
                  entity_id: 018f3a1b-0000-7000-8000-0000000000c9
                  filename: contract.pdf
                  content_type: application/pdf
                  byte_size: 245678
                  source: ui
                  captured_by: 'human:018f3a1b-0000-7000-8000-000000000001'
      responses:
        '201':
          description: Created attachment (metadata registered; upload_url set).
          headers:
            Location: { schema: { type: string } }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Attachment' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /attachments/{id}:
    parameters:
      - $ref: '#/components/parameters/Id'
    get:
      tags: [Attachments]
      operationId: getAttachment
      summary: Get an attachment by id.
      responses:
        '200':
          description: The attachment.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Attachment' }
        '404': { $ref: '#/components/responses/NotFound' }
    delete:
      tags: [Attachments]
      operationId: archiveAttachment
      summary: Archive (soft-delete) an attachment.
      responses:
        '200':
          description: Archived attachment.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Attachment' }
        '404': { $ref: '#/components/responses/NotFound' }

  # -------------------- /organizations/{id}/hierarchy-rollup -----------------
  # RD-WIRE-4 — RD-FORM-1 tree roll-up read over the existing `parent_org_id`
  # self-FK (people-and-organizations chapter owns the column + cycle guard;
  # this operation owns the read of what rolls up over it). No backing table —
  # a computed/projected read.
  /organizations/{id}/hierarchy-rollup:
    parameters:
      - $ref: '#/components/parameters/Id'
    get:
      tags: [Organizations]
      operationId: getOrganizationHierarchyRollup
      summary: Roll up an organization's account tree (RD-FORM-1) — weighted pipeline, closed-won, 30-day activity count.
      description: |
        `roll-up(node) = self(node) + Σ roll-up(child)` over readable children, traversed via
        a bounded indexed recursive query (RD-PARAM-1, p95 < 200ms for ≤200-org trees). A
        child the caller cannot read contributes nothing and is named in
        `restricted_excluded` — never silently summed (RD-AC-1). All money is base-currency
        converted (DM-FX-4); a missing stored FX rate fails the whole read with
        `422 fx_rate_unavailable` rather than substituting a rate of 1 (mirrors
        `getPipelineRollup`, DEAL-WIRE-8).
      parameters:
        - name: scope
          in: query
          schema: { type: string, enum: [tree, self], default: tree }
          description: 'tree (default): aggregate the whole subtree. self: return self(root) alone.'
      responses:
        '200':
          description: The organization's hierarchy roll-up.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OrganizationHierarchyRollup' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422':
          description: A stored FX rate is unavailable for a node's currency.
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }
              examples:
                fxUnavailable:
                  value:
                    type: 'https://errors.margince.com/fx_rate_unavailable'
                    title: FX rate unavailable
                    status: 422
                    code: fx_rate_unavailable
                    detail: No stored FX rate for USD as of 2026-06-04.

  # ------------------------------- /field-history -----------------------------
  # RD-WIRE-5 — per-field diff projection over audit_log.before/after
  # (RD-AC-5). Distinct from the existing whole-mutation `getRecordHistory`
  # (/records/{entity_type}/{id}/history): that reads back one rendered
  # plain-language summary line per audit_log row; this groups by *field* with
  # actor/field filters and cursor pagination, matching the field-history
  # screen's per-field diff-timeline shape (AC-field-history-1..8). No backing
  # table — a computed/projected read over the same append-only spine.
  /field-history:
    get:
      tags: [Audit]
      operationId: getFieldHistory
      summary: Per-field change history for a record, reconstructed from audit_log before/after diffs.
      description: |
        Returns one entry per field change, newest first, for the given `entity_type` +
        `entity_id`. A field masked by RBAC/PII rules is withheld identically to how its
        live value would be withheld — this read inherits the same field-masking the
        record's own GET applies (no separate masking mechanism). Agent-authored changes
        additionally carry `passport_id`/`evidence` when present (RD-AC-5). Returns
        `200 {data:[]}` for a record with no matching history (including a nonexistent or
        out-of-RBAC-scope id), mirroring `getRecordHistory`'s honest-empty behavior.
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
        - name: entity_type
          in: query
          required: true
          schema: { type: string, enum: [person, organization, deal, lead, activity] }
        - name: entity_id
          in: query
          required: true
          schema: { type: string, format: uuid }
        - name: field
          in: query
          schema: { type: string }
          description: Filter to one field name (AC-field-history-4).
        - name: actor_type
          in: query
          schema: { type: string, enum: [human, agent, system, connector] }
          description: Filter by actor category (AC-field-history-3).
      responses:
        '200':
          description: A page of per-field change entries (empty when none).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FieldHistoryListResponse' }
        '403': { $ref: '#/components/responses/Forbidden' }

  # ------------------------------ /custom-fields -----------------------------
  /custom-fields:
    get:
      tags: [CustomFields]
      operationId: listCustomFields
      summary: List custom fields for an object (admin read; includes retired by default).
      description: |
        CUSTOM-FIELDS-WIRE-1. Unlike a normal resource list, this admin view returns both
        active and retired fields by default — `status` narrows to one lifecycle state.
        Backs the custom-fields admin field table (custom-fields.md).
      x-mcp-tool: { verb: search_records, record_type: custom_field, tier: green }
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Sort'
        - name: object
          in: query
          required: true
          schema: { type: string, enum: [person, organization, deal, lead, activity] }
          description: Target core object (CUSTOM-FIELDS-PARAM-2).
        - name: status
          in: query
          schema: { type: string, enum: [active, retired] }
          description: >-
            Filter to one lifecycle state. Omitted returns both active and retired — this
            admin list intentionally does not default-exclude retired rows.
      responses:
        '200':
          description: A page of custom fields for the given object.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CustomFieldListResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
    post:
      tags: [CustomFields]
      operationId: createCustomField
      summary: Define a new custom field on an existing core object (🟡 — a schema change).
      description: |
        CUSTOM-FIELDS-WIRE-2. Stages the governed engine's single-transaction add (schema
        change + catalog row + one audit entry, custom-fields.md). Always 🟡 — schema
        changes are never 🟢 — so an agent caller must supply `X-Approval-Token`, exactly
        like `mergePerson` and `advanceDeal`'s closed-won transition; a human's direct call
        is itself the approval (API-CONV-10). `column_name` is server-derived and never
        client-supplied. When the validated `label`/`type`/`object` combination is judged
        structural — a new object, a relationship, or logic, never one of the six closed
        types on one of the five closed objects — the request is refused with a
        `structural_change_refused` 422 (see the example below). The actual
        structural-detection judgment (parsing the label for words like
        "object"/"relationship"/"link to") is a handler concern **out of this ticket's
        scope** — this contract only names and shapes the refusal.
      x-mcp-tool: { verb: create_record, record_type: custom_field, tier: yellow }
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/ApprovalToken'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateCustomFieldRequest' }
            examples:
              text:
                value:
                  object: deal
                  label: Renewal date
                  type: date
                  source: ui
                  captured_by: human:018f3a1b-0000-7000-8000-000000000001
              currency:
                value:
                  object: deal
                  label: Budget ceiling
                  type: currency
                  currency: USD
                  source: ui
                  captured_by: human:018f3a1b-0000-7000-8000-000000000001
              picklist:
                value:
                  object: deal
                  label: Procurement route
                  type: picklist
                  options: [direct, reseller, marketplace]
                  source: ui
                  captured_by: human:018f3a1b-0000-7000-8000-000000000001
      responses:
        '201':
          description: The newly created custom field.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CustomField' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403':
          description: RBAC denied, or a 🟡 create attempted without an approval token.
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }
              examples:
                approvalRequired:
                  value:
                    type: 'https://errors.margince.com/approval_required'
                    title: Approval required
                    status: 403
                    code: approval_required
                    detail: Adding a custom field is a schema change and is confirm-first; supply an approval token.
        '422':
          description: Field definition failed validation, or is judged structural (`structural_change_refused`).
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }
              examples:
                validation:
                  value:
                    type: 'https://errors.margince.com/validation_error'
                    title: Validation failed
                    status: 422
                    code: validation_error
                    detail: One or more fields are invalid.
                    details:
                      errors:
                        - { field: currency, code: required_for_type_currency }
                structuralChangeRefused:
                  summary: The requested field is structural, not a bounded scalar attribute (ADR-0002 Amendment 2)
                  value:
                    type: 'https://errors.margince.com/structural_change_refused'
                    title: Structural change refused
                    status: 422
                    code: structural_change_refused
                    detail: This looks like a new object, relationship, or logic — not a scalar attribute on an existing object. Runtime custom fields only add bounded scalar columns; a structural change ships as a reviewed source change instead.
                    details:
                      route: source_development_path

  /custom-fields/{id}:
    parameters:
      - $ref: '#/components/parameters/Id'
    patch:
      tags: [CustomFields]
      operationId: renameCustomField
      summary: Rename a custom field's display label (🟢 — not a schema change).
      description: |
        CUSTOM-FIELDS-WIRE-3. Audited catalog `label` update only; `column_name` never
        moves (custom-fields.md — "the physical column identity never moves"). Merge-PATCH:
        `column_name`, `object`, and `type` are absent from the request schema entirely.
      x-mcp-tool: { verb: update_record, record_type: custom_field, tier: green }
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RenameCustomFieldRequest' }
      responses:
        '200':
          description: The renamed custom field.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CustomField' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /custom-fields/{id}/retire:
    parameters:
      - $ref: '#/components/parameters/Id'
    post:
      tags: [CustomFields]
      operationId: retireCustomField
      summary: Retire (soft-retire) a custom field — irreversible-feeling, confirm-first.
      description: |
        CUSTOM-FIELDS-WIRE-4. Sets `status=retired`; hides the field from the API and
        filtering while the column and every value in it are preserved — the engine never
        drops a column as a side effect (CUSTOM-FIELDS-AC-13). 🟡 (mirrors `archivePerson`'s
        posture: an irreversible-feeling state change users must confirm) — an agent caller
        must supply `X-Approval-Token`. Not the generic archive shape: this is a status flip
        on a still-fetchable row, not `archived_at` (which stays null).
      x-mcp-tool: { verb: update_record, record_type: custom_field, tier: yellow }
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/ApprovalToken'
      responses:
        '200':
          description: >-
            The retired custom field (`status: "retired"`, `archived_at` still null).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CustomField' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403':
          description: RBAC denied, or a 🟡 retire attempted without an approval token.
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }
              examples:
                approvalRequired:
                  value:
                    type: 'https://errors.margince.com/approval_required'
                    title: Approval required
                    status: 403
                    code: approval_required
                    detail: Retiring a custom field is confirm-first; supply an approval token.
        '404': { $ref: '#/components/responses/NotFound' }

  # DEFERRED — stubs only (data-model.md §12). Intentionally NOT specified:
  #   /sequences, /sequences/{id}/steps, /enrollments   (outbound cadences; sends gated)
  #   /overlay/*                                         (overlay-on-incumbents read model)
  #   /calls, /telephony/*                               (telephony / click-to-call)
  #   /embeddings, /context-graph/*                      (pgvector retrieval store)
  #   /workflow-runs                                     (workflow registry run records)
  #   /audit-log                                         (read API for AuditLogEntry — admin/compliance; fast-follow)
  #   /users, /teams, /roles                             (admin identity mgmt — schema below; CRUD fast-follow)
  # NOTE: /attachments minted (RD-T02/RD-WIRE-1) — see the Attachments section above.
  # =========================================================================

# =============================================================================
components:

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        Bearer JWT. Claims carry the workspace (tenant) and the principal — either a human
        (`human:<user-uuid>`) or an agent acting under an Agent Seat Passport
        (`agent:<id>` + passport id + on-behalf-of human). The principal's effective RBAC
        (own/team/all + field masks) is enforced server-side; an agent can never exceed its
        granting human's permissions.

  # --------------------------- shared parameters ----------------------------
  parameters:
    Id:
      name: id
      in: path
      required: true
      schema: { type: string, format: uuid }
      description: Opaque resource id (UUID; ordering semantics are not exposed).
    Cursor:
      name: cursor
      in: query
      schema: { type: string }
      description: |
        Opaque keyset cursor from a prior response's `page.next_cursor`. The cursor encodes the
        effective `sort` and `filter` of the originating request plus the last row's keyset
        (sort-key tuple + `id` tie-breaker). **Stability:** results are stable under concurrent
        inserts/updates (keyset pagination, not offset). Supplying `cursor` together with a `sort`
        or filter that differs from the one the cursor was minted under returns
        `422 code: cursor_param_mismatch` — re-issue the query without the cursor.
    Limit:
      name: limit
      in: query
      schema: { type: integer, minimum: 1, maximum: 200, default: 50 }
      description: Max items in the page.
    Sort:
      name: sort
      in: query
      schema: { type: string }
      description: |
        Sort spec: comma-separated fields, `-` prefix = descending (e.g. `-updated_at,full_name`).
        `id` is always appended as the final tie-breaker so ordering is total and the keyset cursor
        is deterministic. **Allowed sort fields per resource** are the indexed columns enumerated in
        data-model.md §13 (Sort/filter vocabulary); the default sort when omitted is `-created_at,id`.
        An out-of-vocabulary field returns `422 code: sort_field_not_allowed`.
    IncludeArchived:
      name: include_archived
      in: query
      schema: { type: boolean, default: false }
      description: Include soft-deleted (archived) rows. Default false.
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      schema: { type: string, maxLength: 255 }
      description: |
        Client-supplied key making a POST safe to retry. **Scope:** the key is unique within
        `(workspace_id, principal, request-path)` and retained **24h**; a replay within that window
        returns the original status + body. Reusing the same key with a *different* request body
        returns `409 code: idempotency_key_conflict` (never a silent replay of mismatched intent).
        **Precedence vs natural keys:** on `logActivity`/`createLead`, the Idempotency-Key (transport
        retry-safety) is checked first; if absent, the `(source_system, source_id)` natural key
        (data-model dedupe) governs. The two never both create a row. Strongly recommended on all POSTs.
    ApprovalToken:
      name: X-Approval-Token
      in: header
      schema: { type: string }
      description: |
        A signed, single-use approval token (see schema `ApprovalToken`) minted by
        POST /approvals/{id}/approve, authorizing exactly one 🟡 confirm-first operation. It is a
        compact JWS whose claims **bind** the token to a specific approval, effect, tenant and
        principal — it is NOT a bare opaque string (ADR-0036). The server rejects a token that is
        expired, already consumed, or whose `diff_hash`/`workspace_id`/`passport_id`/`tool` does not
        match the operation being executed (`403 code: approval_token_invalid`). Required when an
        AGENT principal invokes a 🟡 operation; a human's direct call is itself the approval.
    IfMatch:
      name: If-Match
      in: header
      schema: { type: string }
      description: |
        Optional optimistic-concurrency precondition for a mutating request (PATCH/advance/merge):
        the last-seen entity `version`. If the row's current `version` differs, the write is
        rejected with `409 code: version_skew` (ErrVersionSkew) and no change is made — re-read,
        re-apply, retry. Omitting it is last-write-wins (discouraged for agent/automated writers).
        Accepted on every native-mode mutating endpoint that returns a versioned entity.

  # --------------------------- shared responses -----------------------------
  responses:
    Unauthorized:
      description: Missing or invalid bearer token.
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }
          examples:
            unauth:
              value: { type: 'https://errors.margince.com/unauthorized', title: Unauthorized, status: 401, code: unauthorized, detail: Missing or invalid bearer token. }
    Forbidden:
      description: Authenticated but not permitted (RBAC row/field scope, or 🟡 approval missing).
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }
          examples:
            rbac:
              value: { type: 'https://errors.margince.com/forbidden', title: Forbidden, status: 403, code: forbidden, detail: Your role does not permit this action. }
    NotFound:
      description: No such resource in this workspace (or out of RBAC scope).
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }
          examples:
            notFound:
              value: { type: 'https://errors.margince.com/not_found', title: Not found, status: 404, code: not_found, detail: Resource not found. }
    Conflict:
      description: State conflict (duplicate key, concurrent edit, already-decided, default-pipeline collision).
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }
    VersionConflict:
      description: 'Optimistic-lock failure — the entity changed since the version in If-Match (`code: version_skew`).'
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }
          examples:
            skew:
              value: { type: 'https://errors.margince.com/version_skew', title: Version conflict, status: 409, code: version_skew, detail: The resource changed since your last read; re-read and retry. }
    ValidationError:
      description: Request failed validation (RFC 7807 with field-level `details.errors`).
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }
          examples:
            invalid:
              value:
                type: 'https://errors.margince.com/validation_error'
                title: Validation failed
                status: 422
                code: validation_error
                detail: One or more fields are invalid.
                details:
                  errors:
                    - { field: 'emails[0].email', code: invalid_email }

  # ------------------------------- schemas ----------------------------------
  schemas:

    # ---- identity: workspace bootstrap, auth, passports ----
    WorkspaceCreateRequest:
      type: object
      required: [name, slug, base_currency, admin_email, admin_password, admin_display_name]
      properties:
        name: { type: string }
        slug: { type: string }
        base_currency: { type: string, minLength: 3, maxLength: 3 }
        admin_email: { type: string, format: email }
        admin_password: { type: string, minLength: 8 }
        admin_display_name: { type: string }

    WorkspaceResponse:
      type: object
      required: [id, name, slug, base_currency, created_at]
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        slug: { type: string }
        base_currency: { type: string, minLength: 3, maxLength: 3 }
        created_at: { type: string, format: date-time }

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string }

    LoginResponse:
      type: object
      required: [user_id, workspace_id]
      properties:
        user_id: { type: string, format: uuid }
        workspace_id: { type: string, format: uuid }

    PassportCreateRequest:
      type: object
      required: [scopes, expires_in_seconds]
      properties:
        scopes: { type: array, items: { type: string } }
        expires_in_seconds: { type: integer, minimum: 60, maximum: 2592000 }

    HubSpotConnectionView:
      type: object
      required: [connector, status, scopes, connected_at, masked_token]
      properties:
        connector: { type: string, example: hubspot }
        status: { type: string, enum: [active, revoked] }
        scopes:
          type: array
          items: { type: string }
        connected_at: { type: string, format: date-time }
        last_rotated_at: { type: string, format: date-time, nullable: true }
        masked_token:
          type: string
          description: Fixed-length masked suffix only (e.g. "••••••••ab12") — never the real token.

    PassportResponse:
      type: object
      required: [id, granted_by, scopes, expires_at, revoked_at]
      properties:
        id: { type: string, format: uuid }
        granted_by: { type: string, format: uuid }
        scopes: { type: array, items: { type: string } }
        expires_at: { type: string, format: date-time }
        revoked_at: { type: string, format: date-time, nullable: true }
        token: { type: string, description: "Only present on create response" }

    # ---- error (RFC 7807) ----
    Problem:
      type: object
      description: RFC 7807 problem+json with a stable machine `code` and structured `details`.
      required: [status, code]
      properties:
        type:
          type: string
          format: uri
          default: about:blank
          description: A URI identifying the problem type.
        title: { type: string, description: Short, human-readable summary. }
        status: { type: integer, description: HTTP status code. }
        code:
          type: string
          description: Stable machine-readable error code (e.g. duplicate_email, validation_error).
        detail: { type: string, description: Human-readable explanation for this occurrence. }
        instance: { type: string, format: uri, description: URI of the specific occurrence. }
        details:
          type: object
          additionalProperties: true
          description: |
            Structured machine context — e.g. `existing_id` on 409 duplicate, or an
            `errors` array of `{ field, code, message }` on 422 validation.

    # ---- pagination envelope ----
    PageInfo:
      type: object
      required: [has_more]
      properties:
        next_cursor:
          type: [string, 'null']
          description: Opaque cursor for the next page, or null if none.
        has_more: { type: boolean }

    # ---- mixins ----
    Provenance:
      type: object
      description: Provenance carried on every captured/user-entered domain row (data-model §1.6).
      required: [source, captured_by]
      properties:
        source:
          type: string
          description: 'What produced the row: email:<id> | calendar:<id> | connector:<n>:<id> | api | import:<batch> | ui | coldstart.'
        captured_by:
          type: string
          description: 'Who produced it: human:<uuid> | agent:<id> | connector:<name>.'
        raw:
          type: [object, 'null']
          additionalProperties: true
          description: Re-parseable original capture payload (off the query hot path); usually omitted in list views.
    Timestamps:
      type: object
      required: [created_at, updated_at]
      properties:
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        archived_at:
          type: [string, 'null']
          format: date-time
          description: Soft-delete marker. Null = live.

    Address:
      type: [object, 'null']
      description: Structured postal address.
      properties:
        line1: { type: [string, 'null'] }
        line2: { type: [string, 'null'] }
        city: { type: [string, 'null'] }
        region: { type: [string, 'null'] }
        postal_code: { type: [string, 'null'] }
        country: { type: [string, 'null'], description: ISO-3166 alpha-2. }
      additionalProperties: true

    Money:
      type: object
      description: Money as integer minor-units + ISO-4217 currency. Never a float.
      properties:
        amount_minor:
          type: [integer, 'null']
          format: int64
          description: Smallest currency unit (e.g. cents). 100000 EUR-cents = €1,000.00.
        currency:
          type: [string, 'null']
          pattern: '^[A-Z]{3}$'
          description: ISO-4217 uppercase.

    # ---- Person + children ----
    PersonEmail:
      type: object
      required: [id, email, email_type, is_primary, position, source, captured_by]
      properties:
        id: { type: string, format: uuid }
        person_id: { type: string, format: uuid }
        email: { type: string, format: email, description: Stored lowercased. }
        email_type: { type: string, enum: [work, personal, other], default: work }
        is_primary: { type: boolean, default: false, description: At most one primary per type (DB-enforced). }
        position: { type: integer, default: 0, description: Explicit ordering. }
        source: { type: string }
        captured_by: { type: string }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        archived_at: { type: [string, 'null'], format: date-time }

    PersonPhone:
      type: object
      required: [id, phone, phone_type, is_primary, position, source, captured_by]
      properties:
        id: { type: string, format: uuid }
        person_id: { type: string, format: uuid }
        phone: { type: string, description: E.164 normalized. }
        phone_type: { type: string, enum: [work, mobile, home, other], default: work }
        is_primary: { type: boolean, default: false }
        position: { type: integer, default: 0 }
        source: { type: string }
        captured_by: { type: string }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        archived_at: { type: [string, 'null'], format: date-time }

    Person:
      type: object
      description: A contact. Mirrors the `person` table.
      required: [id, workspace_id, full_name, source, captured_by, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        workspace_id: { type: string, format: uuid }
        first_name: { type: [string, 'null'] }
        last_name: { type: [string, 'null'] }
        full_name: { type: string, description: Always present (display name). }
        title: { type: [string, 'null'], description: Denormalized current title; authoritative title is on the employment relationship. }
        owner_id: { type: [string, 'null'], format: uuid }
        social:
          type: object
          additionalProperties: true
          description: '{ linkedin, twitter, github, ... }'
        address: { $ref: '#/components/schemas/Address' }
        emails:
          type: array
          items: { $ref: '#/components/schemas/PersonEmail' }
        phones:
          type: array
          items: { $ref: '#/components/schemas/PersonPhone' }
        consent:
          type: array
          readOnly: true
          description: |
            Per-purpose consent summary (A22/ADR-0011). Read-only derived view of the `person_consent`
            rows; one entry per purpose the workspace tracks. The single flat `consent_state` flag was
            REMOVED — consent is per-purpose and demonstrable (data-model.md §3.4). Mutate via
            `POST /people/{id}/consent`; read the full proof log via `GET /people/{id}/consent`.
          items: { $ref: '#/components/schemas/PersonConsentState' }
        merged_into_id: { type: [string, 'null'], format: uuid, description: Set when this row was merged away. }
        converted_from_lead_id: { type: [string, 'null'], format: uuid, description: Canonical origin pointer if promoted from a lead. }
        source: { type: string }
        captured_by: { type: string }
        raw: { type: [object, 'null'], additionalProperties: true }
        version: { $ref: '#/components/schemas/RowVersion' }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        archived_at: { type: [string, 'null'], format: date-time }
        dedupe_review:
          type: [object, 'null']
          readOnly: true
          description: |
            PO-AC-19 non-blocking fuzzy-dedupe review flag (PO-F-1 Tier-2). Present only on the
            createPerson response when a live candidate scores >= DEDUPE_REVIEW_THRESHOLD (0.72);
            null otherwise. Never persisted — review-queue storage/UI is a separate
            data-hygiene-chapter ticket. Fuzzy scoring never auto-merges at any confidence.
          properties:
            candidate_id: { type: string, format: uuid }
            confidence: { type: number }
          required: [candidate_id, confidence]
        strength:
          type: [object, 'null']
          readOnly: true
          description: |
            PO-EXT-1 relationship-strength block — present on both list rows and detail
            reads. Server-computed from interaction recency/frequency/reciprocity; null
            until a score has been computed for this person. `bucket` mirrors PO-PARAM-3's
            display thresholds (0-24 weak · 25-59 moderate · 60-100 strong).
          properties:
            score: { type: integer, minimum: 0, maximum: 100 }
            bucket: { type: string, enum: [weak, moderate, strong] }
            recency: { type: number }
            frequency: { type: number }
            reciprocity: { type: number }
          required: [score, bucket, recency, frequency, reciprocity]
        last_activity_at:
          type: [string, 'null']
          format: date-time
          readOnly: true
          description: |
            Most recent live activity/interaction timestamp for this person (any
            activity kind, not just email/call/meeting), server-computed on every
            read. Null when the person has no recorded activity — an honest
            omission, never a fabricated value.
        relationships:
          type: array
          readOnly: true
          description: |
            PO-EXT-3 person-360 composite read — this person's relationship edges
            (employment, deal-stakeholder roles, etc.). Populated on the single-record read
            (`getPerson`); omitted on list rows (`listPeople`) for payload economy, mirroring
            the existing readOnly composite fields already on `Deal`.
          items: { $ref: '#/components/schemas/Relationship' }
        deals:
          type: array
          readOnly: true
          description: PO-EXT-3 — deals this person is a stakeholder on. Populated on `getPerson` only.
          items: { $ref: '#/components/schemas/Deal' }
        activities:
          type: array
          readOnly: true
          description: PO-EXT-3 — timeline activity refs linked to this person, most recent first. Populated on `getPerson` only.
          items: { $ref: '#/components/schemas/ActivityRef' }
      additionalProperties: true
      x-extension: true
      x-extension-note: |
        additionalProperties:true admits client custom fields (data-model §9 — custom fields
        are real columns added by migration, surfaced additively through this same contract).

    CreatePersonRequest:
      type: object
      required: [full_name, source, captured_by]
      properties:
        full_name: { type: string }
        first_name: { type: [string, 'null'] }
        last_name: { type: [string, 'null'] }
        title: { type: [string, 'null'] }
        owner_id: { type: [string, 'null'], format: uuid }
        social: { type: object, additionalProperties: true }
        address: { $ref: '#/components/schemas/Address' }
        emails:
          type: array
          items:
            type: object
            required: [email]
            properties:
              email: { type: string, format: email }
              email_type: { type: string, enum: [work, personal, other], default: work }
              is_primary: { type: boolean, default: false }
              position: { type: integer, default: 0 }
        phones:
          type: array
          items:
            type: object
            required: [phone]
            properties:
              phone: { type: string }
              phone_type: { type: string, enum: [work, mobile, home, other], default: work }
              is_primary: { type: boolean, default: false }
              position: { type: integer, default: 0 }
        source: { type: string }
        captured_by: { type: string }
      additionalProperties: true
      x-extension: true

    UpdatePersonRequest:
      type: object
      description: Partial update. Omitted fields are unchanged.
      properties:
        full_name: { type: string }
        first_name: { type: [string, 'null'] }
        last_name: { type: [string, 'null'] }
        title: { type: [string, 'null'] }
        owner_id: { type: [string, 'null'], format: uuid }
        social: { type: object, additionalProperties: true }
        address: { $ref: '#/components/schemas/Address' }
      additionalProperties: true
      x-extension: true
      x-consent-note: |
        Consent is NOT mutable through person update (A22/ADR-0011). Use POST /people/{id}/consent
        so that every change writes an append-only `consent_event` proof row.

    PersonListResponse:
      type: object
      required: [data, page]
      properties:
        data:
          type: array
          items: { $ref: '#/components/schemas/Person' }
        page: { $ref: '#/components/schemas/PageInfo' }

    # ---- Organization + domain ----
    OrganizationDomain:
      type: object
      required: [id, domain, is_primary, source, captured_by]
      properties:
        id: { type: string, format: uuid }
        organization_id: { type: string, format: uuid }
        domain: { type: string, description: Lowercased, no scheme, no www. }
        is_primary: { type: boolean, default: false }
        source: { type: string }
        captured_by: { type: string }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        archived_at: { type: [string, 'null'], format: date-time }

    Organization:
      type: object
      description: A company. Mirrors the `organization` table.
      required: [id, workspace_id, display_name, source, captured_by, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        workspace_id: { type: string, format: uuid }
        display_name: { type: string }
        legal_name: { type: [string, 'null'] }
        industry: { type: [string, 'null'] }
        size_band:
          type: [string, 'null']
          enum: [null, '1-10', '11-50', '51-200', '201-500', '501-1000', '1001-5000', '5000+']
        address: { $ref: '#/components/schemas/Address' }
        owner_id: { type: [string, 'null'], format: uuid }
        parent_org_id: { type: [string, 'null'], format: uuid, description: Single-level hierarchy FK; no cycles. }
        merged_into_id: { type: [string, 'null'], format: uuid }
        domains:
          type: array
          items: { $ref: '#/components/schemas/OrganizationDomain' }
        classification:
          type: [string, 'null']
          enum: [null, customer, prospect, partner, vendor, other, agency, reseller, tech_vendor, platform, competitor]
          x-extensible-enum: true
          description: >-
            PO-DDL-4 target values (agency, reseller, tech_vendor, platform, competitor, plus
            prospect/customer/partner/other) unioned with legacy live values (vendor) per the
            additive-first gate decision (gate issue #58, Option 1) — legacy values are
            DEPRECATED, not removed; a fast-follow ticket drops them + adds NOT NULL DEFAULT
            'prospect' after a deprecation window. An org IS a partner iff
            classification='partner' AND it has a `partner` row (A41/ADR-0032).
        relevance:
          type: [integer, 'null']
          minimum: 0
          maximum: 100
          description: Evidence-backed relevance score (PO-DDL-4); null when not yet computed.
        logo_object_key:
          type: [string, 'null']
          description: Object-store base key for the resolved logo (sm/md/lg variants derived); null → render a deterministic monogram (A55).
        logo_origin:
          type: [string, 'null']
          description: Resolved source URL the logo was pulled from (logo-specific provenance, beyond row source/captured_by).
        source: { type: string }
        captured_by: { type: string }
        raw: { type: [object, 'null'], additionalProperties: true }
        partner: { $ref: '#/components/schemas/Partner' }
        version: { $ref: '#/components/schemas/RowVersion' }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        archived_at: { type: [string, 'null'], format: date-time }
        dedupe_review:
          type: [object, 'null']
          readOnly: true
          description: |
            PO-AC-19 non-blocking fuzzy-dedupe review flag (PO-F-2 name-only tier). Present only on
            the createOrganization response when a live candidate's legal-suffix-normalized display
            name scores >= DEDUPE_REVIEW_THRESHOLD (0.72); null otherwise. Never persisted —
            review-queue storage/UI is a separate data-hygiene-chapter ticket.
          properties:
            candidate_id: { type: string, format: uuid }
            confidence: { type: number }
          required: [candidate_id, confidence]
        relationships:
          type: array
          readOnly: true
          description: |
            PO-EXT-3 organization-360 composite read — this org's relationship edges
            (employment, partner edges). Populated on the single-record read
            (`getOrganization`); omitted on list rows (`listOrganizations`).
          items: { $ref: '#/components/schemas/Relationship' }
        deals:
          type: array
          readOnly: true
          description: PO-EXT-3 — deals attributed to this organization. Populated on `getOrganization` only.
          items: { $ref: '#/components/schemas/Deal' }
        activities:
          type: array
          readOnly: true
          description: PO-EXT-3 — timeline activity refs linked to this organization, most recent first. Populated on `getOrganization` only.
          items: { $ref: '#/components/schemas/ActivityRef' }
        contact_count:
          type: integer
          readOnly: true
          description: |
            Count of people with a live `employment` relationship to this
            organization (server-computed, AC-companies-3).
        open_deal_count:
          type: integer
          readOnly: true
          description: |
            Count of this organization's live deals with status=open
            (server-computed, AC-companies-3).
        org_strength:
          type: [object, 'null']
          readOnly: true
          description: |
            PO-N-ORGSTRENGTH roll-up: the plain max over this org's contacts'
            relationship-strength scores (org_strength.go's OrgStrength(), wired
            unmodified) — never an average, never capped/normalized. Null when no
            contact at this org has a computed strength yet (honest no-signal,
            AC-companies-4/5).
          properties:
            score: { type: integer, minimum: 0, maximum: 100 }
            bucket: { type: string, enum: [weak, moderate, strong] }
            top_person_id: { type: string, format: uuid }
            top_person_name: { type: string }
          required: [score, bucket, top_person_id, top_person_name]
      additionalProperties: true
      x-extension: true

    CreateOrganizationRequest:
      type: object
      required: [display_name, source, captured_by]
      properties:
        display_name: { type: string }
        legal_name: { type: [string, 'null'] }
        industry: { type: [string, 'null'] }
        size_band: { type: [string, 'null'], enum: [null, '1-10', '11-50', '51-200', '201-500', '501-1000', '1001-5000', '5000+'] }
        address: { $ref: '#/components/schemas/Address' }
        owner_id: { type: [string, 'null'], format: uuid }
        parent_org_id: { type: [string, 'null'], format: uuid }
        domains:
          type: array
          items:
            type: object
            required: [domain]
            properties:
              domain: { type: string }
              is_primary: { type: boolean, default: false }
        source: { type: string }
        captured_by: { type: string }
      additionalProperties: true
      x-extension: true

    UpdateOrganizationRequest:
      type: object
      properties:
        display_name: { type: string }
        legal_name: { type: [string, 'null'] }
        industry: { type: [string, 'null'] }
        size_band: { type: [string, 'null'], enum: [null, '1-10', '11-50', '51-200', '201-500', '501-1000', '1001-5000', '5000+'] }
        address: { $ref: '#/components/schemas/Address' }
        owner_id: { type: [string, 'null'], format: uuid }
        parent_org_id: { type: [string, 'null'], format: uuid }
      additionalProperties: true
      x-extension: true

    OrganizationListResponse:
      type: object
      required: [data, page]
      properties:
        data: { type: array, items: { $ref: '#/components/schemas/Organization' } }
        page: { $ref: '#/components/schemas/PageInfo' }

    # ---- Relationship ----
    Relationship:
      type: object
      description: |
        The typed edge. Mirrors `relationship` (data-model §5). Shapes by `kind`:
        `employment` (person↔org), `deal_stakeholder` (deal↔person), and the partner edges
        (A41/ADR-0032, org↔org via `counterparty_org_id`): `partner_of` (org served by a partner
        org), `referred_by` (org referred by a partner org), `co_sell_with` (org co-sold with a partner org).
      required: [id, workspace_id, kind, source, captured_by, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        workspace_id: { type: string, format: uuid }
        kind: { type: string, enum: [employment, deal_stakeholder, partner_of, referred_by, co_sell_with] }
        person_id: { type: [string, 'null'], format: uuid }
        organization_id: { type: [string, 'null'], format: uuid }
        counterparty_org_id: { type: [string, 'null'], format: uuid, description: 'The other org on a partner edge (partner_of/referred_by/co_sell_with). Null for employment/deal_stakeholder.' }
        deal_id: { type: [string, 'null'], format: uuid }
        role:
          type: [string, 'null']
          description: 'employment: cto/vp_sales/...; stakeholder: champion/economic_buyer/blocker/influencer/user.'
        is_current_primary: { type: boolean, default: false, description: Employment — the one current primary employer (≤1 per person). }
        started_at: { type: [string, 'null'], format: date }
        ended_at: { type: [string, 'null'], format: date, description: Null = current/ongoing. }
        source: { type: string }
        captured_by: { type: string }
        version: { $ref: '#/components/schemas/RowVersion' }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        archived_at: { type: [string, 'null'], format: date-time }

    CreateRelationshipRequest:
      type: object
      required: [kind, source, captured_by]
      properties:
        kind: { type: string, enum: [employment, deal_stakeholder, partner_of, referred_by, co_sell_with] }
        person_id: { type: [string, 'null'], format: uuid }
        organization_id: { type: [string, 'null'], format: uuid }
        counterparty_org_id: { type: [string, 'null'], format: uuid }
        deal_id: { type: [string, 'null'], format: uuid }
        role: { type: [string, 'null'] }
        is_current_primary: { type: boolean, default: false }
        started_at: { type: [string, 'null'], format: date }
        ended_at: { type: [string, 'null'], format: date }
        source: { type: string }
        captured_by: { type: string }

    UpdateRelationshipRequest:
      type: object
      properties:
        role: { type: [string, 'null'] }
        is_current_primary: { type: boolean }
        started_at: { type: [string, 'null'], format: date }
        ended_at: { type: [string, 'null'], format: date }

    RelationshipListResponse:
      type: object
      required: [data, page]
      properties:
        data: { type: array, items: { $ref: '#/components/schemas/Relationship' } }
        page: { $ref: '#/components/schemas/PageInfo' }

    # ---- Composite/evidence reads (PO-EXT-2/3) ----
    ActivityRef:
      type: object
      description: |
        A lightweight activity identity reference — id/kind/subject/occurred_at only, never
        the full body (one composite/evidence read must stay light per the
        one-composite-read doctrine). Mirrors DealTimelineRef's shape, generalized beyond
        deals for person/org composite reads and the strength-breakdown evidence list.
      required: [id, kind, occurred_at]
      properties:
        id: { type: string, format: uuid }
        kind: { type: string, enum: [email, call, meeting, note, task, whatsapp, telegram] }
        subject: { type: [string, 'null'] }
        occurred_at: { type: string, format: date-time }

    PersonStrengthBreakdown:
      type: object
      description: |
        Contributing evidence behind a person's relationship-strength score (PO-EXT-2) —
        the factor values plus the interaction activities that produced them, serving the
        AC-person-3/4 evidence drawer.
      required: [person_id, score, bucket, recency, frequency, reciprocity, contributing_activities]
      properties:
        person_id: { type: string, format: uuid }
        score: { type: integer, minimum: 0, maximum: 100 }
        bucket: { type: string, enum: [weak, moderate, strong] }
        recency: { type: number }
        frequency: { type: number }
        reciprocity: { type: number }
        contributing_activities:
          type: array
          description: The interaction activities behind this score, most recent first.
          items: { $ref: '#/components/schemas/ActivityRef' }

    # ---- Deal ----
    Deal:
      type: object
      description: A deal. Mirrors the `deal` table.
      required: [id, workspace_id, name, pipeline_id, stage_id, status, source, captured_by, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        workspace_id: { type: string, format: uuid }
        name: { type: string }
        amount_minor: { type: [integer, 'null'], format: int64 }
        currency: { type: [string, 'null'], pattern: '^[A-Z]{3}$' }
        fx_rate_to_base: { type: [string, 'null'], description: 'Native→base, frozen at close (null while open). Decimal-as-string to avoid float rounding of the 10-dp rate.' }
        fx_rate_date: { type: [string, 'null'], format: date }
        pipeline_id: { type: string, format: uuid }
        stage_id: { type: string, format: uuid, description: Must belong to pipeline_id. }
        organization_id: { type: [string, 'null'], format: uuid, description: Primary org; never a raw lead. }
        partner_org_id: { type: [string, 'null'], format: uuid, description: 'Deal registration/attribution to a partner org (A38/A41/ADR-0032). The org must have a `partner` row.' }
        owner_id: { type: [string, 'null'], format: uuid }
        status: { type: string, enum: [open, won, lost], default: open }
        lost_reason: { type: [string, 'null'], description: Required when status=lost. }
        forecast_category: { type: [string, 'null'], enum: [null, commit, best_case, pipeline, omitted] }
        expected_close_date: { type: [string, 'null'], format: date }
        wait_until: { type: [string, 'null'], format: date, description: "'Customer asked us to wait until' date; suppresses the stalled flag but not the overdue close-date flag." }
        closed_at: { type: [string, 'null'], format: date-time }
        last_activity_at: { type: [string, 'null'], format: date-time, description: Drives the deterministic stalled flag. }
        stalled: { type: boolean, readOnly: true, description: Derived — no activity past the threshold (absolute duration). }
        stage_entered_at:
          type: [string, 'null']
          format: date-time
          readOnly: true
          description: |
            Timestamp the deal entered its current stage — the `changed_at` of the most
            recent `deal_stage_history` row for this deal (DEAL-DDL-4). Derived, not a
            stored `deal` column; every deal has one via the creation-writes-history-row
            rule (DEAL-AC-H1), so this is never null for a live deal.
        stakeholder_count:
          type: integer
          readOnly: true
          description: |
            Count of live `deal_stakeholder` `relationship` rows for this deal
            (DEAL-WIRE-5). Derived, not a stored `deal` column.
        source: { type: string }
        captured_by: { type: string }
        raw: { type: [object, 'null'], additionalProperties: true }
        version: { $ref: '#/components/schemas/RowVersion' }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        archived_at: { type: [string, 'null'], format: date-time }
      additionalProperties: true
      x-extension: true

    CreateDealRequest:
      type: object
      required: [name, pipeline_id, stage_id, source, captured_by]
      properties:
        name: { type: string }
        amount_minor: { type: [integer, 'null'], format: int64 }
        currency: { type: [string, 'null'], pattern: '^[A-Z]{3}$' }
        pipeline_id: { type: string, format: uuid }
        stage_id: { type: string, format: uuid }
        organization_id: { type: [string, 'null'], format: uuid }
        owner_id: { type: [string, 'null'], format: uuid }
        expected_close_date: { type: [string, 'null'], format: date }
        source: { type: string }
        captured_by: { type: string }
      additionalProperties: true
      x-extension: true

    UpdateDealRequest:
      type: object
      properties:
        name: { type: string }
        amount_minor: { type: [integer, 'null'], format: int64 }
        currency: { type: [string, 'null'], pattern: '^[A-Z]{3}$' }
        organization_id: { type: [string, 'null'], format: uuid }
        partner_org_id: { type: [string, 'null'], format: uuid }
        owner_id: { type: [string, 'null'], format: uuid }
        status: { type: string, enum: [open, won, lost] }
        lost_reason: { type: [string, 'null'] }
        fx_rate_to_base: { type: [string, 'null'], description: 'Native→base rate to FREEZE at close. Required (server may also compute it from the FX table) when transitioning to won with a non-base currency — satisfies the deal_closed_fx CHECK (formulas §6.1). Ignored while open.' }
        fx_rate_date: { type: [string, 'null'], format: date }
        forecast_category: { type: [string, 'null'], enum: [null, commit, best_case, pipeline, omitted] }
        expected_close_date: { type: [string, 'null'], format: date }
        wait_until: { type: [string, 'null'], format: date }
      additionalProperties: true
      x-extension: true

    AdvanceDealRequest:
      type: object
      required: [to_stage_id]
      properties:
        to_stage_id: { type: string, format: uuid, description: Target stage (must belong to the deal's pipeline). }
        status: { type: string, enum: [open, won, lost], description: Set when advancing into a terminal stage. }
        lost_reason: { type: [string, 'null'], description: Required if status=lost. }

    DealListResponse:
      type: object
      required: [data, page]
      properties:
        data: { type: array, items: { $ref: '#/components/schemas/Deal' } }
        page: { $ref: '#/components/schemas/PageInfo' }

    DealTimelineRef:
      type: object
      description: |
        A timeline reference — activity identity only, never the full body (one
        composite read must stay light). Mirrors the identity fields of `Activity`.
      required: [id, kind, occurred_at]
      properties:
        id: { type: string, format: uuid }
        kind: { type: string, enum: [email, call, meeting, note, task, whatsapp, telegram] }
        subject: { type: [string, 'null'] }
        occurred_at: { type: string, format: date-time }

    DealDetail:
      type: object
      description: |
        The deal-360 composite read (DEAL-EXT-3) — one round trip per the
        one-composite-read doctrine (architecture/frontend.md): the deal record's own
        fields (duplicated flat here rather than composed via `allOf` — `oasdiff`'s
        default breaking-change diff, as run by `scripts/check-contract-breaking.sh`,
        does not resolve `allOf` when comparing response schemas, and `--flatten-allof`
        itself errors on this spec's OpenAPI-3.1 nullable `type: [T, 'null']` unions, so
        `allOf` can't be used for any schema that must diff cleanly against a flat
        predecessor), its stakeholders (person + role), and timeline refs, together.
      required: [id, workspace_id, name, pipeline_id, stage_id, status, source, captured_by, created_at, updated_at, stakeholders, timeline]
      properties:
        id: { type: string, format: uuid }
        workspace_id: { type: string, format: uuid }
        name: { type: string }
        amount_minor: { type: [integer, 'null'], format: int64 }
        currency: { type: [string, 'null'], pattern: '^[A-Z]{3}$' }
        fx_rate_to_base: { type: [string, 'null'], description: 'Native→base, frozen at close (null while open). Decimal-as-string to avoid float rounding of the 10-dp rate.' }
        fx_rate_date: { type: [string, 'null'], format: date }
        pipeline_id: { type: string, format: uuid }
        stage_id: { type: string, format: uuid, description: Must belong to pipeline_id. }
        organization_id: { type: [string, 'null'], format: uuid, description: Primary org; never a raw lead. }
        partner_org_id: { type: [string, 'null'], format: uuid, description: 'Deal registration/attribution to a partner org (A38/A41/ADR-0032). The org must have a `partner` row.' }
        owner_id: { type: [string, 'null'], format: uuid }
        status: { type: string, enum: [open, won, lost], default: open }
        lost_reason: { type: [string, 'null'], description: Required when status=lost. }
        forecast_category: { type: [string, 'null'], enum: [null, commit, best_case, pipeline, omitted] }
        expected_close_date: { type: [string, 'null'], format: date }
        wait_until: { type: [string, 'null'], format: date, description: "'Customer asked us to wait until' date; suppresses the stalled flag but not the overdue close-date flag." }
        closed_at: { type: [string, 'null'], format: date-time }
        last_activity_at: { type: [string, 'null'], format: date-time, description: Drives the deterministic stalled flag. }
        stalled: { type: boolean, readOnly: true, description: Derived — no activity past the threshold (absolute duration). }
        stage_entered_at:
          type: [string, 'null']
          format: date-time
          readOnly: true
          description: |
            Timestamp the deal entered its current stage — the `changed_at` of the most
            recent `deal_stage_history` row for this deal (DEAL-DDL-4). Derived, not a
            stored `deal` column; every deal has one via the creation-writes-history-row
            rule (DEAL-AC-H1), so this is never null for a live deal.
        stakeholder_count:
          type: integer
          readOnly: true
          description: |
            Count of live `deal_stakeholder` `relationship` rows for this deal
            (DEAL-WIRE-5). Derived, not a stored `deal` column.
        source: { type: string }
        captured_by: { type: string }
        raw: { type: [object, 'null'], additionalProperties: true }
        version: { $ref: '#/components/schemas/RowVersion' }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        archived_at: { type: [string, 'null'], format: date-time }
        stakeholders:
          type: array
          description: The deal's stakeholder relationships (person + role), DEAL-WIRE-5.
          items: { $ref: '#/components/schemas/Relationship' }
        timeline:
          type: array
          description: Timeline refs linked to this deal, most recent first.
          items: { $ref: '#/components/schemas/DealTimelineRef' }
      additionalProperties: true
      x-extension: true

    # ---- Pipeline + Stage ----
    Stage:
      type: object
      description: A pipeline stage. Mirrors the `stage` table.
      required: [id, workspace_id, pipeline_id, name, position, semantic, win_probability, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        workspace_id: { type: string, format: uuid }
        pipeline_id: { type: string, format: uuid }
        name: { type: string }
        position: { type: integer, description: Unique within the pipeline. }
        semantic: { type: string, enum: [open, won, lost], default: open }
        win_probability: { type: integer, minimum: 0, maximum: 100, description: 'won=100, lost=0, open=0..100.' }
        version: { $ref: '#/components/schemas/RowVersion' }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        archived_at: { type: [string, 'null'], format: date-time }

    CreateStageRequest:
      type: object
      required: [pipeline_id, name, position]
      properties:
        pipeline_id: { type: string, format: uuid }
        name: { type: string }
        position: { type: integer }
        semantic: { type: string, enum: [open, won, lost], default: open }
        win_probability: { type: integer, minimum: 0, maximum: 100, default: 0 }

    UpdateStageRequest:
      type: object
      properties:
        name: { type: string }
        position: { type: integer }
        semantic: { type: string, enum: [open, won, lost] }
        win_probability: { type: integer, minimum: 0, maximum: 100 }

    StageListResponse:
      type: object
      required: [data, page]
      properties:
        data: { type: array, items: { $ref: '#/components/schemas/Stage' } }
        page: { $ref: '#/components/schemas/PageInfo' }

    Pipeline:
      type: object
      description: A pipeline. Mirrors the `pipeline` table (with embedded stages on GET).
      required: [id, workspace_id, name, is_default, position, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        workspace_id: { type: string, format: uuid }
        name: { type: string }
        is_default: { type: boolean, default: false, description: Exactly one default per workspace. }
        position: { type: integer, default: 0 }
        stages:
          type: array
          items: { $ref: '#/components/schemas/Stage' }
        version: { $ref: '#/components/schemas/RowVersion' }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        archived_at: { type: [string, 'null'], format: date-time }

    CreatePipelineRequest:
      type: object
      required: [name]
      properties:
        name: { type: string }
        is_default: { type: boolean, default: false }
        position: { type: integer, default: 0 }
        stages:
          type: array
          description: Optional initial stages.
          items: { $ref: '#/components/schemas/CreateStageRequest' }

    UpdatePipelineRequest:
      type: object
      properties:
        name: { type: string }
        is_default: { type: boolean }
        position: { type: integer }

    PipelineListResponse:
      type: object
      required: [data, page]
      properties:
        data: { type: array, items: { $ref: '#/components/schemas/Pipeline' } }
        page: { $ref: '#/components/schemas/PageInfo' }

    PipelineRollup:
      type: object
      description: |
        DEAL-FORM-2's weighted pipeline value, scoped to one pipeline: raw and weighted
        totals over live open deals, decomposable per stage and per deal so the displayed
        total always equals the sum of its parts (totals-reconcile-to-parts). A server
        read only — the client never sums these itself (DEAL-EXT-1).
      required: [pipeline_id, unweighted_minor, weighted_minor, base_currency, as_of_date, by_stage, breakdown]
      properties:
        pipeline_id: { type: string, format: uuid }
        unweighted_minor:
          type: integer
          format: int64
          description: Σ base_value(deal) over live open deals in this pipeline (DEAL-FORM-2).
        weighted_minor:
          type: integer
          format: int64
          description: Σ weighted_value(deal) over live open deals in this pipeline (DEAL-FORM-2).
        base_currency: { type: string, pattern: '^[A-Z]{3}$', description: workspace.base_currency. }
        as_of_date: { type: string, format: date, description: The date this roll-up was computed. }
        by_stage:
          type: array
          description: Per-stage (per-column) decomposition; sums to the totals above.
          items: { $ref: '#/components/schemas/PipelineRollupStage' }
        breakdown:
          type: array
          description: Per-deal breakdown for "Explain This Number"; sums to the totals above.
          items: { $ref: '#/components/schemas/PipelineRollupDeal' }

    PipelineRollupStage:
      type: object
      required: [stage_id, unweighted_minor, weighted_minor, deal_count]
      properties:
        stage_id: { type: string, format: uuid }
        unweighted_minor: { type: integer, format: int64 }
        weighted_minor: { type: integer, format: int64 }
        deal_count: { type: integer }

    PipelineRollupDeal:
      type: object
      description: One row of DEAL-FORM-2's per-deal breakdown.
      required: [deal_id, base_value, win_probability, weighted_value]
      properties:
        deal_id: { type: string, format: uuid }
        base_value:
          type: integer
          format: int64
          description: base_value(deal) — minor units in base currency (DEAL-FORM-2).
        win_probability:
          type: integer
          description: Read live from the deal's current stage.win_probability (0-100).
        weighted_value:
          type: integer
          format: int64
          description: round(base_value * win_probability / 100), half away from zero.

    # ---- Activity + link ----
    ActivityLink:
      type: object
      required: [entity_type, entity_id]
      properties:
        id: { type: string, format: uuid }
        activity_id: { type: string, format: uuid }
        entity_type: { type: string, enum: [person, organization, deal, lead] }
        entity_id: { type: string, format: uuid }

    Activity:
      type: object
      description: |
        A polymorphic timeline item. Mirrors the `activity` table + `activity_link`.
        **Per-kind field constraints** (enforced server-side to match the DB `activity_task_fields`
        CHECK; the OpenAPI cannot express these conditionally): `due_at`/`assignee_id`/`remind_at`/`is_done`/
        `done_at` are valid ONLY when `kind=task`; `meeting_status` ONLY when `kind=meeting`;
        `duration_seconds` only for meeting/call; `direction` is null for note/task. Setting a
        disallowed field for the kind returns `422 code: field_not_valid_for_kind` (the API rejects
        what the DB CHECK would reject, rather than 500-ing at write time).
      required: [id, workspace_id, kind, occurred_at, source, captured_by, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        workspace_id: { type: string, format: uuid }
        kind: { type: string, enum: [email, call, meeting, note, task, whatsapp, telegram] }
        subject: { type: [string, 'null'] }
        body: { type: [string, 'null'] }
        occurred_at: { type: string, format: date-time }
        due_at: { type: [string, 'null'], format: date-time, description: Task only. }
        assignee_id: { type: [string, 'null'], format: uuid, description: Task only. }
        remind_at: { type: [string, 'null'], format: date-time, description: Task only. }
        is_done: { type: boolean, default: false, description: Task only. }
        done_at: { type: [string, 'null'], format: date-time }
        duration_seconds: { type: [integer, 'null'], description: Meeting/call only. }
        direction: { type: [string, 'null'], enum: [null, inbound, outbound], description: 'inbound/outbound for email/call; null for note/task.' }
        meeting_status: { type: [string, 'null'], enum: [null, booked, held, no_show, canceled], description: 'Set only when kind=meeting.' }
        source_system: { type: [string, 'null'], description: 'gmail/gcal/outlook/transcript — idempotency key part.' }
        source_id: { type: [string, 'null'], description: Provider message/event id — idempotency key part. }
        links:
          type: array
          description: One activity may link to >1 entity (person + deal).
          items: { $ref: '#/components/schemas/ActivityLink' }
        source: { type: string }
        captured_by: { type: string }
        raw: { type: [object, 'null'], additionalProperties: true }
        version: { $ref: '#/components/schemas/RowVersion' }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        archived_at: { type: [string, 'null'], format: date-time }

    CreateActivityRequest:
      type: object
      required: [kind, source, captured_by]
      properties:
        kind: { type: string, enum: [email, call, meeting, note, task, whatsapp, telegram] }
        subject: { type: [string, 'null'] }
        body: { type: [string, 'null'] }
        occurred_at: { type: string, format: date-time }
        due_at: { type: [string, 'null'], format: date-time }
        assignee_id: { type: [string, 'null'], format: uuid }
        remind_at: { type: [string, 'null'], format: date-time }
        duration_seconds: { type: [integer, 'null'] }
        direction: { type: [string, 'null'], enum: [null, inbound, outbound] }
        meeting_status: { type: [string, 'null'], enum: [null, booked, held, no_show, canceled] }
        source_system: { type: [string, 'null'] }
        source_id: { type: [string, 'null'] }
        links:
          type: array
          items:
            type: object
            required: [entity_type, entity_id]
            properties:
              entity_type: { type: string, enum: [person, organization, deal] }
              entity_id: { type: string, format: uuid }
        source: { type: string }
        captured_by: { type: string }
        raw: { type: [object, 'null'], additionalProperties: true }

    UpdateActivityRequest:
      type: object
      properties:
        subject: { type: [string, 'null'] }
        body: { type: [string, 'null'] }
        occurred_at: { type: string, format: date-time }
        due_at: { type: [string, 'null'], format: date-time }
        assignee_id: { type: [string, 'null'], format: uuid }
        remind_at: { type: [string, 'null'], format: date-time }
        is_done: { type: boolean, description: Completing a task writes one audit row + task.completed event. }

    ActivityListResponse:
      type: object
      required: [data, page]
      properties:
        data: { type: array, items: { $ref: '#/components/schemas/Activity' } }
        page: { $ref: '#/components/schemas/PageInfo' }

    EmailDraft:
      type: object
      description: A drafted email (never sent by drafting). Send via /activities/{id}/send-email (🟡).
      required: [subject, body]
      properties:
        subject: { type: string }
        body: { type: string }
        to: { type: array, items: { type: string, format: email } }
        in_reply_to_activity_id: { type: [string, 'null'], format: uuid }

    SendEmailRequest:
      type: object
      required: [subject, body, to, consent_purpose]
      properties:
        subject: { type: string }
        body: { type: string, description: The (possibly edited) final body that is sent. }
        to: { type: array, items: { type: string, format: email } }
        cc: { type: array, items: { type: string, format: email } }
        consent_purpose:
          type: string
          description: |
            The consent purpose this send falls under (e.g. `transactional`, `marketing_email`).
            The send is suppressed (409 `consent_not_granted`) unless every recipient has an active
            `granted` `person_consent` for THIS purpose (default-deny per purpose, A22/ADR-0011).

    # ---- Lead ----
    Lead:
      type: object
      description: A thin, segregated prospect. Mirrors the `lead` table. NO organization FK.
      required: [id, workspace_id, status, score, source, captured_by, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        workspace_id: { type: string, format: uuid }
        full_name: { type: [string, 'null'] }
        email: { type: [string, 'null'], format: email, description: Lowercased; lead-internal dedupe key. }
        title: { type: [string, 'null'] }
        company_name: { type: [string, 'null'], description: FREE TEXT — NOT an organization FK. }
        candidate_org_key: { type: [string, 'null'], description: Loose key for ABM routing without creating an org. }
        status: { type: string, enum: [new, working, promoted, disqualified], default: new }
        score: { type: integer, default: 0, description: Lead-local scoring; never reads the contact graph. }
        owner_id: { type: [string, 'null'], format: uuid }
        source_system: { type: [string, 'null'] }
        source_id: { type: [string, 'null'] }
        promoted_person_id: { type: [string, 'null'], format: uuid, description: Set on promotion (convenience mirror). }
        promoted_at: { type: [string, 'null'], format: date-time }
        source: { type: string }
        captured_by: { type: string }
        raw: { type: [object, 'null'], additionalProperties: true }
        version: { $ref: '#/components/schemas/RowVersion' }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        archived_at: { type: [string, 'null'], format: date-time }

    CreateLeadRequest:
      type: object
      required: [source, captured_by]
      properties:
        full_name: { type: [string, 'null'] }
        email: { type: [string, 'null'], format: email }
        title: { type: [string, 'null'] }
        company_name: { type: [string, 'null'] }
        candidate_org_key: { type: [string, 'null'] }
        status: { type: string, enum: [new, working, promoted, disqualified], default: new }
        owner_id: { type: [string, 'null'], format: uuid }
        source_system: { type: [string, 'null'] }
        source_id: { type: [string, 'null'] }
        source: { type: string }
        captured_by: { type: string }

    LeadScoreFactor:
      type: object
      description: One line of a lead's "Explain This Score" breakdown (formulas-and-rules.md §3.1).
      required: [factor, points, source_activity_ids]
      properties:
        factor: { type: string, description: 'e.g. decision_maker_title, high_intent_source, reply, link_click.' }
        points: { type: number }
        source_activity_ids: { type: array, items: { type: string, format: uuid } }

    LeadScoreExplanation:
      type: object
      required: [score, factors]
      properties:
        score: { type: integer }
        factors: { type: array, items: { $ref: '#/components/schemas/LeadScoreFactor' } }

    OverrideLeadScoreRequest:
      type: object
      description: Exactly one of `score` (set an explicit value) or `clear:true` (lift a prior override) is meaningful per call.
      properties:
        score: { type: [integer, 'null'] }
        clear: { type: boolean, default: false }

    UpdateLeadRequest:
      type: object
      description: |
        Partial update. `status` may move only between `new`/`working` here. **Disqualifying is done
        via DELETE /leads/{id}** (which sets status=disqualified AND archives — the invariant
        "disqualified ⇒ archived" is enforced on that one path); `promoted` is reachable only via
        POST /leads/{id}/promote. Both terminal states are therefore excluded from this enum.
      properties:
        full_name: { type: [string, 'null'] }
        email: { type: [string, 'null'], format: email }
        title: { type: [string, 'null'] }
        company_name: { type: [string, 'null'] }
        candidate_org_key: { type: [string, 'null'], description: 'Loose ABM routing key. Format: lowercased registrable domain when known (`acme.com`), else a slug of company_name. Never an organization FK.' }
        status: { type: string, enum: [new, working] }
        score: { type: [integer, 'null'], minimum: 0, maximum: 100, description: 'Manual human score override (formulas §3.1, AC-S1). Omit to keep the computed lead-local score.' }
        owner_id: { type: [string, 'null'], format: uuid }

    PromoteLeadRequest:
      type: object
      required: [trigger]
      properties:
        trigger:
          type: string
          enum: [inbound_reply, meeting_booked, meeting_held, human_qualify]
          description: |
            The genuine-engagement trigger. cold_outbound_no_reply is NOT permitted and is
            rejected with 422 — promotion is engagement, not import or an outbound touch.
        evidence:
          type: object
          description: Which inbound email/meeting (or human) triggered promotion; recorded in audit.
          properties:
            activity_id: { type: [string, 'null'], format: uuid }
            note: { type: [string, 'null'] }

    PromoteLeadResponse:
      type: object
      required: [person, merged]
      properties:
        person: { $ref: '#/components/schemas/Person' }
        merged:
          type: boolean
          description: True if promotion merged into an existing person (no duplicate); false if a new person was created.
        lead_id: { type: string, format: uuid }

    LeadListResponse:
      type: object
      required: [data, page]
      properties:
        data: { type: array, items: { $ref: '#/components/schemas/Lead' } }
        page: { $ref: '#/components/schemas/PageInfo' }

    # ---- Product (rate-card) ----
    Product:
      type: object
      description: A rate-card product. unit_price_minor is integer minor-units — no float money.
      required: [id, workspace_id, name, unit_price_minor, currency, active, source, captured_by, version, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        workspace_id: { type: string, format: uuid }
        name: { type: string }
        sku: { type: [string, 'null'], description: Optional stock-keeping unit; unique per workspace when supplied. }
        description: { type: [string, 'null'] }
        unit_price_minor: { type: integer, format: int64, description: 'Unit price in smallest currency unit (e.g. cents). 150000 EUR-cents = €1,500.00. Never a float.' }
        currency: { type: string, pattern: '^[A-Z]{3}$', description: ISO-4217 uppercase (e.g. EUR, USD). }
        default_tax_rate: { type: [number, 'null'], description: 'Default VAT/tax rate as a decimal (e.g. 0.19 = 19%). Nullable — rate varies by customer/country.' }
        unit: { type: [string, 'null'], description: 'Unit of measure (e.g. day, hour, seat, license). Free text.' }
        active: { type: boolean, default: true, description: Inactive products are hidden from new line-items but remain on existing offers. }
        source: { type: string }
        captured_by: { type: string }
        version: { type: integer, format: int64, description: Monotonic row version for optimistic concurrency (If-Match). }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        archived_at: { type: [string, 'null'], format: date-time }

    CreateProductRequest:
      type: object
      required: [name, unit_price_minor, currency, source, captured_by]
      properties:
        name: { type: string }
        sku: { type: [string, 'null'] }
        description: { type: [string, 'null'] }
        unit_price_minor: { type: integer, format: int64, description: 'Unit price in smallest currency unit. Never a float.' }
        currency: { type: string, pattern: '^[A-Z]{3}$' }
        default_tax_rate: { type: [number, 'null'] }
        unit: { type: [string, 'null'] }
        active: { type: boolean, default: true }
        source: { type: string }
        captured_by: { type: string }

    UpdateProductRequest:
      type: object
      description: Partial update via PUT. Only the fields present in the body are changed; omitted fields are left unchanged. Pass If-Match for optimistic concurrency.
      properties:
        name: { type: string }
        sku: { type: [string, 'null'] }
        description: { type: [string, 'null'] }
        unit_price_minor: { type: integer, format: int64, description: 'Unit price in smallest currency unit. Never a float.' }
        currency: { type: string, pattern: '^[A-Z]{3}$' }
        default_tax_rate: { type: [number, 'null'] }
        unit: { type: [string, 'null'] }
        active: { type: boolean }
        source: { type: string }
        captured_by: { type: string }

    ProductListResponse:
      type: object
      required: [data, page]
      properties:
        data: { type: array, items: { $ref: '#/components/schemas/Product' } }
        page: { $ref: '#/components/schemas/PageInfo' }

    # ---- OfferTemplate (OFFER-WIRE-2) ----
    OfferTemplate:
      type: object
      description: A branded, governed PDF layout for offers (DE/EN). Mirrors the offer_template table.
      required: [id, workspace_id, name, locale, is_default, layout, source, captured_by, version, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        workspace_id: { type: string, format: uuid }
        name: { type: string }
        locale: { type: string, default: de-DE, description: 'DE/EN at launch (e.g. de-DE, en-US).' }
        is_default: { type: boolean, default: false, description: At most one default template per locale (OFFER-DDL-4). }
        layout: { type: object, additionalProperties: true, description: Logo/header/footer/terms-block refs — bounded params, not a CMS. }
        source: { type: string }
        captured_by: { type: string }
        version: { $ref: '#/components/schemas/RowVersion' }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        archived_at: { type: [string, 'null'], format: date-time }

    CreateOfferTemplateRequest:
      type: object
      required: [name, layout, source, captured_by]
      properties:
        name: { type: string }
        locale: { type: string, default: de-DE }
        is_default: { type: boolean, default: false }
        layout: { type: object, additionalProperties: true }
        source: { type: string }
        captured_by: { type: string }

    UpdateOfferTemplateRequest:
      type: object
      description: Full replace via PUT — mirrors UpdateProductRequest's rate-card versioning shape.
      properties:
        name: { type: string }
        locale: { type: string }
        is_default: { type: boolean }
        layout: { type: object, additionalProperties: true }
        source: { type: string }
        captured_by: { type: string }

    OfferTemplateListResponse:
      type: object
      required: [data, page]
      properties:
        data: { type: array, items: { $ref: '#/components/schemas/OfferTemplate' } }
        page: { $ref: '#/components/schemas/PageInfo' }

    # ---- Offer (OFFER-WIRE-3/4) ----
    Offer:
      type: object
      description: |
        A versioned Angebot (offer) bound to one deal. Money totals (net/tax/gross) are
        DERIVED server-side from its line items (OFFER-PARAM-4) — never accepted on
        request (API-ERR-15). Mirrors the offer table.
      required: [id, workspace_id, deal_id, offer_number, revision, status, currency, net_minor, tax_minor, gross_minor, source, captured_by, version, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        workspace_id: { type: string, format: uuid }
        deal_id: { type: string, format: uuid, description: The deal this offer is bound to. }
        offer_number: { type: string, description: Human-facing "Angebot" number; unique per (workspace, offer_number, revision). }
        revision: { type: integer, readOnly: true, description: 'Bumped when a sent offer is regenerated into a new draft (OFFER-PARAM-6); starts at 1.' }
        status: { type: string, enum: [draft, sent, accepted, rejected, expired, superseded], default: draft, readOnly: true, description: 'Editable only while draft (OFFER-WIRE-4); the transition verbs (regenerate/send/accept) are a later ticket (OFFER-WIRE-6..9).' }
        currency: { type: string, pattern: '^[A-Z]{3}$' }
        buyer_org_id: { type: [string, 'null'], format: uuid }
        valid_until: { type: [string, 'null'], format: date, description: Drives the expired status (OFFER-PARAM-3). }
        intro_text: { type: [string, 'null'] }
        terms_text: { type: [string, 'null'] }
        net_minor: { type: integer, format: int64, readOnly: true, description: 'Derived from line items (OFFER-PARAM-4); never accepted on request (API-ERR-15).' }
        tax_minor: { type: integer, format: int64, readOnly: true, description: 'Derived from line items; never accepted on request (API-ERR-15).' }
        gross_minor: { type: integer, format: int64, readOnly: true, description: 'Derived from line items; never accepted on request (API-ERR-15).' }
        template_id: { type: [string, 'null'], format: uuid }
        pdf_asset_ref: { type: [string, 'null'], readOnly: true, description: Rendered PDF ref — set by the render action (OFFER-WIRE-7, later ticket). }
        accepted_at: { type: [string, 'null'], format: date-time, readOnly: true }
        source: { type: string }
        captured_by: { type: string }
        version: { $ref: '#/components/schemas/RowVersion' }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        archived_at: { type: [string, 'null'], format: date-time }
      additionalProperties: true
      x-extension: true

    CreateOfferRequest:
      type: object
      required: [offer_number, currency, source, captured_by]
      properties:
        offer_number: { type: string }
        currency: { type: string, pattern: '^[A-Z]{3}$' }
        buyer_org_id: { type: [string, 'null'], format: uuid }
        valid_until: { type: [string, 'null'], format: date }
        intro_text: { type: [string, 'null'] }
        terms_text: { type: [string, 'null'] }
        template_id: { type: [string, 'null'], format: uuid }
        source: { type: string }
        captured_by: { type: string }
      additionalProperties: true
      x-extension: true

    OfferListResponse:
      type: object
      required: [data, page]
      properties:
        data: { type: array, items: { $ref: '#/components/schemas/Offer' } }
        page: { $ref: '#/components/schemas/PageInfo' }

    UpdateOfferRequest:
      type: object
      description: Partial update via PATCH. Only fields present in the body are changed. Allowed only while status=draft (handler concern, out of this contract-only ticket).
      properties:
        currency: { type: string, pattern: '^[A-Z]{3}$' }
        buyer_org_id: { type: [string, 'null'], format: uuid }
        valid_until: { type: [string, 'null'], format: date }
        intro_text: { type: [string, 'null'] }
        terms_text: { type: [string, 'null'] }
        template_id: { type: [string, 'null'], format: uuid }
        source: { type: string }
        captured_by: { type: string }
      additionalProperties: true
      x-extension: true

    # ---- OfferLineItem (OFFER-WIRE-5) ----
    OfferLineItem:
      type: object
      description: |
        A typed line item on an offer; price is a snapshot copied from product (never
        re-read after send). Mirrors the offer_line_item table. Line totals
        (line_net/line_tax/line_total) are DERIVED — never wire fields (API-ERR-15).
      required: [id, workspace_id, offer_id, position, description, unit, quantity, unit_price_minor, discount_pct, tax_rate, source, captured_by, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        workspace_id: { type: string, format: uuid }
        offer_id: { type: string, format: uuid }
        position: { type: integer, description: Display order; unique per offer. }
        product_id: { type: [string, 'null'], format: uuid, description: Optional rate-card reference; price/description are copied onto the line as a snapshot on pick. }
        description: { type: string, description: 'Snapshot — free-typed or copied from the referenced product.' }
        unit: { type: string, default: unit }
        quantity: { type: number, minimum: 0, description: 'numeric(14,3); must be > 0 (handler-enforced).' }
        unit_price_minor: { type: integer, format: int64, description: 'Snapshot — never re-read from product after send. Never a float.' }
        discount_pct: { type: number, minimum: 0, maximum: 100, default: 0 }
        tax_rate: { type: number, default: 0, description: 'Percent (e.g. 19.00 = DE USt.); defaults from the referenced product''s default_tax_rate on pick, per-line override allowed.' }
        source: { type: string }
        captured_by: { type: string }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        archived_at: { type: [string, 'null'], format: date-time }
      additionalProperties: true
      x-extension: true

    CreateOfferLineItemRequest:
      type: object
      required: [position, description, quantity, unit_price_minor, source, captured_by]
      properties:
        position: { type: integer }
        product_id: { type: [string, 'null'], format: uuid }
        description: { type: string }
        unit: { type: string, default: unit }
        quantity: { type: number, minimum: 0 }
        unit_price_minor: { type: integer, format: int64 }
        discount_pct: { type: number, minimum: 0, maximum: 100, default: 0 }
        tax_rate: { type: number, default: 0 }
        source: { type: string }
        captured_by: { type: string }
      additionalProperties: true
      x-extension: true

    UpdateOfferLineItemRequest:
      type: object
      description: Partial update via PATCH. Only fields present in the body are changed.
      properties:
        position: { type: integer }
        product_id: { type: [string, 'null'], format: uuid }
        description: { type: string }
        unit: { type: string }
        quantity: { type: number, minimum: 0 }
        unit_price_minor: { type: integer, format: int64 }
        discount_pct: { type: number, minimum: 0, maximum: 100 }
        tax_rate: { type: number }
        source: { type: string }
        captured_by: { type: string }
      additionalProperties: true
      x-extension: true

    OfferLineItemListResponse:
      type: object
      required: [data, page]
      properties:
        data: { type: array, items: { $ref: '#/components/schemas/OfferLineItem' } }
        page: { $ref: '#/components/schemas/PageInfo' }

    # ---- DraftingAsset ----
    DraftingAsset:
      type: object
      description: A governed drafting asset (template, copy fragment, or reusable content) in the retrieval store.
      required: [id, workspace_id, kind, title, body, approval_state, owner, source, captured_by, version, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        workspace_id: { type: string, format: uuid }
        kind: { type: string, description: 'Asset kind (e.g. template, snippet, brief). Free text.' }
        title: { type: string, description: Human-readable asset title. }
        body: { type: string, description: 'Asset body / content. Retrieval-only — no rendering or template-execution here.' }
        approval_state: { type: string, enum: [draft, approved, expired], description: Lifecycle state. Only approved assets appear in ListAvailable. }
        owner: { type: string, description: 'Owner identifier (e.g. human:<uuid> or team:<uuid>).' }
        expires_at: { type: [string, 'null'], format: date-time, description: 'Optional expiry timestamp. Past this point the asset is excluded from ListAvailable even if approval_state=approved.' }
        approved_by: { type: [string, 'null'], format: uuid, description: Set when approval_state transitions to approved. }
        approved_at: { type: [string, 'null'], format: date-time, description: Set when approval_state transitions to approved. }
        source: { type: string, description: 'How this asset was captured (e.g. ui, import, agent).' }
        captured_by: { type: string, description: 'Actor that captured the asset (e.g. human:<uuid>, agent:<id>).' }
        version: { type: integer, format: int64, description: Monotonic row version for optimistic concurrency (If-Match). }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        archived_at: { type: [string, 'null'], format: date-time }

    DraftingAssetCreate:
      type: object
      required: [kind, title, body, owner, source, captured_by]
      properties:
        kind: { type: string }
        title: { type: string }
        body: { type: string }
        owner: { type: string }
        expires_at: { type: [string, 'null'], format: date-time }
        source: { type: string }
        captured_by: { type: string }

    DraftingAssetUpdate:
      type: object
      description: Partial update — only the fields present in the body are changed; pass If-Match for optimistic concurrency.
      properties:
        kind: { type: string }
        title: { type: string }
        body: { type: string }
        owner: { type: string }
        expires_at: { type: [string, 'null'], format: date-time }

    DraftingAssetListResponse:
      type: object
      required: [data, page]
      properties:
        data: { type: array, items: { $ref: '#/components/schemas/DraftingAsset' } }
        page: { $ref: '#/components/schemas/PageInfo' }

    # ---- Invoice ----
    Invoice:
      type: object
      description: An invoice derived from an accepted offer. Money fields are integer minor-units — no float money.
      required: [id, workspace_id, offer_id, invoice_number, status, currency, net_minor, tax_minor, gross_minor, source, captured_by, version, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        workspace_id: { type: string, format: uuid }
        offer_id: { type: string, format: uuid, description: The offer this invoice was derived from. }
        invoice_number: { type: string, description: Human-readable invoice identifier; unique per workspace. }
        status: { type: string, enum: [draft, issued], description: draft on creation; issued after the invoice is sent. }
        currency: { type: string, pattern: '^[A-Z]{3}$', description: ISO-4217 uppercase (e.g. EUR, USD). Copied from the source offer. }
        net_minor: { type: integer, format: int64, description: 'Net amount in smallest currency unit (e.g. cents). Copied from offer — never free-typed.' }
        tax_minor: { type: integer, format: int64, description: 'Tax amount in smallest currency unit. Copied from offer — never free-typed.' }
        gross_minor: { type: integer, format: int64, description: 'Gross amount (net + tax) in smallest currency unit. Copied from offer — never free-typed.' }
        issued_at: { type: [string, 'null'], format: date-time, description: Set when status transitions to issued. }
        source: { type: string }
        captured_by: { type: string }
        version: { type: integer, format: int64, description: Monotonic row version for optimistic concurrency. }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    GenerateInvoiceRequest:
      type: object
      description: |
        Request to generate an invoice from an accepted offer.
        net/tax/gross totals are derived from the offer — do NOT pass money fields here.
      required: [offer_id, invoice_number, source, captured_by]
      properties:
        offer_id: { type: string, format: uuid, description: The accepted offer to derive totals from. }
        invoice_number: { type: string, description: Human-readable invoice identifier; must be unique per workspace. }
        source: { type: string }
        captured_by: { type: string }

    InvoiceListResponse:
      type: object
      required: [data, page]
      properties:
        data: { type: array, items: { $ref: '#/components/schemas/Invoice' } }
        page: { $ref: '#/components/schemas/PageInfo' }

    # ---- List / Tag ----
    List:
      type: object
      description: A static membership set or a dynamic segment. Mirrors the `list` table.
      required: [id, workspace_id, name, entity_type, list_type]
