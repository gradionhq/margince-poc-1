      operationId: logout
      summary: Delete session + clear cookie.
      responses:
        '200':
          description: Logged out.

  # ------------------------------- /passports -------------------------------
  /passports:
    post:
      tags: [Identity]
      operationId: createPassport
      summary: Create Agent Seat Passport (scopes bounded by granting human's RBAC).
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PassportCreateRequest' }
      responses:
        '201':
          description: Passport created. Token only returned here.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PassportResponse' }
        '422':
