openapi: 3.1.0

# =============================================================================
# Margince — V1 Core API Contract (contract-first source of truth)
# -----------------------------------------------------------------------------
# This file is THE contract from which Go server stubs + TS client types are
# generated (P3 contract-first). It mirrors spec/data-model.md field-for-field
# and encodes the acceptance criteria of features/01-core-objects.md,
# features/03-reporting-and-scoring.md, features/07-ai-native-moments.md, and
# the MCP tool surface of 03b-ai-architecture.md.
#
# Conventions (full text in ./README.md):
#   - Resources are plural nouns (/people, /organizations, /deals, ...).
#   - Pagination is cursor-based: ?cursor=&limit= -> { data, page: {next_cursor, has_more} }.
#   - Errors are RFC 7807 problem+json with a stable machine `code`, plus `details`.
#   - Auth is bearer JWT (workspace + user/agent principal in claims).
#   - POST is idempotent via the `Idempotency-Key` header.
#   - Every domain response carries provenance: `source` + `captured_by`.
#   - Soft-delete only: archive endpoints set `archived_at`; rows stay fetchable by id.
#   - Client custom fields appear additively, marked with the `x-extension` vendor key.
#   - Operations that back a Layer-1 MCP tool verb carry `x-mcp-tool` with a 🟢/🟡 tier.
#
# Deferred areas (NOT specified here — see data-model.md §12): sequences/cadences,
# overlay-on-incumbents read model, telephony/click-to-call, the dedicated
# embedding store, per-purpose consent, workflow-run records. They are commented
# stubs at the bottom of `paths` so the shape is intentional but unspecified.
# =============================================================================

info:
  title: Margince API
  version: 1.0.0-draft
  summary: AI-native, open-source CRM core — people, orgs, deals, pipelines, activities, leads, plus the agent/AI surface.
  description: |
    The V1 core CRM contract. Derived from `spec/data-model.md` (the canonical
    Postgres schema), `spec/features/01-core-objects.md` (endpoint acceptance
    criteria), `spec/features/03-reporting-and-scoring.md`,
    `spec/features/07-ai-native-moments.md`, and `spec/03b-ai-architecture.md`
    (the MCP tool surface). Every component schema mirrors a table; the agent
    MCP tool surface maps onto these same REST operations via `x-mcp-tool`.
  license:
    name: BUSL-1.1
    identifier: BUSL-1.1
  contact:
    name: Gradion
    email: lars@gradion.com

servers:
  - url: https://{workspace}.api.gradion.com/v1
    description: Per-workspace production host
    variables:
      workspace:
        default: demo
        description: Workspace slug (tenant). Tenant is also asserted from the JWT claims.
  - url: http://localhost:8080/v1
    description: Local development

security:
  - bearerAuth: []

tags:
  - name: People
    description: Person (contact) records, their emails and phones.
  - name: Organizations
    description: Company records and their domains.
  - name: Relationships
    description: The typed relationship edge (employment + deal stakeholder).
  - name: Deals
    description: Deals, including stage advancement.
  - name: Pipelines
    description: Pipelines and their ordered stages.
  - name: Activities
    description: Polymorphic activity timeline (email/call/meeting/note/task).
  - name: Leads
    description: Thin, segregated machine/bulk-sourced prospects + promotion.
  - name: Products
    description: Rate-card products (the line-item catalogue for offers/quotes). Optional — a workspace may quote free-form.
  - name: Invoices
    description: Invoices derived from accepted offers — totals are copied from the offer snapshot, never free-typed.
  - name: Imports
    description: Workspace import runs — mandatory dry-run, validation report, and approved resumable execution.
  - name: Lists
    description: Static and dynamic-segment lists.
  - name: Tags
    description: Tags applicable to people/orgs/deals/leads.
  - name: Reports
    description: Run validated, typed reports (the clean-core HubSpot fix).
  - name: Search
    description: Cross-object search.
  - name: AI
    description: AI-native moments — cold-start read-back and proposals.
  - name: Approvals
    description: The 🟡 confirm-first approval inbox (approve/reject staged agent actions).
  - name: DraftingAssets
    description: Governed retrieval store for drafting assets (templates, copy fragments, reusable content). Approve/expire require the `curate` permission (admin/manager only — ADR-0009 / features/07 §7b).
  - name: Identity
    description: Current user / principal.
  - name: DealRooms
    description: Deal rooms — published shared spaces with disclosed-consent access control (B-E08.5/B-E08.6).

# =============================================================================
paths:

  # ------------------------------- /me --------------------------------------
  /me:
    get:
      tags: [Identity]
      operationId: getCurrentPrincipal
      summary: Get the current authenticated principal (user or agent).
      responses:
        '200':
          description: The current principal.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MeResponse' }
              examples:
                human:
                  value:
                    user:
                      id: 018f3a1b-0000-7000-8000-000000000001
                      workspace_id: 018f3a1b-0000-7000-8000-0000000000ff
                      email: jane@acme.com
                      display_name: Jane Rep
                      timezone: Europe/Berlin
                      status: active
                      is_agent: false
                      created_at: '2026-01-02T09:00:00Z'
                      updated_at: '2026-01-02T09:00:00Z'
                      archived_at: null
                    roles: [rep]
                    teams: [018f3a1b-0000-7000-8000-0000000000ab]
        '401': { $ref: '#/components/responses/Unauthorized' }

  # ------------------------------- /people ----------------------------------
  /people:
    get:
      tags: [People]
      operationId: listPeople
      summary: List people (live by default; cursor-paginated).
      description: Default view excludes archived rows (`archived_at IS NULL`). Leads never appear here.
      x-mcp-tool:
        verb: search_records
        record_type: person
        tier: green
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/IncludeArchived'
        - name: owner_id
          in: query
          schema: { type: string, format: uuid }
          description: Filter to a single owner.
        - name: q
          in: query
          schema: { type: string }
          description: Full-text query over name/title (tsvector).
        - name: tag
          in: query
          schema: { type: string }
          description: Filter by tag name.
      responses:
        '200':
          description: A page of people.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PersonListResponse' }
              examples:
                page:
                  value:
                    data:
                      - id: 018f3a1b-0000-7000-8000-000000000010
                        workspace_id: 018f3a1b-0000-7000-8000-0000000000ff
                        full_name: Dana Buyer
                        first_name: Dana
                        last_name: Buyer
                        title: VP Engineering
                        owner_id: 018f3a1b-0000-7000-8000-000000000001
                        social: { linkedin: 'https://linkedin.com/in/danabuyer' }
                        address: null
                        emails:
                          - id: 018f3a1b-0000-7000-8000-000000000011
                            person_id: 018f3a1b-0000-7000-8000-000000000010
                            email: dana@acme.com
                            email_type: work
                            is_primary: true
                            position: 0
                            source: 'email:CAF=abc@mail'
                            captured_by: 'agent:capture'
                            created_at: '2026-05-02T10:00:00Z'
                            updated_at: '2026-05-02T10:00:00Z'
                            archived_at: null
                        phones: []
                        consent_state: unknown
                        merged_into_id: null
                        converted_from_lead_id: null
                        source: 'email:CAF=abc@mail'
                        captured_by: 'agent:capture'
                        created_at: '2026-05-02T10:00:00Z'
                        updated_at: '2026-05-02T10:00:00Z'
                        archived_at: null
                    page: { next_cursor: 'eyJpZCI6IjAxOGYzYTFiIn0', has_more: true }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { $ref: '#/components/responses/ValidationError' }
    post:
      tags: [People]
      operationId: createPerson
      summary: Create a person.
      description: |
        With name + email returns 201 and a stable `id` (UUID) that round-trips on GET
        (features/01 §1.1 AC). If the email already exists on a live person, returns 409
        with the existing person id (features/01 §1.3). Writes one audit row + one
        `person.created` event.
      x-mcp-tool:
        verb: create_record
        record_type: person
        tier: green
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreatePersonRequest' }
            examples:
              minimal:
                summary: Name + email (the §1.1 acceptance case)
                value:
                  full_name: Dana Buyer
                  emails:
                    - { email: dana@acme.com, email_type: work, is_primary: true }
                  source: ui
                  captured_by: 'human:018f3a1b-0000-7000-8000-000000000001'
      responses:
        '201':
          description: Created. Body round-trips identically on GET.
          headers:
            Location:
              schema: { type: string }
              description: URL of the created person.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Person' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '409':
          description: An email on the request already belongs to a live person.
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }
              examples:
                duplicate:
                  value:
                    type: 'https://errors.margince.com/duplicate_email'
                    title: Duplicate email
                    status: 409
                    code: duplicate_email
                    detail: An active person already owns dana@acme.com.
                    details:
                      existing_id: 018f3a1b-0000-7000-8000-000000000010
                      field: emails[0].email
        '422': { $ref: '#/components/responses/ValidationError' }

  /people/{id}:
    parameters:
      - $ref: '#/components/parameters/Id'
    get:
      tags: [People]
      operationId: getPerson
      summary: Get a person by id (the 360 record).
      description: Fetchable by id even when archived (features/01 §1.1 AC).
      x-mcp-tool: { verb: read_record, record_type: person, tier: green }
      responses:
        '200':
          description: The person.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Person' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
    patch:
      tags: [People]
      operationId: updatePerson
      summary: Update a person (partial).
      x-mcp-tool: { verb: update_record, record_type: person, tier: green }
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdatePersonRequest' }
      responses:
        '200':
          description: Updated person.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Person' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '422': { $ref: '#/components/responses/ValidationError' }
    delete:
      tags: [People]
      operationId: archivePerson
      summary: Archive (soft-delete) a person.
      description: |
        Sets `archived_at`, removes from default lists, retains in audit; the row is
        still fetchable by id (features/01 §1.1 AC). No hard delete by default.
      x-mcp-tool: { verb: update_record, record_type: person, tier: yellow }
      responses:
        '200':
          description: Archived person (now carries a non-null `archived_at`).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Person' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /people/{id}/merge:
    parameters:
      - $ref: '#/components/parameters/Id'
    post:
      tags: [People]
      operationId: mergePerson
      summary: Merge this person into a target (non-lossy).
      description: |
        Merge A→B relinks A's emails/phones/relationships/activity links to B with zero
        orphaned FKs, archives A with `merged_into_id = B` (features/01 §1.3). One audit
        transaction; reversible within audit.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [target_id]
              properties:
                target_id:
                  type: string
                  format: uuid
                  description: The surviving person (B). This row (A) is archived.
      responses:
        '200':
          description: The surviving (target) person after merge.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Person' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/ValidationError' }

  # --------------------------- /organizations -------------------------------
  /organizations:
    get:
      tags: [Organizations]
      operationId: listOrganizations
      summary: List organizations (live by default; cursor-paginated).
      x-mcp-tool: { verb: search_records, record_type: organization, tier: green }
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/IncludeArchived'
        - name: owner_id
          in: query
          schema: { type: string, format: uuid }
        - name: domain
          in: query
          schema: { type: string }
          description: Lookup by normalized domain (the employer-inference index).
        - name: q
          in: query
          schema: { type: string }
      responses:
        '200':
          description: A page of organizations.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OrganizationListResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
    post:
      tags: [Organizations]
      operationId: createOrganization
      summary: Create an organization.
      description: Domains are normalized/lowercased and unique per workspace (409 on collision).
      x-mcp-tool: { verb: create_record, record_type: organization, tier: green }
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateOrganizationRequest' }
            examples:
              minimal:
                value:
                  display_name: Acme Inc
                  domains: [{ domain: acme.com, is_primary: true }]
                  source: ui
                  captured_by: 'human:018f3a1b-0000-7000-8000-000000000001'
      responses:
        '201':
          description: Created organization.
          headers:
            Location: { schema: { type: string } }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Organization' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '409':
          description: A domain already maps to another organization.
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /organizations/{id}:
    parameters:
      - $ref: '#/components/parameters/Id'
    get:
      tags: [Organizations]
      operationId: getOrganization
      summary: Get an organization by id (the 360 record).
      x-mcp-tool: { verb: read_record, record_type: organization, tier: green }
      responses:
        '200':
          description: The organization.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Organization' }
        '404': { $ref: '#/components/responses/NotFound' }
    patch:
      tags: [Organizations]
      operationId: updateOrganization
      summary: Update an organization (partial).
      x-mcp-tool: { verb: update_record, record_type: organization, tier: green }
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateOrganizationRequest' }
      responses:
        '200':
          description: Updated organization.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Organization' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '422': { $ref: '#/components/responses/ValidationError' }
    delete:
      tags: [Organizations]
      operationId: archiveOrganization
      summary: Archive (soft-delete) an organization.
      x-mcp-tool: { verb: update_record, record_type: organization, tier: yellow }
      responses:
        '200':
          description: Archived organization.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Organization' }
        '404': { $ref: '#/components/responses/NotFound' }

  /organizations/{id}/merge:
    parameters:
      - $ref: '#/components/parameters/Id'
    post:
      tags: [Organizations]
      operationId: mergeOrganization
      summary: Merge this organization into a target (non-lossy).
      description: |
        Merge A→B relinks A's domains, people-employment, deals, relationships and activity links to
        B with zero orphaned FKs, archives A with `merged_into_id = B`. Mirrors person merge
        (features/01 §1.3). One audit transaction (action `merge`); reversible within audit. This is
        the org half of the `merge_records` MCP verb.
      x-mcp-tool: { verb: merge_records, record_type: organization, tier: yellow }
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/ApprovalToken'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [target_id]
              properties:
                target_id: { type: string, format: uuid, description: The surviving org (B). This row (A) is archived. }
      responses:
        '200':
          description: The surviving (target) organization after merge.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Organization' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /organizations/{id}/partner:
    parameters:
      - $ref: '#/components/parameters/Id'
    put:
      tags: [Organizations, Partners]
      operationId: upsertPartner
      summary: Create/update the partner extension on an org (sets classification='partner').
      description: |
        Promotes an org to a first-class partner (A41/ADR-0032) by upserting its `partner` row and
        setting `classification='partner'`. Company identity is never duplicated. 🟢 admin write.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpsertPartnerRequest' }
      responses:
        '200':
          description: The partner record.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Partner' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/ValidationError' }
    get:
      tags: [Organizations, Partners]
      operationId: getPartner
      summary: Read the partner extension on an org (404 if the org is not a partner).
      responses:
        '200':
          description: The partner record.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Partner' }
        '404': { $ref: '#/components/responses/NotFound' }

  /partners:
    get:
      tags: [Partners]
      operationId: listPartners
      summary: List partner organizations (orgs with a partner row), filterable by role/cert status.
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Sort'
        - name: partner_role
          in: query
          schema: { type: string, enum: [hosting, consulting, strategic] }
        - name: cert_status
          in: query
          schema: { type: string, enum: [prospect, in_certification, certified, suspended, churned] }
      x-mcp-tool: { verb: search_records, record_type: partner, tier: green }
      responses:
        '200':
          description: A page of partner records.
          content:
            application/json:
              schema:
                type: object
                required: [data, page]
                properties:
                  data: { type: array, items: { $ref: '#/components/schemas/Partner' } }
                  page: { $ref: '#/components/schemas/PageInfo' }

  # ------------------------------ /deals ------------------------------------
  /deals:
    get:
      tags: [Deals]
      operationId: listDeals
      summary: List deals (live by default; cursor-paginated). Supports Kanban-by-stage reads.
      x-mcp-tool: { verb: search_records, record_type: deal, tier: green }
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/IncludeArchived'
        - name: pipeline_id
          in: query
          schema: { type: string, format: uuid }
        - name: stage_id
          in: query
          schema: { type: string, format: uuid }
          description: Read one Kanban column.
        - name: owner_id
          in: query
          schema: { type: string, format: uuid }
        - name: organization_id
          in: query
          schema: { type: string, format: uuid }
        - name: status
          in: query
          schema: { type: string, enum: [open, won, lost] }
        - name: stalled
          in: query
          schema: { type: boolean }
          description: Deterministic stalled flag (no activity past the threshold).
      responses:
        '200':
          description: A page of deals.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DealListResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
    post:
      tags: [Deals]
      operationId: createDeal
      summary: Create a deal.
      description: |
        Amount is integer minor-units + ISO-4217 currency (no float money). The stage
        must belong to the deal's pipeline (422 otherwise). Deals attach to person/org,
        never to a raw lead (ADR-0008 §5).
      x-mcp-tool: { verb: create_record, record_type: deal, tier: green }
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateDealRequest' }
            examples:
              minimal:
                value:
                  name: Acme — Platform expansion
                  amount_minor: 5000000
                  currency: EUR
                  pipeline_id: 018f3a1b-0000-7000-8000-0000000000c0
                  stage_id: 018f3a1b-0000-7000-8000-0000000000c1
                  organization_id: 018f3a1b-0000-7000-8000-000000000020
                  source: ui
                  captured_by: 'human:018f3a1b-0000-7000-8000-000000000001'
      responses:
        '201':
          description: Created deal.
          headers:
            Location: { schema: { type: string } }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Deal' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422':
          description: Validation error (e.g. stage not in pipeline, lost without lost_reason).
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }
              examples:
                stage_mismatch:
                  value:
                    type: 'https://errors.margince.com/validation_error'
                    title: Validation failed
                    status: 422
                    code: validation_error
                    detail: stage_id does not belong to pipeline_id.
                    details:
                      errors:
                        - { field: stage_id, code: stage_not_in_pipeline }

  /deals/{id}:
    parameters:
      - $ref: '#/components/parameters/Id'
    get:
      tags: [Deals]
      operationId: getDeal
      summary: Get a deal by id (the 360 record).
      x-mcp-tool: { verb: read_record, record_type: deal, tier: green }
      responses:
        '200':
          description: The deal.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Deal' }
        '404': { $ref: '#/components/responses/NotFound' }
    patch:
      tags: [Deals]
      operationId: updateDeal
      summary: Update a deal (partial). Closing requires terminal status + lost_reason if lost.
      x-mcp-tool: { verb: update_record, record_type: deal, tier: green }
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateDealRequest' }
      responses:
        '200':
          description: Updated deal.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Deal' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '422': { $ref: '#/components/responses/ValidationError' }
    delete:
      tags: [Deals]
      operationId: archiveDeal
      summary: Archive (soft-delete) a deal.
      x-mcp-tool: { verb: update_record, record_type: deal, tier: yellow }
      responses:
        '200':
          description: Archived deal.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Deal' }
        '404': { $ref: '#/components/responses/NotFound' }

  /deals/{id}/restore:
    parameters:
      - $ref: '#/components/parameters/Id'
    post:
      tags: [Deals]
      operationId: restoreDeal
      summary: Restore (un-archive) a soft-deleted deal.
      description: |
        Inverse of `archiveDeal`: clears `archived_at`, restoring the deal to default
        list visibility. Triggers `deal.restored` (DEAL-EVT-6). Restoring an already-live
        deal is a no-op success (idempotent read-modify-write); restoring a deal that was
        never archived still returns 200 with the unchanged deal. 🟢 — undoing a soft-delete
        carries no data-loss risk, unlike `archiveDeal` (🟡).
      x-mcp-tool: { verb: update_record, record_type: deal, tier: green }
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '200':
          description: "Restored deal (now carries `archived_at: null`)."
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Deal' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /deals/{id}/advance:
    parameters:
      - $ref: '#/components/parameters/Id'
    post:
      tags: [Deals]
      operationId: advanceDeal
      summary: Advance a deal to a new stage (audit-logged with prior + next stage).
      description: |
        The `advance_deal` MCP verb. Writes one `deal_stage_history` row + one audit row
        (action `advance_stage`) recording prior + next stage; closed-won emits `deal.stage_changed` (to_status=won).
        Advancing to a closed-won/closed-lost stage is 🟡 confirm-first (irreversible /
        touches money) — for an agent caller this requires an approval token.
      # advance_deal is the one TierDynamic tool (A34/ADR-0026): the gate resolves the tier from the
      # TARGET stage's semantic, NOT statically. open→open = 🟢 (no token); advancing INTO a
      # won/lost terminal stage = 🟡 (approval token required). The resolver reads the target stage's
      # `semantic` from pipeline config (and the overlay stage-mapping in overlay mode), not just the
      # request args — see interfaces.md §2.1 (TierDynamic) and events.md §5.3.
      x-mcp-tool: { verb: advance_deal, record_type: deal, tier: dynamic, tier_resolver: target_stage_semantic, yellow_when: 'target stage semantic in (won, lost)' }
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/ApprovalToken'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AdvanceDealRequest' }
            examples:
              advance:
                value:
                  to_stage_id: 018f3a1b-0000-7000-8000-0000000000c2
              closeWon:
                summary: Closing won (🟡 — requires approval token for agents)
                value:
                  to_stage_id: 018f3a1b-0000-7000-8000-0000000000c9
                  status: won
      responses:
        '200':
          description: The deal at its new stage.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Deal' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403':
          description: RBAC denied, or a 🟡 transition attempted without an approval token.
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }
              examples:
                approvalRequired:
                  value:
                    type: 'https://errors.margince.com/approval_required'
                    title: Approval required
                    status: 403
                    code: approval_required
                    detail: Advancing to a closed-won stage is confirm-first; supply an approval token.
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /deals/{id}/stakeholders:
    parameters:
      - $ref: '#/components/parameters/Id'
    get:
      tags: [Deals]
      operationId: listDealStakeholders
      summary: List a deal's stakeholders (deal↔person relationships).
      responses:
        '200':
          description: Stakeholder relationships for the deal.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RelationshipListResponse' }
        '404': { $ref: '#/components/responses/NotFound' }

  /deals/{id}/next-step:
    parameters:
      - $ref: '#/components/parameters/Id'
    get:
      tags: [Deals]
      operationId: getDealNextStep
      summary: One evidence-grounded inferred next step for the deal (pure read; zero writes).
      description: |
        Surfaces at most one inferred next step assembled from the deal's recent captured
        activity. The step ALWAYS carries a non-empty evidence snippet + source activity id,
        or it is omitted (no-guess gate). A no-signal deal returns inferred:false. Surfacing
        issues zero writes (no task, no deal-field mutation).
      responses:
        '200':
          description: The inferred next step, or an honest no-step.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/InferredNextStep' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  /deals/{id}/next-step:accept:
    parameters:
      - $ref: '#/components/parameters/Id'
    post:
      tags: [Deals]
      operationId: acceptDealNextStep
      summary: Accept an inferred next step into exactly one task (idempotent).
      description: |
        Creates exactly one activity(kind=task) from the confirmed inferred step, owner +
        due date where the evidence stated them, stamped with provenance pointing to the
        source activity, plus one audit row. Idempotent under Idempotency-Key (a replay
        creates no duplicate). An accept that edits owner/due/text stamps captured_by=human:*;
        an unedited accept stamps agent:*.
      x-mcp-tool: { verb: accept_next_step, record_type: activity, tier: green }
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AcceptNextStepRequest' }
      responses:
        '201':
          description: The created task activity.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Activity' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /deals/{id}/kpi-signals:
    parameters:
      - $ref: '#/components/parameters/Id'
    get:
      tags: [Deals]
      operationId: getDealKPISignals
      summary: Inferred KPI signals for a deal (pure read; zero writes).
      description: |
        Returns close_likelihood, service_line, expected_volume, and timing as
        evidenced signals assembled from the deal's recent captured call activity.
        Each signal carries a non-empty evidence_snippet + evidence_source_id, or
        it is omitted (no-guess gate). A deal with no grounding evidence returns an
        empty signals array. Running this endpoint performs zero deal-field mutations.
        Any KPI with a prior human override (verdict=corrected) shows the human
        corrected_value, not a re-inferred one (A26 guard).
      responses:
        '200':
          description: The evidenced KPI signals for the deal.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DealKPISignals' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  /deals/{id}/kpi-signals/{key}:override:
    parameters:
      - $ref: '#/components/parameters/Id'
      - name: key
        in: path
        required: true
        description: The KPI key to override (close_likelihood | service_line | expected_volume | timing).
        schema: { type: string }
    post:
      tags: [Deals]
      operationId: overrideDealKPISignal
      summary: Override an inferred KPI — persists one ai_feedback row (🟡 requires approval).
      description: |
        A human override of an inferred KPI writes exactly one ai_feedback row
        (verdict=corrected, corrected_value=the human value, created_by=the human)
        keyed on the deterministic claim_key for that KPI. A re-override of the same
        KPI updates the same row via the UNIQUE suppression key (upsert, not a second
        row). After an override, a fresh GET /deals/{id}/kpi-signals shows the human
        corrected_value for that KPI (A26 guard). The deal's own fields are never
        mutated by this endpoint.
      x-mcp-tool: { verb: override_deal_kpi_signal, record_type: ai_feedback, tier: yellow }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/KPIOverrideRequest' }
      responses:
        '200':
          description: The upserted ai_feedback row (or 201 on first insert — callers should accept both).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/KPIOverrideResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /deals/{id}/people-signals:
    parameters:
      - $ref: '#/components/parameters/Id'
    get:
      tags: [Deals]
      operationId: getDealPeopleSignals
      summary: Evidenced warm/neutral/blocking signals for a deal's stakeholders (pure read; zero writes).
      description: |
        Returns each consented stakeholder for the deal labeled warm, neutral, or blocking,
        with the supporting contact_ids and activity_ids that justify any non-neutral label
        (no mystery score — AC1). A stakeholder with no supporting evidence is neutral by
        default; neutral labels carry empty id arrays. A prior human correction
        (verdict=corrected in ai_feedback) replaces the derived label for that person (A26).
        Unconsented persons are excluded — 0 person rows for unconsented/orphan signals (P12).
        Running this endpoint performs zero deal-field or person-field mutations.
      responses:
        '200':
          description: The evidenced people signals for the deal.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DealPeopleSignals' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  /deals/{id}/people-signals/{personId}:correct:
    parameters:
      - $ref: '#/components/parameters/Id'
      - name: personId
        in: path
        required: true
        description: The person id whose relationship label is being corrected.
        schema: { type: string, format: uuid }
    post:
      tags: [Deals]
      operationId: correctPersonSignal
      summary: Correct a person's warm/neutral/blocking label — persists one ai_feedback row (🟡 requires approval).
      description: |
        A human correction of a person's relationship label writes exactly one ai_feedback row
        (subject_type=person, claim_kind=signal, verdict=corrected, corrected_value=the human label)
        keyed on the deterministic claim_key for that (deal, person) pair. A re-correction of the
        same person on the same deal updates the same row via the UNIQUE suppression key (upsert,
        not a second row — A26). After a correction, a fresh GET /deals/{id}/people-signals shows
        the human label for that person. The deal's and person's own fields are never mutated.
      x-mcp-tool: { verb: correct_person_signal, record_type: ai_feedback, tier: yellow }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PersonSignalCorrectRequest' }
      responses:
        '200':
          description: The upserted ai_feedback row.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PersonSignalCorrectResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/ValidationError' }

  # ---------------------------- /pipelines ----------------------------------
  /pipelines:
