        '403': { $ref: '#/components/responses/Forbidden' }
        '409': { $ref: '#/components/responses/Conflict' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /stages/{id}:
    parameters:
      - $ref: '#/components/parameters/Id'
    get:
      tags: [Pipelines]
      operationId: getStage
      summary: Get a stage by id.
      responses:
        '200':
          description: The stage.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Stage' }
        '404': { $ref: '#/components/responses/NotFound' }
    patch:
      tags: [Pipelines]
      operationId: updateStage
      summary: Update a stage (rename / reorder / probability).
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateStageRequest' }
      responses:
        '200':
          description: Updated stage.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Stage' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '422': { $ref: '#/components/responses/ValidationError' }
    delete:
      tags: [Pipelines]
      operationId: archiveStage
      summary: Archive (soft-delete) a stage.
