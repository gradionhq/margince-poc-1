            application/json:
              schema: { $ref: '#/components/schemas/OfferTemplate' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
    put:
      tags: [OfferTemplates]
      operationId: updateOfferTemplate
      summary: Update an offer template (full replace — all writable fields replaced).
