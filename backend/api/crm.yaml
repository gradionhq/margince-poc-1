        '403': { $ref: '#/components/responses/Forbidden' }
    post:
      tags: [Products]
      operationId: createProduct
      summary: Create a product (rate-card entry).
      description: |
        SKU is optional but must be unique per workspace if supplied (409 on collision).
        unit_price_minor is integer minor-units (e.g. cents) — no float money.
      x-mcp-tool: { verb: create_record, record_type: product, tier: green }
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateProductRequest' }
            examples:
              minimal:
                value:
                  name: Consulting Day
                  unit_price_minor: 150000
                  currency: EUR
                  source: ui
                  captured_by: 'human:018f3a1b-0000-7000-8000-000000000001'
      responses:
        '201':
          description: Created product.
          headers:
            Location: { schema: { type: string } }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Product' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '409':
          description: A product with this SKU already exists in the workspace.
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }
              examples:
                product_sku_duplicate:
                  value:
                    type: 'https://errors.margince.com/product_sku_duplicate'
                    title: Duplicate SKU
                    status: 409
                    code: product_sku_duplicate
                    detail: A product with this SKU already exists.
                    details:
                      existing_id: 018f3a1b-0000-7000-8000-000000000050
                      field: sku
        '422': { $ref: '#/components/responses/ValidationError' }

  /products/{id}:
    parameters:
      - $ref: '#/components/parameters/Id'
    get:
      tags: [Products]
      operationId: getProduct
      summary: Get a product by id.
      x-mcp-tool: { verb: read_record, record_type: product, tier: green }
      responses:
        '200':
          description: The product.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Product' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
    put:
      tags: [Products]
      operationId: updateProduct
      summary: Update a product (full replace — all writable fields replaced).
      description: Uses PUT (not PATCH) for full-replace semantics matching rate-card versioning.
      x-mcp-tool: { verb: update_record, record_type: product, tier: green }
      parameters:
        - $ref: '#/components/parameters/IfMatch'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateProductRequest' }
      responses:
        '200':
          description: Updated product.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Product' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '422': { $ref: '#/components/responses/ValidationError' }
    delete:
      tags: [Products]
      operationId: archiveProduct
      summary: Archive (soft-delete) a product.
      description: Sets archived_at (soft-archive); the product is hidden from the default list but still fetchable by id.
      x-mcp-tool: { verb: update_record, record_type: product, tier: yellow }
      responses:
        '200':
          description: Archived product (now carries a non-null archived_at).
