  /pipelines/{id}/rollup:
    parameters:
      - $ref: '#/components/parameters/Id'
    get:
      tags: [Pipelines]
      operationId: getPipelineRollup
      summary: Weighted pipeline value for this pipeline (DEAL-FORM-2), server-computed.
      description: |
        Raw and weighted totals over the pipeline's live open deals, decomposed per stage
        and per deal — the totals always equal the sum of the displayed parts
        (reconciliation). Never intended to be client-summed. A missing stored FX rate for
        an open deal in a non-base currency fails the whole read with `422
        fx_rate_unavailable` rather than substituting a rate of 1 (DEAL-WIRE-8).
      responses:
        '200':
          description: The pipeline's weighted roll-up.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PipelineRollup' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422':
          description: A stored FX rate is unavailable for an open deal's currency.
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }
              examples:
                fxUnavailable:
                  value:
                    type: 'https://errors.margince.com/fx_rate_unavailable'
                    title: FX rate unavailable
                    status: 422
                    code: fx_rate_unavailable
                    detail: No stored FX rate for USD as of 2026-06-04.
                    details:
                      currency: USD
                      as_of: '2026-06-04'

