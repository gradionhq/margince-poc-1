    post:
      tags: [Pipelines]
      operationId: createStage
      summary: Create a stage in a pipeline.
      description: |
        `position` is unique within the pipeline. Terminal stages enforce probability:
        won=100, lost=0 (features/01 §4.1).
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateStageRequest' }
      responses:
