  # =========================================================================
  # =========================================================================
  # NET-NEW V1 RESOURCES (data-model.md §12.5) — first-class, but specified by
  # PATTERN here rather than expanded inline, to keep this file readable. Each
  # follows the SAME resource shape as /people|/deals above — list (cursor+Sort),
  # get, create, update (If-Match), archive — with schemas drawn 1:1 from the
  # §12.5 DDL. The contract-codegen + AC-MCP-3 lint MUST emit/verify these ops:
  #   /signals            (E08; MCP search_records/read_record; resolve via POST /signals/{id}/resolve)
  #   /deal-rooms         (E08/E12; engagement events are read via /deal-rooms/{id}/engagement)
  #   /voice-profiles     (E07; corpus sources via /voice-profiles/{id}/sources)
  #   /drafting-assets    (E07/E08; approval flips `approved` — admin/🟡)
  #   /agent-connections  (E10; revoke via POST /agent-connections/{id}/revoke; events read-only)
  # ------------------------------ /automations --------------------------------
  /automations:
    get:
      tags: [Automations]
      operationId: listAutomations
      summary: List all live automations in the workspace.
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: A list of automations.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AutomationListResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
    post:
      tags: [Automations]
      operationId: createAutomation
      summary: Create a catalog-backed automation. Trigger and action jsonb are validated against the closed catalog — 422 on any rejection.
      description: |
        Creates an `automation` row. The `trigger` and `action` jsonb are validated via
        `catalog.ValidateTrigger` / `catalog.ValidateAction`; a missing/mistyped bounded param
        returns `422`. The `tier` is derived from the catalog — never from the request body.
        Writes one `audit_log` row (action=create) in the same transaction.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateAutomationRequest' }
      responses:
        '201':
          description: Automation created.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Automation' }
        '400':
          description: Missing required fields.
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }
        '422':
          description: Catalog validation failed (invalid trigger_type, action_type, or bounded param).
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /automations/{id}:
    parameters:
      - $ref: '#/components/parameters/Id'
    get:
      tags: [Automations]
      operationId: getAutomation
      summary: Get one automation by id.
      responses:
        '200':
          description: The automation.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Automation' }
        '404': { $ref: '#/components/responses/NotFound' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
    patch:
      tags: [Automations]
      operationId: patchAutomation
      summary: Parameterize (edit trigger/action) or pause (enabled=false) an automation.
      description: |
        Supply any subset of `{trigger, action, enabled}`. Omitted fields are unchanged.
        `trigger`/`action` are re-validated against the closed catalog — 422 on rejection.
        `tier` is re-derived from the new action (if action is supplied). Writes one
        `audit_log` row (action=parameterize or action=pause) in the same transaction.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PatchAutomationRequest' }
      responses:
        '200':
          description: Automation after patch.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Automation' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422':
          description: Catalog validation failed.
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
    delete:
      tags: [Automations]
      operationId: deleteAutomation
      summary: Soft-delete (archive) an automation. Subsequent GET returns 404.
      description: |
        Sets `archived_at=now()` on the automation (soft-delete, preserving audit history).
        Writes one `audit_log` row (action=archive) in the same transaction.
      responses:
        '204':
          description: Automation archived.
        '404': { $ref: '#/components/responses/NotFound' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
  #   /saved-views        (E15; V1 enforces shared_scope=private)

  # ------------------------------ /quotas -------------------------------------
  /quotas:
    get:
      tags: [Quotas]
      operationId: listQuotas
      summary: List quotas (cursor-paginated).
      x-mcp-tool: { verb: search_records, record_type: quota, tier: green }
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/IncludeArchived'
        - name: owner_id
          in: query
          schema: { type: string, format: uuid }
        - name: team_id
          in: query
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: A page of quotas.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/QuotaListResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
    post:
      tags: [Quotas]
      operationId: createQuota
      summary: Create a quota (owner XOR team revenue target for one period).
      description: |
        RD-WIRE-2. Exactly one of owner_id/team_id must be non-null (RD-DDL-2 CHECK) —
        supplying both or neither is refused with a 422 validation_error carrying a distinct
        details.errors[].code (owner_xor_team_required), not the generic per-field
        validation code, so a caller can branch on this specific violation. target_minor is
        always human-set (RD-PARAM-3) — no default, no AI-guessed or server-computed
        fallback.
      x-mcp-tool: { verb: create_record, record_type: quota, tier: green }
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateQuotaRequest' }
            examples:
              ownerQuota:
                value:
                  owner_id: 018f3a1b-0000-7000-8000-000000000001
                  period_start: '2026-01-01'
                  period_end: '2026-03-31'
                  target_minor: 28000000
                  currency: EUR
              teamQuota:
                value:
                  team_id: 018f3a1b-0000-7000-8000-000000000030
                  period_start: '2026-01-01'
                  period_end: '2026-03-31'
                  target_minor: 100000000
                  currency: EUR
      responses:
        '201':
          description: Created quota.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Quota' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422':
          description: Validation failed, including the owner-XOR-team contract.
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }
              examples:
                bothSet:
                  summary: Both owner_id and team_id supplied
                  value:
                    type: 'https://errors.margince.com/validation_error'
                    title: Validation failed
                    status: 422
                    code: validation_error
                    detail: Exactly one of owner_id/team_id must be set, not both.
                    details:
                      errors:
                        - { field: owner_id, code: owner_xor_team_required, message: 'Supply exactly one of owner_id or team_id, not both.' }
                neitherSet:
                  summary: Neither owner_id nor team_id supplied
                  value:
                    type: 'https://errors.margince.com/validation_error'
                    title: Validation failed
                    status: 422
                    code: validation_error
                    detail: Exactly one of owner_id/team_id must be set.
                    details:
                      errors:
                        - { field: owner_id, code: owner_xor_team_required, message: 'Supply exactly one of owner_id or team_id.' }

  /quotas/{id}:
    parameters:
      - $ref: '#/components/parameters/Id'
    get:
      tags: [Quotas]
      operationId: getQuota
      summary: Get a quota by id.
      x-mcp-tool: { verb: search_records, record_type: quota, tier: green }
      responses:
        '200':
          description: The quota.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Quota' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
    patch:
      tags: [Quotas]
      operationId: updateQuota
      summary: Update a quota (partial).
      description: |
        Merge-PATCH (API-CONV-1); If-Match required for concurrency-safe writes (API-CC-2).
        Re-validates the owner-XOR-team contract after the merge — patching into a both-set
        or neither-set state returns the same 422 owner_xor_team_required shape as
        createQuota.
      x-mcp-tool: { verb: update_record, record_type: quota, tier: green }
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateQuotaRequest' }
      responses:
        '200':
          description: Updated quota.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Quota' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '422':
          description: Validation failed, including the owner-XOR-team contract.
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }
              examples:
                bothSet:
                  value:
                    type: 'https://errors.margince.com/validation_error'
                    title: Validation failed
                    status: 422
                    code: validation_error
                    detail: Exactly one of owner_id/team_id must be set, not both.
                    details:
                      errors:
                        - { field: owner_id, code: owner_xor_team_required, message: 'Supply exactly one of owner_id or team_id, not both.' }
    delete:
      tags: [Quotas]
      operationId: archiveQuota
      summary: Archive (soft-delete) a quota.
      description: |
        Archive semantics (API-CONV-2): sets archived_at, drops from default lists, stays
        fetchable by id, and returns 200 + the full archived entity — never 204. This
        deliberately does not follow /automations/{id}'s deleteAutomation 204-on-archive
        shape, which predates/diverges from the standard convention every other archive
        operation in this contract (archivePerson, archiveOrganization, archiveDeal,
        archivePipeline) correctly follows.
      x-mcp-tool: { verb: update_record, record_type: quota, tier: yellow }
      responses:
        '200':
          description: Archived quota (now carries a non-null archived_at).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Quota' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /quotas/{id}/attainment:
    parameters:
      - $ref: '#/components/parameters/Id'
    get:
      tags: [Quotas]
      operationId: getQuotaAttainment
      summary: Server-computed attainment for this quota (RD-WIRE-3), decomposed per closed-won deal.
      description: |
        RD-FORM-2: attainment = Σ(closed-won base_value_minor in the quota's period) ÷
        target_minor, base-currency converted. Never client-summed — contributing_deals
        always sums to closed_won_minor. A zero or otherwise unusable target refuses the
        computation honestly (422 attainment_target_zero, RD-AC-4/AC-quota-6) rather than
        dividing by zero; a failed clean-core query (e.g. a missing FX rate, mirroring
        getPipelineRollup's fx_rate_unavailable) is an honest error, never a stale or
        invented figure. The actual recompute-or-error logic is a handler concern, out of
        this contract-only ticket's scope.
      responses:
        '200':
          description: This quota's server-computed attainment.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/QuotaAttainment' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422':
          description: Attainment cannot be honestly computed — target is zero, or the clean-core query failed.
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }
              examples:
                targetZero:
                  summary: The quota's target_minor is zero
                  value:
                    type: 'https://errors.margince.com/attainment_target_zero'
                    title: Attainment target is zero
                    status: 422
                    code: attainment_target_zero
                    detail: This quota's target_minor is zero; attainment is refused rather than computed against a zero denominator.
                computationFailed:
                  summary: The clean-core closed-won query failed
                  value:
                    type: 'https://errors.margince.com/attainment_computation_failed'
                    title: Attainment computation failed
                    status: 422
                    code: attainment_computation_failed
                    detail: The clean-core closed-won query failed; showing a stale or guessed figure is never acceptable — retry.

  # field_mask, deal_channel, gtm_module_install are config/
  # join tables surfaced through admin/parent endpoints, not standalone CRUD.
  # conversation_link has its own polymorphic endpoint: POST /conversation-links +
  # DELETE /conversation-links/{id} (B-E14.2).
  #
  # OFFERS / ANGEBOTE (data-model.md §12.6; A48/ADR-0037) — bounded line-item
  # quote engine, NOT CPQ. OFFER-WIRE-1..5 are minted: /products, /offer-templates,
  # /deals/{id}/offers, /offers/{id}, /offers/{id}/line-items. These non-CRUD
  # actions remain comment-only — OFFER-WIRE-6..9, a later ticket:
  #   POST /offers/{id}/regenerate  (🟢 AI: regenerate-from-signal → new draft revision; x-mcp-tool verb draft_offer, tier green)
  #   POST /offers/{id}/render      (produce the branded PDF → pdf_asset_ref)
  #   POST /offers/{id}/send        (🟡 — leaves the workspace: publish to Deal Room / email PDF; x-mcp-tool tier yellow, ErrRequiresApproval; ADR-0036 token)
  #   POST /offers/{id}/accept      (flip status=accepted, sync deal.amount_minor from gross, emit offer.accepted; in-room action — no e-sign in V1)
  # Money totals (net/tax/gross) are DERIVED server-side from line items (P11
  # integer minor-units); a client-supplied total is rejected. Multi-currency
  # offers roll up to base via fx_rate (RT-PR-C2) — frozen at send (OFFER-WIRE-8),
  # not part of the Offer schema minted here. Offer drafting obeys evidence-or-
  # omit (features/07) and NEVER fabricates a price (rate-card or blank).
  # =========================================================================

  /offer-templates:
    get:
      tags: [OfferTemplates]
      operationId: listOfferTemplates
      summary: List offer templates (branded DE/EN PDF layouts; admin surface).
      description: Default view excludes archived rows; pass include_archived=true to include them.
      x-mcp-tool: { verb: search_records, record_type: offer_template, tier: green }
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/IncludeArchived'
      responses:
        '200':
          description: A page of offer templates.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OfferTemplateListResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
    post:
      tags: [OfferTemplates]
      operationId: createOfferTemplate
      summary: Create an offer template.
      description: |
        name must be unique per workspace (409 on collision). At most one default template
        per locale (OFFER-DDL-4) — setting is_default=true while another default exists for
        the same locale is rejected (409 offer_template_default_conflict).
      x-mcp-tool: { verb: create_record, record_type: offer_template, tier: green }
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateOfferTemplateRequest' }
            examples:
              minimal:
                value:
                  name: Standard DE
                  locale: de-DE
                  layout: { logo_ref: null, terms_asset_ref: null }
                  source: ui
                  captured_by: 'human:018f3a1b-0000-7000-8000-000000000001'
      responses:
        '201':
