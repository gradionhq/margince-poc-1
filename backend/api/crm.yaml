openapi: 3.1.0

# =============================================================================
# Margince — V1 Core API Contract (contract-first source of truth)
# -----------------------------------------------------------------------------
# This file is THE contract from which Go server stubs + TS client types are
# generated (P3 contract-first). It mirrors spec/data-model.md field-for-field
# and encodes the acceptance criteria of features/01-core-objects.md,
# features/03-reporting-and-scoring.md, features/07-ai-native-moments.md, and
# the MCP tool surface of 03b-ai-architecture.md.
#
# Conventions (full text in ./README.md):
#   - Resources are plural nouns (/people, /organizations, /deals, ...).
#   - Pagination is cursor-based: ?cursor=&limit= -> { data, page: {next_cursor, has_more} }.
#   - Errors are RFC 7807 problem+json with a stable machine `code`, plus `details`.
#   - Auth is bearer JWT (workspace + user/agent principal in claims).
#   - POST is idempotent via the `Idempotency-Key` header.
#   - Every domain response carries provenance: `source` + `captured_by`.
#   - Soft-delete only: archive endpoints set `archived_at`; rows stay fetchable by id.
#   - Client custom fields appear additively, marked with the `x-extension` vendor key.
#   - Operations that back a Layer-1 MCP tool verb carry `x-mcp-tool` with a 🟢/🟡 tier.
#
# Deferred areas (NOT specified here — see data-model.md §12): sequences/cadences,
# overlay-on-incumbents read model, telephony/click-to-call, the dedicated
# embedding store, per-purpose consent, workflow-run records. They are commented
# stubs at the bottom of `paths` so the shape is intentional but unspecified.
# =============================================================================

info:
  title: Margince API
  version: 1.0.0-draft
  summary: AI-native, open-source CRM core — people, orgs, deals, pipelines, activities, leads, plus the agent/AI surface.
  description: |
    The V1 core CRM contract. Derived from `spec/data-model.md` (the canonical
    Postgres schema), `spec/features/01-core-objects.md` (endpoint acceptance
    criteria), `spec/features/03-reporting-and-scoring.md`,
    `spec/features/07-ai-native-moments.md`, and `spec/03b-ai-architecture.md`
    (the MCP tool surface). Every component schema mirrors a table; the agent
    MCP tool surface maps onto these same REST operations via `x-mcp-tool`.
  license:
    name: BUSL-1.1
    identifier: BUSL-1.1
  contact:
    name: Gradion
    email: lars@gradion.com

servers:
  - url: https://{workspace}.api.gradion.com/v1
    description: Per-workspace production host
    variables:
      workspace:
        default: demo
        description: Workspace slug (tenant). Tenant is also asserted from the JWT claims.
  - url: http://localhost:8080/v1
    description: Local development

security:
  - bearerAuth: []

tags:
  - name: People
    description: Person (contact) records, their emails and phones.
  - name: Organizations
    description: Company records and their domains.
  - name: Relationships
    description: The typed relationship edge (employment + deal stakeholder).
  - name: Deals
    description: Deals, including stage advancement.
  - name: Pipelines
    description: Pipelines and their ordered stages.
  - name: Activities
    description: Polymorphic activity timeline (email/call/meeting/note/task).
  - name: Leads
    description: Thin, segregated machine/bulk-sourced prospects + promotion.
  - name: Products
    description: Rate-card products (the line-item catalogue for offers/quotes). Optional — a workspace may quote free-form.
  - name: OfferTemplates
    description: Branded DE/EN PDF layouts for offers (admin surface; at most one default per locale).
  - name: Offers
    description: The Angebot — a bounded line-item quote bound to one deal (ADR-0037). Editable only while draft.
  - name: Invoices
    description: Invoices derived from accepted offers — totals are copied from the offer snapshot, never free-typed.
  - name: Imports
    description: Workspace import runs — mandatory dry-run, validation report, and approved resumable execution.
  - name: Lists
    description: Static and dynamic-segment lists.
  - name: Tags
    description: Tags applicable to people/orgs/deals/leads.
  - name: Reports
    description: Run validated, typed reports (the clean-core HubSpot fix).
  - name: Search
    description: Cross-object search.
  - name: AI
    description: AI-native moments — cold-start read-back and proposals.
  - name: Approvals
    description: The 🟡 confirm-first approval inbox (approve/reject staged agent actions).
  - name: DraftingAssets
    description: Governed retrieval store for drafting assets (templates, copy fragments, reusable content). Approve/expire require the `curate` permission (admin/manager only — ADR-0009 / features/07 §7b).
  - name: Identity
    description: Current user / principal.
  - name: DealRooms
    description: Deal rooms — published shared spaces with disclosed-consent access control (B-E08.5/B-E08.6).
  - name: Attachments
    description: File attachments — blob-store object references bound to a record (RD-DDL-1); bytes flow through presigned blob-seam URLs, never the JSON API (ADR-0051).
  - name: CustomFields
    description: Runtime, admin-defined scalar fields on existing core objects (custom-fields.md, A46/ADR-0002 Amendment 2) — list/create/rename/retire only; no hard delete.
  - name: Quotas
    description: Per-owner/team revenue targets per period (RD-DDL-2; E09 forecast attainment) — owner XOR team, human-set target, server-computed attainment read.

# =============================================================================
paths:

  # ------------------------------- /me --------------------------------------
  /me:
    get:
      tags: [Identity]
      operationId: getCurrentPrincipal
      summary: Get the current authenticated principal (user or agent).
      responses:
        '200':
          description: The current principal.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MeResponse' }
              examples:
                human:
                  value:
                    user:
                      id: 018f3a1b-0000-7000-8000-000000000001
                      workspace_id: 018f3a1b-0000-7000-8000-0000000000ff
                      email: jane@acme.com
                      display_name: Jane Rep
                      timezone: Europe/Berlin
                      status: active
                      is_agent: false
                      created_at: '2026-01-02T09:00:00Z'
                      updated_at: '2026-01-02T09:00:00Z'
                      archived_at: null
                    roles: [rep]
                    teams: [018f3a1b-0000-7000-8000-0000000000ab]
        '401': { $ref: '#/components/responses/Unauthorized' }

  # ------------------------------- /people ----------------------------------
  /people:
    get:
      tags: [People]
      operationId: listPeople
      summary: List people (live by default; cursor-paginated).
      description: Default view excludes archived rows (`archived_at IS NULL`). Leads never appear here.
      x-mcp-tool:
        verb: search_records
        record_type: person
        tier: green
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/IncludeArchived'
        - name: owner_id
          in: query
          schema: { type: string, format: uuid }
          description: Filter to a single owner.
        - name: q
          in: query
          schema: { type: string }
          description: Full-text query over name/title (tsvector).
        - name: tag
          in: query
          schema: { type: string }
          description: Filter by tag name.
      responses:
        '200':
          description: A page of people.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PersonListResponse' }
              examples:
                page:
                  value:
                    data:
                      - id: 018f3a1b-0000-7000-8000-000000000010
                        workspace_id: 018f3a1b-0000-7000-8000-0000000000ff
                        full_name: Dana Buyer
                        first_name: Dana
                        last_name: Buyer
                        title: VP Engineering
                        owner_id: 018f3a1b-0000-7000-8000-000000000001
                        social: { linkedin: 'https://linkedin.com/in/danabuyer' }
                        address: null
                        emails:
                          - id: 018f3a1b-0000-7000-8000-000000000011
                            person_id: 018f3a1b-0000-7000-8000-000000000010
                            email: dana@acme.com
                            email_type: work
                            is_primary: true
                            position: 0
                            source: 'email:CAF=abc@mail'
                            captured_by: 'agent:capture'
                            created_at: '2026-05-02T10:00:00Z'
                            updated_at: '2026-05-02T10:00:00Z'
                            archived_at: null
                        phones: []
                        consent_state: unknown
                        merged_into_id: null
                        converted_from_lead_id: null
                        source: 'email:CAF=abc@mail'
                        captured_by: 'agent:capture'
                        created_at: '2026-05-02T10:00:00Z'
                        updated_at: '2026-05-02T10:00:00Z'
                        archived_at: null
                    page: { next_cursor: 'eyJpZCI6IjAxOGYzYTFiIn0', has_more: true }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { $ref: '#/components/responses/ValidationError' }
    post:
      tags: [People]
      operationId: createPerson
      summary: Create a person.
      description: |
        With name + email returns 201 and a stable `id` (UUID) that round-trips on GET
        (features/01 §1.1 AC). If the email already exists on a live person, returns 409
        with the existing person id (features/01 §1.3). Writes one audit row + one
        `person.created` event.
      x-mcp-tool:
        verb: create_record
        record_type: person
        tier: green
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreatePersonRequest' }
            examples:
              minimal:
                summary: Name + email (the §1.1 acceptance case)
                value:
                  full_name: Dana Buyer
                  emails:
                    - { email: dana@acme.com, email_type: work, is_primary: true }
                  source: ui
                  captured_by: 'human:018f3a1b-0000-7000-8000-000000000001'
      responses:
        '201':
          description: Created. Body round-trips identically on GET.
          headers:
            Location:
              schema: { type: string }
              description: URL of the created person.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Person' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '409':
          description: An email on the request already belongs to a live person.
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }
              examples:
                duplicate:
                  value:
                    type: 'https://errors.margince.com/duplicate_email'
                    title: Duplicate email
                    status: 409
                    code: duplicate_email
                    detail: An active person already owns dana@acme.com.
                    details:
                      existing_id: 018f3a1b-0000-7000-8000-000000000010
                      field: emails[0].email
        '422': { $ref: '#/components/responses/ValidationError' }

  /people/{id}:
    parameters:
      - $ref: '#/components/parameters/Id'
    get:
      tags: [People]
      operationId: getPerson
      summary: Get a person by id (the 360 record).
      description: Fetchable by id even when archived (features/01 §1.1 AC).
      x-mcp-tool: { verb: read_record, record_type: person, tier: green }
      responses:
        '200':
          description: The person.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Person' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
    patch:
      tags: [People]
      operationId: updatePerson
      summary: Update a person (partial).
      x-mcp-tool: { verb: update_record, record_type: person, tier: green }
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdatePersonRequest' }
      responses:
        '200':
          description: Updated person.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Person' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '422': { $ref: '#/components/responses/ValidationError' }
    delete:
      tags: [People]
      operationId: archivePerson
      summary: Archive (soft-delete) a person.
      description: |
        Sets `archived_at`, removes from default lists, retains in audit; the row is
        still fetchable by id (features/01 §1.1 AC). No hard delete by default.
      x-mcp-tool: { verb: update_record, record_type: person, tier: yellow }
      responses:
        '200':
          description: Archived person (now carries a non-null `archived_at`).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Person' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /people/{id}/merge:
    parameters:
      - $ref: '#/components/parameters/Id'
    post:
      tags: [People]
      operationId: mergePerson
      summary: Merge this person into a target (non-lossy).
      description: |
        Merge A→B relinks A's emails/phones/relationships/activity links to B with zero
        orphaned FKs, archives A with `merged_into_id = B` (features/01 §1.3). One audit
        transaction; reversible within audit.
      x-mcp-tool: { verb: merge_records, record_type: person, tier: yellow }
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/ApprovalToken'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [target_id]
              properties:
                target_id:
                  type: string
                  format: uuid
                  description: The surviving person (B). This row (A) is archived.
      responses:
        '200':
          description: The surviving (target) person after merge.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Person' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /people/{id}/restore:
    parameters:
      - $ref: '#/components/parameters/Id'
    post:
      tags: [People]
      operationId: restorePerson
      summary: Restore (un-archive) a soft-deleted person.
      description: |
        Inverse of `archivePerson`: clears `archived_at`, restoring the person to default
        list visibility. Triggers `person.restored`. Restoring an already-live person is
        refused with a 422 validation error (not a no-op) — the client must check
        `archived_at` first. Also refused (422) when `merged_into_id` is set (PO-AC-18:
        merge reversal is a separate recovery path), and refused (409) when a live email on
        this person now collides with another live person's email (the live-scoped
        `uq_person_email` index). 🟢 — undoing a soft-delete carries no data-loss risk,
        unlike `archivePerson` (🟡).
      x-mcp-tool: { verb: update_record, record_type: person, tier: green }
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '200':
          description: "Restored person (now carries `archived_at: null`)."
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Person' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409':
          description: A live email on this person now collides with another live person.
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /people/{id}/strength-breakdown:
    parameters:
      - $ref: '#/components/parameters/Id'
    get:
      tags: [People]
      operationId: getPersonStrengthBreakdown
      summary: Get the evidence behind a person's relationship-strength score (PO-EXT-2).
      description: |
        Returns the contributing activity ids and factor values behind `Person.strength` —
        serves the AC-person-3/4 evidence drawer. Read-only; new operation, does not modify
        `strength`'s scoring itself.
      x-mcp-tool: { verb: read_record, record_type: person, tier: green }
      responses:
        '200':
          description: The strength-breakdown evidence for this person.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PersonStrengthBreakdown' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  # --------------------------- /organizations -------------------------------
  /organizations:
    get:
      tags: [Organizations]
      operationId: listOrganizations
      summary: List organizations (live by default; cursor-paginated).
      x-mcp-tool: { verb: search_records, record_type: organization, tier: green }
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/IncludeArchived'
        - name: owner_id
          in: query
          schema: { type: string, format: uuid }
        - name: domain
          in: query
          schema: { type: string }
          description: Lookup by normalized domain (the employer-inference index).
        - name: classification
          in: query
          schema: { type: string, enum: [customer, prospect, partner, vendor, other, agency, reseller, tech_vendor, platform, competitor] }
        - name: relevance_gte
          in: query
          schema: { type: integer, minimum: 0, maximum: 100 }
          description: Lower bound (inclusive) on `relevance`.
        - name: q
          in: query
          schema: { type: string }
      responses:
        '200':
          description: A page of organizations.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OrganizationListResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
    post:
      tags: [Organizations]
      operationId: createOrganization
      summary: Create an organization.
      description: Domains are normalized/lowercased and unique per workspace (409 on collision).
      x-mcp-tool: { verb: create_record, record_type: organization, tier: green }
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateOrganizationRequest' }
            examples:
              minimal:
                value:
                  display_name: Acme Inc
                  domains: [{ domain: acme.com, is_primary: true }]
                  source: ui
                  captured_by: 'human:018f3a1b-0000-7000-8000-000000000001'
      responses:
        '201':
          description: Created organization.
          headers:
            Location: { schema: { type: string } }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Organization' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '409':
          description: A domain on the request already maps to another live organization.
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }
              examples:
                duplicate:
                  value:
                    type: 'https://errors.margince.com/duplicate_domain'
                    title: Duplicate domain
                    status: 409
                    code: duplicate_domain
                    detail: An active organization already owns acme.com.
                    details:
                      existing_id: 018f3a1b-0000-7000-8000-000000000020
                      field: domains[0].domain
        '422': { $ref: '#/components/responses/ValidationError' }

  /organizations/{id}:
    parameters:
      - $ref: '#/components/parameters/Id'
    get:
      tags: [Organizations]
      operationId: getOrganization
      summary: Get an organization by id (the 360 record).
      x-mcp-tool: { verb: read_record, record_type: organization, tier: green }
      responses:
        '200':
          description: The organization.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Organization' }
        '404': { $ref: '#/components/responses/NotFound' }
    patch:
      tags: [Organizations]
      operationId: updateOrganization
      summary: Update an organization (partial).
      x-mcp-tool: { verb: update_record, record_type: organization, tier: green }
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateOrganizationRequest' }
      responses:
        '200':
          description: Updated organization.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Organization' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '422': { $ref: '#/components/responses/ValidationError' }
    delete:
      tags: [Organizations]
      operationId: archiveOrganization
      summary: Archive (soft-delete) an organization.
      x-mcp-tool: { verb: update_record, record_type: organization, tier: yellow }
      responses:
        '200':
          description: Archived organization.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Organization' }
        '404': { $ref: '#/components/responses/NotFound' }

  /organizations/{id}/merge:
    parameters:
      - $ref: '#/components/parameters/Id'
    post:
      tags: [Organizations]
      operationId: mergeOrganization
      summary: Merge this organization into a target (non-lossy).
      description: |
        Merge A→B relinks A's domains, people-employment, deals, relationships and activity links to
        B with zero orphaned FKs, archives A with `merged_into_id = B`. Mirrors person merge
        (features/01 §1.3). One audit transaction (action `merge`); reversible within audit. This is
        the org half of the `merge_records` MCP verb.
      x-mcp-tool: { verb: merge_records, record_type: organization, tier: yellow }
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/ApprovalToken'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [target_id]
              properties:
                target_id: { type: string, format: uuid, description: The surviving org (B). This row (A) is archived. }
      responses:
        '200':
          description: The surviving (target) organization after merge.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Organization' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /organizations/{id}/restore:
    parameters:
      - $ref: '#/components/parameters/Id'
    post:
      tags: [Organizations]
      operationId: restoreOrganization
      summary: Restore (un-archive) a soft-deleted organization.
      description: |
        Inverse of `archiveOrganization`: clears `archived_at`, restoring the organization to
        default list visibility. Triggers `organization.restored` (newly added to the event
        catalog by this ticket, docs/architecture/event-bus.md). Restoring an already-live
        organization is refused with a 422 validation error (not a no-op) — the client must
        check `archived_at` first. Also refused (422) when `merged_into_id` is set (PO-AC-18),
        and refused (409) when a domain on this organization now collides with another live
        organization's domain (the live-scoped `uq_org_domain_primary` index). 🟢 — undoing a
        soft-delete carries no data-loss risk, unlike `archiveOrganization` (🟡).
      x-mcp-tool: { verb: update_record, record_type: organization, tier: green }
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '200':
          description: "Restored organization (now carries `archived_at: null`)."
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Organization' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409':
          description: A domain on this organization now collides with another live organization.
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /organizations/{id}/partner:
    parameters:
      - $ref: '#/components/parameters/Id'
    put:
      tags: [Organizations, Partners]
      operationId: upsertPartner
      summary: Create/update the partner extension on an org (sets classification='partner').
      description: |
