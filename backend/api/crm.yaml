        id: { type: string, format: uuid }
        workspace_id: { type: string, format: uuid }
        name: { type: string }
        entity_type: { type: string, enum: [person, organization, deal, lead] }
        list_type: { type: string, enum: [static, dynamic], default: static }
        definition: { type: [object, 'null'], additionalProperties: true, description: Dynamic — validated query plan; static — null. }
        owner_id: { type: [string, 'null'], format: uuid }
        team_id: { type: [string, 'null'], format: uuid }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        archived_at: { type: [string, 'null'], format: date-time }

    CreateListRequest:
      type: object
      required: [name, entity_type]
      properties:
        name: { type: string }
        entity_type: { type: string, enum: [person, organization, deal, lead] }
        list_type: { type: string, enum: [static, dynamic], default: static }
        definition: { type: [object, 'null'], additionalProperties: true }
        owner_id: { type: [string, 'null'], format: uuid }
        team_id: { type: [string, 'null'], format: uuid }

    ListMember:
      type: object
      required: [id, list_id, entity_type, entity_id]
      properties:
        id: { type: string, format: uuid }
        list_id: { type: string, format: uuid }
        entity_type: { type: string, enum: [person, organization, deal, lead] }
        entity_id: { type: string, format: uuid }
        added_by: { type: string }
        created_at: { type: string, format: date-time }

    AddListMemberRequest:
      type: object
      required: [entity_type, entity_id]
      properties:
        entity_type: { type: string, enum: [person, organization, deal, lead] }
        entity_id: { type: string, format: uuid }

    ListListResponse:
      type: object
      required: [data, page]
      properties:
        data: { type: array, items: { $ref: '#/components/schemas/List' } }
        page: { $ref: '#/components/schemas/PageInfo' }

    ListMemberListResponse:
      type: object
      required: [data, page]
      properties:
        data: { type: array, items: { $ref: '#/components/schemas/ListMember' } }
        page: { $ref: '#/components/schemas/PageInfo' }

    Tag:
      type: object
      description: A tag. Mirrors the `tag` table.
      required: [id, workspace_id, name]
      properties:
        id: { type: string, format: uuid }
        workspace_id: { type: string, format: uuid }
        name: { type: string }
        color: { type: [string, 'null'] }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        archived_at: { type: [string, 'null'], format: date-time }

    CreateTagRequest:
      type: object
      required: [name]
      properties:
        name: { type: string }
        color: { type: [string, 'null'] }

    Taggable:
      type: object
      required: [id, tag_id, entity_type, entity_id]
      properties:
        id: { type: string, format: uuid }
        tag_id: { type: string, format: uuid }
        entity_type: { type: string, enum: [person, organization, deal, lead] }
        entity_id: { type: string, format: uuid }
        created_at: { type: string, format: date-time }

    ApplyTagRequest:
      type: object
      required: [entity_type, entity_id]
      properties:
        entity_type: { type: string, enum: [person, organization, deal, lead] }
        entity_id: { type: string, format: uuid }

    TagListResponse:
      type: object
      required: [data, page]
      properties:
        data: { type: array, items: { $ref: '#/components/schemas/Tag' } }
        page: { $ref: '#/components/schemas/PageInfo' }

    # ---- Identity (User / Team / Role) ----
    User:
      type: object
      description: A seat — human or first-party agent. Mirrors `app_user`.
      required: [id, workspace_id, email, display_name, status, is_agent]
      properties:
        id: { type: string, format: uuid }
        workspace_id: { type: string, format: uuid }
        email: { type: string, format: email }
        display_name: { type: string }
        timezone: { type: string, default: UTC, description: IANA name. }
        status: { type: string, enum: [active, suspended, deactivated], default: active }
        is_agent: { type: boolean, default: false, description: First-party Agent Runner identity vs a human seat. }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        archived_at: { type: [string, 'null'], format: date-time }

    Team:
      type: object
      description: Mirrors the `team` table.
      required: [id, workspace_id, name]
      properties:
        id: { type: string, format: uuid }
        workspace_id: { type: string, format: uuid }
        name: { type: string }
        parent_team_id: { type: [string, 'null'], format: uuid }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        archived_at: { type: [string, 'null'], format: date-time }

    Role:
      type: object
      description: An RBAC role bundle. Mirrors the `role` table.
      required: [id, workspace_id, key, name, is_system, permissions]
      properties:
        id: { type: string, format: uuid }
        workspace_id: { type: string, format: uuid }
        key: { type: string, description: 'admin | manager | rep | read_only | ops | <code-defined>.' }
        name: { type: string }
        is_system: { type: boolean, default: false }
        permissions:
          type: object
          additionalProperties: true
          description: '{ object: {crud}, field_masks: [...], row_scope: own|team|all }.'
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        archived_at: { type: [string, 'null'], format: date-time }

    Member:
      type: object
      required: [user_id, email, display_name, status, is_agent, roles]
      properties:
        user_id: { type: string, format: uuid }
        email: { type: string, format: email }
        display_name: { type: string }
        status: { type: string, enum: [active, suspended, deactivated] }
        is_agent: { type: boolean }
        roles:
          type: array
          items: { type: string }
          description: 'Assigned role keys (admin | manager | rep | read_only | ops | <code-defined>).'
    MemberListResponse:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items: { $ref: '#/components/schemas/Member' }
    RoleListResponse:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items: { $ref: '#/components/schemas/Role' }
    AssignRoleRequest:
      type: object
      properties:
        role_key: { type: string, description: 'Role key to assign (admin | manager | rep | read_only | ops). One of role_key / role_id required.' }
        role_id: { type: string, format: uuid, description: 'Role id to assign. One of role_key / role_id required.' }

    MeResponse:
      type: object
      required: [user, roles, teams]
      properties:
        user: { $ref: '#/components/schemas/User' }
        roles:
          type: array
          items: { type: string }
          description: Effective role keys for this principal.
        teams:
          type: array
          items: { type: string, format: uuid }
        passport:
          type: [object, 'null']
          description: Present when the principal is an agent acting under an Agent Seat Passport.
          properties:
            passport_id: { type: string, format: uuid }
            on_behalf_of: { type: string, format: uuid }
            scopes:
              type: array
              items: { type: string, enum: [read_only, draft_only, act_with_approval, auto_execute_low_risk] }

    # ---- Audit ----
    AuditLogEntry:
      type: object
      description: An append-only audit row. Mirrors the `audit_log` table.
      required: [id, workspace_id, actor_type, actor_id, action, entity_type, occurred_at]
      properties:
        id: { type: string, format: uuid }
        workspace_id: { type: string, format: uuid }
        actor_type: { type: string, enum: [human, agent, system, connector] }
        actor_id: { type: string, description: "User uuid, agent id, connector name (e.g. connector:gmail), or 'system'." }
        passport_id: { type: [string, 'null'], format: uuid, description: Agent Seat Passport that authorized an agent action. }
        on_behalf_of: { type: [string, 'null'], format: uuid, description: The human authority for an agent action. }
        action:
          type: string
          # Every mutation is attributable (P12). connector captures audit as actor_type=connector.
          # Kept in lockstep with the audit_log_action_check DDL CHECK (migration 000048);
          # gated by scripts/check-audit-action-coherence.sh in `make check`.
          enum: [create, update, archive, merge, promote, disqualify, restore, export, erase, anonymize, login, assign, advance_stage, send_email, consent_grant, consent_withdraw, approve, reject, record_share, record_unshare, capture, modify, expired, generate, import, publish, parameterize, pause, bulk_set_field, bulk_archive, bulk_reassign, score_override]
        entity_type: { type: string }
        entity_id: { type: [string, 'null'], format: uuid }
        before: { type: [object, 'null'], additionalProperties: true }
        after: { type: [object, 'null'], additionalProperties: true }
        authorization_rule: { type: [string, 'null'], description: Which RBAC/scope rule allowed it. }
        evidence: { type: [object, 'null'], additionalProperties: true, description: e.g. which inbound email/meeting triggered a promotion. }
        occurred_at: { type: string, format: date-time }

    AuditHistoryEntry:
      type: object
      description: |
        One rendered history line for a record mutation. `before` and `after` are
        field-masked to the viewer's readable fields — absent keys were hidden, not null.
      required: [id, actor_type, actor_id, action, occurred_at, summary]
      properties:
        id: { type: string, format: uuid }
        actor_type: { type: string, enum: [human, agent, system, connector] }
        actor_id: { type: string }
        on_behalf_of: { type: [string, 'null'], format: uuid, description: "Granting human's user UUID for agent actions." }
        on_behalf_of_name: { type: [string, 'null'], description: "Resolved display_name for on_behalf_of." }
        action: { type: string }
        occurred_at: { type: string, format: date-time }
        authorization_rule: { type: [string, 'null'] }
        before: { type: [object, 'null'], additionalProperties: true, description: "Masked to viewer-readable fields." }
        after: { type: [object, 'null'], additionalProperties: true, description: "Masked to viewer-readable fields." }
        summary: { type: string, description: "Server-composed plain-language line, e.g. 'Devin changed Stage from Discovery to Proposal'." }

    AuditHistoryResponse:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items: { $ref: '#/components/schemas/AuditHistoryEntry' }

    # ---- Attachments (RD-DDL-1 / RD-WIRE-1) ----
    Attachment:
      type: object
      description: |
        A file attachment — a blob-store object reference bound to a record. Mirrors the
        existing `attachment` table (migration 000009_lists_tags_attachments.up.sql; RD-DDL-1
        pins the same shape). Bytes never ride the JSON API — the row holds metadata + the
        object-store key only; content moves through presigned blob-seam URLs (ADR-0051). No
        `version` column: an attachment is immutable except for archive, so there is no
        `updated_at` either — only `created_at`/`archived_at`.
      required: [id, workspace_id, entity_type, entity_id, filename, content_type, byte_size, storage_key, scan_status, source, captured_by, created_at]
      properties:
        id: { type: string, format: uuid }
        workspace_id: { type: string, format: uuid }
        entity_type: { type: string, enum: [person, organization, deal, lead, activity] }
        entity_id: { type: string, format: uuid }
        filename: { type: string }
        content_type: { type: string, description: MIME type; DB NOT NULL — client declares it at registration time. }
        byte_size: { type: integer, format: int64, description: DB NOT NULL — client declares the expected size at registration time. }
        storage_key: { type: string, description: 'Object-store key (S3/MinIO). Internal reference: clients fetch bytes via `download_url`, never this key directly.' }
        checksum: { type: [string, 'null'], description: sha256, for dedupe/integrity. }
        scan_status:
          type: string
          enum: [scanning, clean, blocked]
          description: |
            RD-PARAM-5 virus-scan state. `blocked` = quarantined, not downloadable. Contract-only
            for now — not yet a DB column on `attachment`; the handler ticket decides whether it
            lands on the row itself or is computed/joined (either is acceptable at this layer).
        source: { type: string }
        captured_by: { type: string }
        upload_url:
          type: [string, 'null']
          readOnly: true
          description: |
            Presigned PUT URL for the client to upload bytes directly to the blob-storage seam
            (ADR-0051). Populated only in the `createAttachment` response; null everywhere else.
        download_url:
          type: [string, 'null']
          readOnly: true
          description: |
            Presigned GET URL for downloading bytes directly from the blob-storage seam. Present
            once `scan_status: clean`; null/absent while `scanning` or `blocked` (RD-PARAM-5).
            Every download is audited as a file access (RD-AC-2) at the handler layer.
        created_at: { type: string, format: date-time }
        archived_at: { type: [string, 'null'], format: date-time }

    CreateAttachmentRequest:
      type: object
      required: [entity_type, entity_id, filename, content_type, byte_size, source, captured_by]
      properties:
        entity_type: { type: string, enum: [person, organization, deal, lead, activity] }
        entity_id: { type: string, format: uuid }
        filename: { type: string }
        content_type: { type: string }
        byte_size: { type: integer, format: int64 }
        checksum: { type: [string, 'null'] }
        source: { type: string }
        captured_by: { type: string }

    AttachmentListResponse:
      type: object
      required: [data, page]
      properties:
        data: { type: array, items: { $ref: '#/components/schemas/Attachment' } }
        page: { $ref: '#/components/schemas/PageInfo' }

    # ---- Hierarchy roll-up (RD-FORM-1 / RD-WIRE-4) ----
    OrganizationHierarchyRollup:
      type: object
      description: |
        RD-FORM-1's tree roll-up over the organization hierarchy (`parent_org_id` self-FK,
        owned by the people-and-organizations chapter). A server read only, never client-summed
        (mirrors `PipelineRollup`'s totals-reconcile-to-parts discipline). Money is base-currency
        converted (DM-FX-4) — never a raw cross-currency sum.
      required: [root_id, scope, weighted_pipeline, closed_won, activity_count_30d, aggregated_account_count, restricted_excluded, computed_at]
      properties:
        root_id: { type: string, format: uuid }
        scope: { type: string, enum: [tree, self] }
        weighted_pipeline: { $ref: '#/components/schemas/Money' }
        closed_won: { $ref: '#/components/schemas/Money' }
        activity_count_30d: { type: integer, description: 30-day activity count, tree-aggregated (or self-only under scope=self). }
        aggregated_account_count: { type: integer, description: Count of accounts (nodes) included in the roll-up. }
        restricted_excluded:
          type: array
          description: |
            Nodes excluded from the roll-up because the viewer cannot read them (RD-AC-1) —
            disclosed, never a silent drop. Empty when nothing was excluded.
          items:
            type: object
            required: [id, display_name]
            properties:
              id: { type: string, format: uuid }
              display_name: { type: string }
        computed_at: { type: string, format: date-time, description: When this roll-up was computed (server read-time). }

    # ---- Field history (RD-WIRE-5) ----
    FieldHistoryEntry:
      type: object
      description: |
        One per-field change, projected read-only from a single `audit_log` row's before/after
        diff (RD-AC-5) — not a stored history row (RD-PARAM-6: no records-depth copy). `id` is
        the source `audit_log` row's id. `old_value`/`new_value` are the field's display-form
        values (server-rendered strings, matching how the field-history screen renders a
        struck-through-from / highlighted-to diff token — not the raw typed column value).
      required: [id, entity_type, entity_id, field, changed_at, actor_type, actor_id]
      properties:
        id: { type: string, format: uuid }
        entity_type: { type: string, enum: [person, organization, deal, lead, activity] }
        entity_id: { type: string, format: uuid }
        field: { type: string }
        old_value: { type: [string, 'null'], description: '"— empty —" cases are represented as null; the client renders the empty-origin label.' }
        new_value: { type: [string, 'null'] }
        changed_at: { type: string, format: date-time }
        actor_type: { type: string, enum: [human, agent, system, connector] }
        actor_id: { type: string }
        passport_id: { type: [string, 'null'], format: uuid, description: Agent Seat Passport that authorized the change; present for agent actors (RD-AC-5). }
        evidence: { type: [object, 'null'], additionalProperties: true, description: Grounding evidence for an agent-authored change; present for agent actors (RD-AC-5). }

    FieldHistoryListResponse:
      type: object
      required: [data, page]
      properties:
        data: { type: array, items: { $ref: '#/components/schemas/FieldHistoryEntry' } }
        page: { $ref: '#/components/schemas/PageInfo' }

    # ---- Reports ----
    RunReportRequest:
      type: object
      description: |
        A typed, validated query plan (not free-form SQL). For prebuilt reports, filters
        parameterize the plan; for ad-hoc, the object/group_by/aggregates compile to a plan.
        **Field vocabulary:** every key in `filters`, every entry in `group_by`, and every
        `aggregates[].field` MUST be a field in the target report's declared vocabulary
        (the per-report allowed dimension/measure list in data-model.md §13 / contract README).
        An out-of-vocabulary field returns `422 code: report_field_not_allowed`. `additionalProperties`
        is open only to admit *values*, never to admit arbitrary SQL identifiers.
        **`/reports/{report}` path param:** a value matching the UUID format resolves to a saved
        report; any other value resolves against the prebuilt-report key catalog (README "Prebuilt
        reports"). A prebuilt key is never a UUID, so there is no collision.
      properties:
        filters:
          type: object
          additionalProperties: true
          description: Typed predicates (period, status, owner, ...) — keys must be in the report vocabulary.
        group_by:
          type: array
          items: { type: string }
        aggregates:
          type: array
          items:
            type: object
            required: [fn]
            properties:
              fn: { type: string, enum: [count, count_distinct, sum, avg, min, max] }
              field: { type: [string, 'null'] }
              as: { type: [string, 'null'] }
        as_of_date: { type: [string, 'null'], format: date, description: Snapshot / historical reporting via deal_stage_history. }

    ReportResult:
      type: object
      required: [report, plan, columns, rows]
      properties:
        report: { type: string }
        plan:
          type: object
          additionalProperties: true
          description: The validated query plan that was executed (shown before/after run).
        columns:
          type: array
          items: { type: string }
        rows:
          type: array
          items: { type: object, additionalProperties: true }
        total_rows: { type: integer }
        generated_at: { type: string, format: date-time }
        derivation_url:
          type: [string, 'null']
          description: Handle for "Explain This Number" drill-through to source rows.

    DerivationResult:
      type: object
      required: [definition, rows]
      properties:
        definition:
          type: string
          description: Plain-language explanation of the filter/group/aggregate this number came from.
        rows:
          type: array
          items: { type: object, additionalProperties: true }
          description: The exact underlying source rows; summing their relevant field reproduces the aggregate.

    # ---- Search ----
    SearchResult:
      type: object
      required: [type, id]
      properties:
        type: { type: string, enum: [person, organization, deal, activity, lead] }
        id: { type: string, format: uuid }
        title: { type: [string, 'null'], description: Display label (name/subject). }
        snippet: { type: [string, 'null'] }
        score: { type: [number, 'null'], description: Relevance score. }

    SearchResponse:
      type: object
      required: [data, page]
      properties:
        data: { type: array, items: { $ref: '#/components/schemas/SearchResult' } }
        page: { $ref: '#/components/schemas/PageInfo' }

    # ---- AI: cold-start ----
    ColdStartRequest:
      type: object
      required: [url]
      properties:
        url: { type: string, format: uri, description: Company website URL to read back. }

    ColdStartField:
      type: object
      description: One read-back field. EVERY field carries non-empty evidence + confidence, or it is omitted (no-guess gate).
      required: [field, value, evidence_snippet, source_url, confidence]
      properties:
        field: { type: string, enum: [icp, buying_center, value_proposition, usp, buying_intents, legal_name, registered_address, register_vat, industry, history] }
        value: { type: string }
        evidence_snippet: { type: string, minLength: 1, description: Verbatim source text — non-empty or the field is absent. }
        source_url: { type: string, format: uri }
        confidence: { type: number, minimum: 0, maximum: 1 }

    ColdStartProposal:
      type: object
      description: A staged proposal. NOTHING is written to real records until accepted via /approvals.
      required: [proposal_id, source_url, status, fields]
      properties:
        proposal_id: { type: string, format: uuid }
        source_url: { type: string, format: uri }
        status: { type: string, enum: [staged], description: Always staged — accept via the approval inbox. }
        fields:
          type: array
          items: { $ref: '#/components/schemas/ColdStartField' }
        created_at: { type: string, format: date-time }

    # ---- Approvals ----
    Approval:
      type: object
      description: A staged 🟡 confirm-first action awaiting human decision.
      required: [id, workspace_id, kind, status, proposed_by, created_at]
      properties:
        id: { type: string, format: uuid }
        workspace_id: { type: string, format: uuid }
        kind: { type: string, description: 'coldstart | send_email | advance_deal | promote_lead | overnight | transcript_proposal.' }
        status: { type: string, enum: [pending, approved, rejected, expired] }
        proposal_id: { type: [string, 'null'], format: uuid, description: 'For kind=coldstart, the ColdStartProposal this approval accepts (links the staged proposal to its approval item).' }
        proposed_by: { type: string, description: 'agent:<id> / connector:<n> that staged this.' }
        on_behalf_of: { type: [string, 'null'], format: uuid }
        expires_at: { type: [string, 'null'], format: date-time, description: 'When the staged action expires unactioned (mirrors approval.requested.expires_at). After this it auto-transitions to status=expired and cannot be approved.' }
        target_entity_type: { type: [string, 'null'], description: Entity the effect mutates (for precondition re-validation). }
        target_entity_id: { type: [string, 'null'], format: uuid }
        target_version: { type: [integer, 'null'], description: 'The `version` of the target row when the diff was staged. On approve-execute the server RE-READS the row; if its current version ≠ target_version the execution is rejected with 409 ErrVersionSkew (the world changed since the human last saw the diff — re-stage). This closes the stage→approval race (ADR-0036).' }
        diff_hash: { type: [string, 'null'], description: 'Hash of the staged proposed_change; the minted approval_token is bound to this hash so a token cannot authorize a different effect.' }
        summary: { type: [string, 'null'], description: One-line description of the proposed change. }
        proposed_change:
          type: object
          additionalProperties: true
          description: The staged diff/payload that will execute on approve.
        evidence:
          type: array
          description: Per-claim evidence (snippet + source id) backing the proposal.
          items:
            type: object
            properties:
              evidence_snippet: { type: string }
              source_type: { type: [string, 'null'], enum: [activity, deal, signal, relationship, page, null] }
              source_id: { type: [string, 'null'], format: uuid }
        confidence: { type: [number, 'null'], minimum: 0, maximum: 1 }
        result_entity_type: { type: [string, 'null'] }
        result_entity_id: { type: [string, 'null'], format: uuid }
        approval_token: { type: [string, 'null'], description: 'Signed single-use token minted on approve (schema ApprovalToken, serialized as compact JWS); authorizes exactly the downstream 🟡 operation it is bound to.' }
        decided_by: { type: [string, 'null'], format: uuid }
        decided_at: { type: [string, 'null'], format: date-time }
        created_at: { type: string, format: date-time }

    ApproveRequest:
      type: object
      description: |
        Approve a staged 🟡 action. **Who may approve:** the principal must hold the RBAC required
        to perform the action on the target (≥ the on_behalf_of human's authority for that effect);
        a lower-privilege user cannot approve an action they could not themselves perform. **Edit
        path:** if `edited_payload` is supplied, the edited effect RE-ENTERS the admission gate from
        scratch (re-tiered, re-RBAC-checked, new diff_hash) before a token is minted — an edit can
        never escalate a 🟢 staged note into an external send without re-gating (ADR-0036).
      properties:
        edited_payload:
          type: object
          additionalProperties: true
          description: Optional edits — the edited payload is re-admitted, then it executes (edit-then-send).

    ApprovalListResponse:
      type: object
      required: [data, page]
      properties:
        data: { type: array, items: { $ref: '#/components/schemas/Approval' } }
        page: { $ref: '#/components/schemas/PageInfo' }

    # ---- Optimistic concurrency ----
    RowVersion:
      type: integer
      format: int64
      readOnly: true
      minimum: 1
      description: |
        Monotonic row version, incremented by the server on every mutation (data-model §1.7).
        Echoed back as the `version` field on every mutable entity. To make a write conditional,
        send the last-seen value in `If-Match`; a mismatch returns `409 code: version_skew`
        (ErrVersionSkew) so the client re-reads before retrying. Applies to the native path,
        not only overlay mode.

    # ---- Approval token (ADR-0036) ----
    ApprovalToken:
      type: object
      description: |
        The claims carried by the signed `X-Approval-Token` (serialized as a compact JWS; the wire
        value is the string). It is single-use and bound to one effect — it is NOT a bare opaque
        string. The server verifies the signature, that `jti` has not been consumed, that `exp` is
        in the future, and that `workspace_id`/`passport_id`/`tool`/`diff_hash` match the operation
        being executed; any mismatch → `403 code: approval_token_invalid`.
      required: [jti, approval_id, workspace_id, tool, diff_hash, exp, single_use]
      properties:
        jti: { type: string, description: Unique token id; recorded as consumed on first use (replay → 403). }
        approval_id: { type: string, format: uuid, description: The Approval this token authorizes. }
        workspace_id: { type: string, format: uuid }
        passport_id: { type: [string, 'null'], format: uuid, description: Agent Seat Passport the token was minted for; null for a human-minted token. }
        on_behalf_of: { type: [string, 'null'], format: uuid }
        tool: { type: string, description: 'The exact 🟡 operation authorized (e.g. send_email, advance_deal). A token for one tool cannot authorize another.' }
        diff_hash: { type: string, description: Hash of the approved effect; binds the token to that specific staged change. }
        target_version: { type: [integer, 'null'], description: Row version the diff was staged against; re-checked at execute (see Approval.target_version). }
        exp: { type: string, format: date-time, description: Expiry (short TTL — minutes, not hours). }
        single_use: { type: boolean, default: true }

    # ---- Partner (A41/ADR-0032) ----
    Partner:
      type: object
      description: |
        First-class partner state as a 1:1 extension of an organization (an org IS a partner iff it
        has a `partner` row + classification='partner'). Company identity is never duplicated.
      required: [id, organization_id, workspace_id, partner_role, cert_status, source, captured_by, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        workspace_id: { type: string, format: uuid }
        organization_id: { type: string, format: uuid, description: The org this partner record extends (1:1, PO-DDL-6). }
        cert_status:
          type: string
          enum: [prospect, in_certification, certified, suspended, churned, applied]
          x-extensible-enum: true
          description: >-
            PO-DDL-6 target values (applied, certified, suspended) unioned with legacy live
            values (prospect, in_certification, churned) per the additive-first gate decision
            (gate issue #58, Option 1) — legacy values are DEPRECATED, not removed; a
            fast-follow ticket drops them once callers migrate. Program lifecycle (A38/ADR-0030).
        partner_role:
          type: string
          enum: [hosting, consulting, strategic]
          x-extensible-enum: true
          description: Functional role (A44/ADR-0034), orthogonal to margin_tier; implementation + dev are Gradion's turf. NOTE — PO-DDL-6 has this nullable at DB layer but making the response property nullable is an oasdiff ERR (response-property-became-nullable); left non-nullable here pending coordinator decision on the fast-follow ticket.
        margin_tier:
          type: [string, 'null']
          enum: [null, tier1_15, tier2_20, tier3_25]
          x-extensible-enum: true
          description: >-
            PO-DDL-6 target tier values. The prior contract left this field freeform (no enum
            constraint, no documented legacy value set to preserve) — this is a net-new,
            additive constraint, not a removal.
        gate_metrics:
          type: [object, 'null']
          additionalProperties: true
          description: >-
            DEPRECATED — kept for backward compatibility per the additive-first gate decision
            (gate issue #58, Option 1); superseded by certified_staff/retention_rate. Remove in
            the fast-follow ticket once callers migrate.
        certified_staff:
          type: integer
          default: 0
          description: Certified-staff headcount; gates the tier. Additive alongside (not replacing) gate_metrics.
        retention_rate:
          type: [number, 'null']
          minimum: 0
          maximum: 100
          description: A tier-gate metric (PO-DDL-6). Additive alongside (not replacing) gate_metrics.
        joined_at: { type: [string, 'null'], format: date }
        renews_at: { type: [string, 'null'], format: date }
        source: { type: string }
        captured_by: { type: string }
        version: { $ref: '#/components/schemas/RowVersion' }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        archived_at: { type: [string, 'null'], format: date-time }

    UpsertPartnerRequest:
      type: object
      properties:
        partner_role: { type: [string, 'null'], enum: [null, hosting, consulting, strategic] }
        cert_status: { type: string, enum: [prospect, in_certification, certified, suspended, churned, applied] }
        margin_tier: { type: [string, 'null'] }
        gate_metrics: { type: [object, 'null'], additionalProperties: true }
        certified_staff: { type: integer }
        retention_rate: { type: [number, 'null'], minimum: 0, maximum: 100 }
        joined_at: { type: [string, 'null'], format: date }
        renews_at: { type: [string, 'null'], format: date }

    # ---- Per-purpose consent (A22/ADR-0011) ----
    ConsentPurpose:
      type: object
      required: [id, workspace_id, key, label, created_at]
      properties:
        id: { type: string, format: uuid }
        workspace_id: { type: string, format: uuid }
        key: { type: string, description: 'Stable machine key (e.g. transactional, marketing_email, profiling). Referenced by send_email.consent_purpose.' }
        label: { type: string }
        requires_double_opt_in: { type: boolean, default: false, description: 'When true, a grant is only effective after a confirmed DOI event (German email norm).' }
        legal_basis: { type: [string, 'null'], enum: [null, consent, contract, legitimate_interest], description: GDPR Art. 6 basis. }
        created_at: { type: string, format: date-time }

    CreateConsentPurposeRequest:
      type: object
      required: [key, label]
      properties:
        key: { type: string }
        label: { type: string }
        requires_double_opt_in: { type: boolean, default: false }
        legal_basis: { type: [string, 'null'], enum: [null, consent, contract, legitimate_interest] }

    PersonConsentState:
      type: object
      description: A person's current consent for one purpose.
      required: [purpose_id, state]
      properties:
        purpose_id: { type: string, format: uuid }
        purpose_key: { type: [string, 'null'] }
        state: { type: string, enum: [unknown, granted, withdrawn] }
        basis: { type: [string, 'null'] }
        double_opt_in_confirmed_at: { type: [string, 'null'], format: date-time }
        updated_at: { type: [string, 'null'], format: date-time }

    ConsentEvent:
      type: object
      description: An append-only proof row (Art. 7 demonstrability). Never updated or deleted.
      required: [id, purpose_id, new_state, occurred_at]
      properties:
        id: { type: string, format: uuid }
        purpose_id: { type: string, format: uuid }
        new_state: { type: string, enum: [granted, withdrawn], description: Proof rows record only transitions to granted/withdrawn (never to unknown). }
        basis: { type: [string, 'null'] }
        source: { type: [string, 'null'], description: 'How consent was captured (e.g. webform, import, double_opt_in).' }
        actor_type: { type: string, enum: [human, agent, system, connector] }
        actor_id: { type: [string, 'null'] }
        occurred_at: { type: string, format: date-time }

    RecordConsentRequest:
      type: object
      required: [purpose_id, new_state]
      properties:
        purpose_id: { type: string, format: uuid }
        new_state: { type: string, enum: [granted, withdrawn] }
        basis: { type: [string, 'null'] }
        source: { type: [string, 'null'] }
        double_opt_in_token: { type: [string, 'null'], description: Required to make a grant effective when the purpose has requires_double_opt_in=true. }

    RecordGrant:
      type: object
      description: A manual per-record share (A52/ADR-0039) — widens own/team/all base scope for one record.
      required: [id, record_type, record_id, subject_type, subject_id, access, granted_by, created_at]
      properties:
        id: { type: string, format: uuid }
        record_type: { type: string, enum: [deal, person, organization, lead] }
        record_id: { type: string, format: uuid }
        subject_type: { type: string, enum: [user, team] }
        subject_id: { type: string, format: uuid, description: 'app_user(id) or team(id) per subject_type.' }
        access: { type: string, enum: [read, write], description: "'write' also satisfies 'read'." }
        granted_by: { type: string, format: uuid }
        reason: { type: [string, 'null'], description: 'Accountability/lawful-basis note surfaced in the audit row.' }
        expires_at: { type: [string, 'null'], format: date-time, description: 'Optional TTL; an expired grant matches no rows.' }
        created_at: { type: string, format: date-time }
        version: { type: integer, format: int64 }

    ExportRun:
      type: object
      required: [id, workspace_id, status, created_by, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        workspace_id: { type: string, format: uuid }
        status:
          type: string
          enum: [pending, running, complete, failed]
        artifact_ref: { type: string, nullable: true }
        manifest_ref: { type: string, nullable: true }
        created_by: { type: string, format: uuid }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    CreateImportRequest:
      type: object
      required: [source_ref, mapping]
      properties:
        source_ref:
          type: string
          description: Blobstore ref to the source payload.
        mapping:
          type: object
          required: [object_kind, columns]
          properties:
            object_kind:
              type: string
              enum: [person, organization, lead]
            columns:
              type: object
              additionalProperties:
                type: string
              description: Map of source column name → core object field name.
        source_rows:
          type: array
          description: 'In-memory/seeded source rows for the generic engine. Each row must have source_system, source_id, kind, and a fields map.'
          items:
            type: object
            required: [source_system, source_id, kind, fields]
            properties:
              source_system: { type: string }
              source_id: { type: string }
              kind: { type: string, enum: [person, organization, lead] }
              fields:
                type: object
                additionalProperties: true

    ImportRun:
      type: object
      required: [id, workspace_id, status, source_ref, mapping, checkpoint, created_by, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        workspace_id: { type: string, format: uuid }
        status:
          type: string
          enum: [pending, validating, awaiting_approval, running, complete, failed]
        mapping:
          type: object
          required: [object_kind, columns]
          properties:
            object_kind:
              type: string
              enum: [person, organization, lead]
            columns:
              type: object
              additionalProperties:
                type: string
        source_ref: { type: string }
        report_ref: { type: string, nullable: true }
        checkpoint: { type: integer }
        created_by: { type: string, format: uuid }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    CreateRecordGrantRequest:
      type: object
      required: [record_type, record_id, subject_type, subject_id, access]
      properties:
        record_type: { type: string, enum: [deal, person, organization, lead] }
        record_id: { type: string, format: uuid }
        subject_type: { type: string, enum: [user, team] }
        subject_id: { type: string, format: uuid }
        access: { type: string, enum: [read, write] }
        reason: { type: [string, 'null'] }
        expires_at: { type: [string, 'null'], format: date-time }

    DealRoom:
      type: object
      description: A deal-linked shared space with consent state and first-party engagement tracking (B-E08.5/B-E08.6).
      required: [id, workspace_id, deal_id, consent_state, access_token, source, captured_by, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        workspace_id: { type: string, format: uuid }
        deal_id: { type: string, format: uuid }
        consent_state: { type: string, enum: [pending, granted, revoked], description: 'Disclosed-consent state. Publish requires granted.' }
        access_token: { type: string, description: Opaque token used by external recipients to access the room. }
        published_at: { type: [string, 'null'], format: date-time, description: 'Set when the room is published. NULL means unpublished.' }
        source: { type: string }
        captured_by: { type: string }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    ConversationLink:
      type: object
      required: [id, workspace_id, entity_type, entity_id, conversation_system, conversation_id, source, captured_by, created_at, updated_at]
      properties:
        id:                  { type: string, format: uuid }
        workspace_id:        { type: string, format: uuid }
        entity_type:         { type: string, enum: [person, organization, deal, lead] }
        entity_id:           { type: string, format: uuid }
        conversation_system: { type: string, enum: [dispact, slack, teams] }
        conversation_id:     { type: string }
        source:              { type: string }
        captured_by:         { type: string }
        created_at:          { type: string, format: date-time }
        updated_at:          { type: string, format: date-time }

    CreateConversationLinkRequest:
      type: object
      required: [entity_type, entity_id, conversation_system, conversation_id, source, captured_by]
      properties:
        entity_type:         { type: string, enum: [person, organization, deal, lead] }
        entity_id:           { type: string, format: uuid }
        conversation_system: { type: string, enum: [dispact, slack, teams] }
        conversation_id:     { type: string }
        source:              { type: string }
        captured_by:         { type: string }

    InferredNextStep:
      type: object
      required: [inferred]
      properties:
        inferred: { type: boolean }
        suggestion: { type: string }
        evidence_snippet: { type: string, description: Verbatim line/text the step was read from. }
        evidence_source_id: { type: string, format: uuid, description: The source activity id. }
        due_date: { type: string, format: date-time, nullable: true }
        owner: { type: string, format: uuid, nullable: true }
    AcceptNextStepRequest:
      type: object
      required: [evidence_source_id]
      properties:
        evidence_source_id: { type: string, format: uuid }
        suggestion: { type: string }
        owner: { type: string, format: uuid, nullable: true }
        due_date: { type: string, format: date-time, nullable: true }
        edited: { type: boolean, description: True when the user edited owner/due/text; flips provenance to human. }

    DealKPISignals:
      type: object
      required: [signals]
      properties:
        signals:
          type: array
          items: { $ref: '#/components/schemas/KPISignal' }

    KPISignal:
      type: object
      required: [key, value, evidence_snippet, evidence_source_id, confidence]
      properties:
        key:
          type: string
          description: One of close_likelihood | service_line | expected_volume | timing.
        value:
          type: string
          description: The inferred or human-corrected value for this KPI.
        evidence_snippet:
          type: string
          description: Verbatim text the value was read from (always non-empty for a returned signal).
        evidence_source_id:
          type: string
          format: uuid
          description: The source activity id the snippet came from.
        confidence:
          type: string
          description: One of high | medium | low.
        overridden:
          type: boolean
          description: True when the value is a human correction (verdict=corrected in ai_feedback), not AI-inferred.

    KPIOverrideRequest:
      type: object
      required: [corrected_value]
      properties:
        corrected_value:
          type: string
          description: The human-provided replacement value for this KPI.
        note:
          type: string
          nullable: true
          description: Optional free-text note explaining the correction.

    KPIOverrideResponse:
      type: object
      required: [id, claim_key, verdict, corrected_value, created_by]
      properties:
        id:
          type: string
          format: uuid
        claim_key:
          type: string
        verdict:
          type: string
        corrected_value:
          type: string
          nullable: true
        note:
          type: string
          nullable: true
        created_by:
          type: string
          format: uuid
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    # ------------------------------ Automation ---------------------------------
    Automation:
      type: object
      description: A workspace automation rule (closed trigger × action catalog pair). ADR-0035.
      required: [id, workspace_id, name, origin, trigger, action, enabled, tier, version, created_at, updated_at]
      properties:
        id:            { type: string, format: uuid }
        workspace_id:  { type: string, format: uuid }
        name:          { type: string }
        origin:        { type: string, enum: [catalog, agent_authored] }
        trigger:       { type: object, description: "Closed catalog trigger jsonb — must carry trigger_type from the catalog set." }
        action:        { type: object, description: "Closed catalog action jsonb — must carry action_type from the catalog set." }
        owner_id:      { type: string, format: uuid, nullable: true }
        enabled:       { type: boolean }
        tier:          { type: string, enum: [green, yellow], description: "Registry-derived tier — never trusted from the client." }
        version:       { $ref: '#/components/schemas/RowVersion' }
        created_at:    { type: string, format: date-time }
        updated_at:    { type: string, format: date-time }
        archived_at:   { type: string, format: date-time, nullable: true }
        last_run_at:   { type: string, format: date-time, nullable: true, description: "Most recent automation_run.ran_at for this automation, or null if it has never fired." }

    CreateAutomationRequest:
      type: object
      description: Create a new automation. `trigger` and `action` are validated against the closed catalog — a missing/mistyped bounded param returns 422. `tier` is derived from the catalog; any client-supplied value is ignored.
      required: [name, origin, trigger, action]
      properties:
        name:     { type: string }
        origin:   { type: string, enum: [catalog, agent_authored] }
        trigger:  { type: object, description: "Catalog trigger jsonb." }
        action:   { type: object, description: "Catalog action jsonb." }
        owner_id: { type: string, format: uuid, nullable: true }
        enabled:  { type: boolean, default: true }
        tier:     { type: string, enum: [green, yellow], description: "Ignored — catalog-derived. Accepted to avoid breaking callers." }

    PatchAutomationRequest:
      type: object
      description: Parameterize (edit trigger/action) or pause (enabled=false) an automation. All fields optional — supply only what to change.
      properties:
        trigger:  { type: object, description: "New catalog trigger jsonb — validated on write." }
        action:   { type: object, description: "New catalog action jsonb — validated on write." }
        enabled:  { type: boolean, description: "Set false to pause, true to re-enable." }

    AutomationListResponse:
      type: object
      required: [data]
      properties:
        data: { type: array, items: { $ref: '#/components/schemas/Automation' } }

    # ------------------------------ People Signals (B-E05.5) -----------------
    DealPeopleSignals:
      type: object
      required: [people]
      properties:
        people:
          type: array
          items: { $ref: '#/components/schemas/PersonSignalItem' }

    PersonSignalItem:
      type: object
      required: [person_id, label, contact_ids, activity_ids]
      properties:
        person_id:
          type: string
          format: uuid
          description: The person's id.
        label:
          type: string
          enum: [warm, neutral, blocking]
          description: The derived or human-corrected relationship label.
        contact_ids:
          type: array
          items: { type: string, format: uuid }
          description: >
            Relationship edge source ids that justify the label (non-empty for warm/blocking;
            empty for neutral — no fabricated evidence).
        activity_ids:
          type: array
          items: { type: string, format: uuid }
          description: >
            Activity ids linked to this person that support the label (non-empty for warm/blocking
            when activity evidence exists; empty for neutral or no-activity evidence).
        corrected:
          type: boolean
          description: True when the label is a human correction rather than a derived one.

    PersonSignalCorrectRequest:
      type: object
      required: [corrected_value]
      properties:
        corrected_value:
          type: string
          enum: [warm, neutral, blocking]
          description: The human-provided replacement label for this person's signal.
        note:
          type: string
          nullable: true
          description: Optional free-text note explaining the correction.

    PersonSignalCorrectResponse:
      type: object
      required: [id, claim_key, verdict, corrected_value]
      properties:
        id:
          type: string
          format: uuid
        claim_key:
          type: string
        verdict:
          type: string
        corrected_value:
          type: string
          nullable: true
        note:
          type: string
          nullable: true
        created_by:
          type: string
          format: uuid
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    # ---- Custom fields (CUSTOM-FIELDS-WIRE-1..5, A46/ADR-0002 Amendment 2) ----
    CustomField:
      type: object
      description: |
        A workspace-defined runtime field on an existing core object (custom-fields.md).
        Mirrors the `custom_field` catalog table — the system-of-record for every
        runtime-added column (CUSTOM-FIELDS-SCHEMA-1). `column_name` is the physical
        `cf_`-prefixed identifier, stable across rename; `status=retired` hides the field
        from the API and filtering while the column and its values are preserved (soft
        retire, never a column drop — CUSTOM-FIELDS-AC-13). Deliberately carries no
        `source`/`captured_by` — the catalog row itself has no such columns; provenance on
        create is captured for audit attribution only (see `CreateCustomFieldRequest`).
      required: [id, workspace_id, object, label, slug, type, status, column_name, created_by, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        workspace_id: { type: string, format: uuid }
        object:
          type: string
          enum: [person, organization, deal, lead, activity]
          description: The existing core object this field is added to (CUSTOM-FIELDS-PARAM-2).
        label: { type: string, description: Display label; the only thing a rename updates. }
        slug: { type: string, description: Admin-facing key the column_name derives from. }
        type:
          type: string
          enum: [text, number, date, currency, picklist, boolean]
          description: The closed set of six scalar types (CUSTOM-FIELDS-PARAM-1). Immutable once created.
        status:
          type: string
          enum: [active, retired]
          description: 'retired = soft: hidden from the API and filtering, column and values preserved (CUSTOM-FIELDS-AC-13).'
        column_name:
          type: string
          readOnly: true
          description: >-
            Server-derived, `cf_`-prefixed, slug-derived physical column identifier
            (CUSTOM-FIELDS-PARAM-3) — never client-supplied, immutable once live, stable
            across rename.
        currency:
          type: [string, 'null']
          pattern: '^[A-Z]{3}$'
          description: ISO-4217 currency code; present when `type=currency`, null otherwise.
        options:
          type: [array, 'null']
          items: { type: string }
          description: Allowed picklist values; present (non-empty) when `type=picklist` (CUSTOM-FIELDS-PARAM-5), null otherwise.
        created_by: { type: string, format: uuid }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        archived_at:
          type: [string, 'null']
          format: date-time
          description: >-
            Base envelope field (DM-CONV-3); stays null even when `status=retired` — retire
            is a status flip, not an archive.
        version: { $ref: '#/components/schemas/RowVersion' }

    CustomFieldListResponse:
      type: object
      required: [data, page]
      properties:
        data: { type: array, items: { $ref: '#/components/schemas/CustomField' } }
        page: { $ref: '#/components/schemas/PageInfo' }

    CreateCustomFieldRequest:
      type: object
      description: |
        🟡 always (a schema change is never 🟢) — see `createCustomField`. `currency` is
        required when `type=currency` (pattern `^[A-Z]{3}$`); `options` is required
        non-empty when `type=picklist` (CUSTOM-FIELDS-PARAM-5). Neither conditional
        requirement is expressed as an OpenAPI 3.1 `oneOf`/`if`-`then` here — a prose note
        plus a 422 on mismatch is sufficient, matching how Offer/Product money fields are
        documented elsewhere in this contract.
      required: [object, label, type, source, captured_by]
      properties:
        object:
          type: string
          enum: [person, organization, deal, lead, activity]
        label: { type: string }
        type:
          type: string
          enum: [text, number, date, currency, picklist, boolean]
        currency: { type: [string, 'null'], pattern: '^[A-Z]{3}$' }
        options: { type: [array, 'null'], items: { type: string } }
        source: { type: string }
        captured_by: { type: string }
      additionalProperties: true

    RenameCustomFieldRequest:
      type: object
      description: >-
        Merge-PATCH; `label` only — `column_name`, `object`, and `type` are absent from this
        request schema entirely (immutable, not just ignored if sent).
      properties:
        label: { type: string }

    # ---- Quota + attainment (RD-WIRE-2/3, RD-DDL-2, RD-FORM-2) ----
    Quota:
      type: object
      description: |
        A per-owner or per-team revenue target for one period (RD-DDL-2, quota.html scope
        note). Exactly one of owner_id/team_id is non-null (CHECK constraint) — never both,
        never neither; createQuota/updateQuota document and enforce this (422
        owner_xor_team_required). target_minor is always human-set: no AI-guessed quota, no
        default, no server-computed fallback (RD-PARAM-3). Deliberately carries no
        source/captured_by/created_by — RD-DDL-2's column list has no provenance columns at
        all, unlike custom_field's created_by (CF-T01). Attainment is a separate read
        (getQuotaAttainment, RD-WIRE-3) — this schema never carries attainment fields itself.
      required: [id, workspace_id, period_start, period_end, target_minor, currency, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        workspace_id: { type: string, format: uuid }
        owner_id:
          type: [string, 'null']
          format: uuid
          description: Exactly one of owner_id/team_id is non-null (RD-DDL-2 CHECK).
        team_id:
          type: [string, 'null']
          format: uuid
          description: Exactly one of owner_id/team_id is non-null (RD-DDL-2 CHECK).
        period_start: { type: string, format: date }
        period_end: { type: string, format: date }
        target_minor:
          type: integer
          format: int64
          description: >-
            Human-set revenue target, integer minor units (RD-PARAM-3) — never an AI-guessed
            or server-computed field.
        currency: { type: string, pattern: '^[A-Z]{3}$' }
        version: { $ref: '#/components/schemas/RowVersion' }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        archived_at: { type: [string, 'null'], format: date-time }

    QuotaListResponse:
      type: object
      required: [data, page]
      properties:
        data: { type: array, items: { $ref: '#/components/schemas/Quota' } }
        page: { $ref: '#/components/schemas/PageInfo' }

    CreateQuotaRequest:
      type: object
      description: |
        Exactly one of owner_id/team_id must be non-null — supplying both or neither is a 422
        validation_error carrying a distinct, machine-branchable details.errors[].code
        (owner_xor_team_required), not the generic per-field validation code (see
        createQuota's 422 examples). Not expressed as an OpenAPI 3.1 oneOf here — a prose
        note plus a 422 on mismatch, matching how CreateCustomFieldRequest documents its
        conditional currency/options requirement (CF-T01).
      required: [period_start, period_end, target_minor, currency]
      properties:
        owner_id: { type: [string, 'null'], format: uuid }
        team_id: { type: [string, 'null'], format: uuid }
        period_start: { type: string, format: date }
        period_end: { type: string, format: date }
        target_minor: { type: integer, format: int64 }
        currency: { type: string, pattern: '^[A-Z]{3}$' }

    UpdateQuotaRequest:
      type: object
      description: >-
        Merge-PATCH (API-CONV-1). Re-validates owner-XOR-team after the merge is applied —
        patching the row into a both-set or neither-set state is refused with the same 422
        owner_xor_team_required shape as createQuota, not silently accepted.
      properties:
        owner_id: { type: [string, 'null'], format: uuid }
        team_id: { type: [string, 'null'], format: uuid }
        period_start: { type: string, format: date }
        period_end: { type: string, format: date }
        target_minor: { type: integer, format: int64 }
        currency: { type: string, pattern: '^[A-Z]{3}$' }

    QuotaAttainment:
      type: object
      description: |
        RD-WIRE-3 / RD-FORM-2 — server-computed attainment for one quota, decomposed for
        "explain this number": attainment = Σ(closed-won base_value_minor in the quota's
        period) ÷ target_minor, base-currency converted, in integer minor units. Never
        client-summed — contributing_deals always sums to closed_won_minor. Rides as a
        sub-resource of the quota (mirrors /pipelines/{id}/rollup and
        /organizations/{id}/hierarchy-rollup's "computed read with decomposition" shape)
        rather than an inline field on Quota or a GET ?include= expansion — chosen once,
        applied consistently; the plain Quota response (list or single-get) never carries
        attainment fields. A failed or absent computation is an honest error
        (getQuotaAttainment's 422 responses), never a cached or invented figure (RD-AC-4).
      required: [quota_id, closed_won_minor, target_minor, currency, attainment_pct, gap_minor, pace_pct, band, as_of_date, contributing_deals]
      properties:
        quota_id: { type: string, format: uuid }
        closed_won_minor:
          type: integer
          format: int64
          description: Σ base_value_minor over closed-won deals in the quota's period (RD-FORM-2).
        target_minor:
          type: integer
          format: int64
          description: The flagged human-set target this attainment is measured against (echoes Quota.target_minor).
        currency: { type: string, pattern: '^[A-Z]{3}$' }
        attainment_pct:
          type: number
          description: >-
            closed_won_minor ÷ target_minor × 100 (RD-FORM-2). Uncapped raw value — e.g. 113
            for the worked example — display capping (the ring visual stops at a full circle)
            is a RD-PARAM-4 UI concern, not this field's.
        gap_minor:
          type: integer
          format: int64
          description: >-
            Signed gap to target — closed_won_minor minus target_minor (RD-FORM-2's worked
            example: +33.872,00 EUR once closed-won exceeds target); positive once attainment
            exceeds 100%, negative while short of target.
        pace_pct:
          type: number
          description: attainment_pct measured against percent-of-period-elapsed (RD-PARAM-4 pace indicator).
        band:
          type: string
          enum: [met, accent, behind]
          description: >-
            Server-computed display band (RD-PARAM-4): met >= 100%, accent 60-99%, behind
            < 60%. The client never recomputes this from raw attainment_pct.
        as_of_date: { type: string, format: date, description: The date this attainment was computed. }
        contributing_deals:
          type: array
          description: Per-deal decomposition for "Explain This Number"; sums to closed_won_minor.
          items: { $ref: '#/components/schemas/QuotaAttainmentDeal' }

    QuotaAttainmentDeal:
      type: object
      description: One row of RD-FORM-2's per-deal breakdown — a closed-won deal counted toward this quota's attainment.
      required: [deal_id, base_value_minor]
      properties:
        deal_id: { type: string, format: uuid }
        base_value_minor:
          type: integer
          format: int64
          description: This deal's counted amount toward closed_won_minor (base currency, minor units).
