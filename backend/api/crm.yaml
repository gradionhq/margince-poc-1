  /roles:
    get:
      tags: [Identity]
      operationId: listRoles
      summary: List the workspace's assignable roles.
      security: [bearerAuth: []]
      responses:
        '200':
          description: OK.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RoleListResponse' }
        '403': { $ref: '#/components/responses/Forbidden' }
  /members:
    get:
      tags: [Identity]
      operationId: listMembers
      summary: List workspace members with their assigned role keys.
      security: [bearerAuth: []]
      responses:
        '200':
          description: OK.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MemberListResponse' }
        '403': { $ref: '#/components/responses/Forbidden' }
  /members/{user_id}/roles:
    post:
      tags: [Identity]
      operationId: assignMemberRole
      summary: Assign a role to a workspace member (idempotent).
      security: [bearerAuth: []]
      parameters:
        - name: user_id
          in: path
          required: true
          schema: { type: string, format: uuid }
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AssignRoleRequest' }
      responses:
        '201':
          description: Assigned (or already assigned — idempotent).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Member' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/ValidationError' }
  /members/{user_id}/roles/{role_key}:
    delete:
      tags: [Identity]
      operationId: revokeMemberRole
      summary: Revoke a role from a workspace member.
      security: [bearerAuth: []]
      parameters:
        - name: user_id
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: role_key
          in: path
          required: true
          schema: { type: string }
      responses:
        '204': { description: Revoked. }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }

  # --------------------------- /integrations/hubspot ------------------------
  /integrations/hubspot:
    get:
      tags: [Integrations]
      operationId: getHubSpotConnection
      summary: Read the workspace's HubSpot connection vault view (masked token, no plaintext/ciphertext ever).
      security: [bearerAuth: []]
      responses:
        '200':
          description: OK — connection present (any status).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/HubSpotConnectionView' }
        '404': { $ref: '#/components/responses/NotFound' }

  /integrations/hubspot/connect:
    post:
      tags: [Integrations]
      operationId: connectHubSpot
      summary: Start the HubSpot OAuth authorize-code flow with least-privilege scopes.
      description: >
        Least-privilege scope set only: contacts.read, schemas.read, contacts.write, webhooks — no
        marketing/email-send/admin scopes are ever requested from HubSpot. That HubSpot scope set
        is fixed and connector-side; it is NOT compared against the human's RBAC scopes (those are
        different namespaces — "contacts.read" is a HubSpot OAuth scope, not an "action:object" RBAC
        scope, so crmauth.CheckScopeSubset does not apply here). The human-consent gate instead
        requires the caller's role to grant `workspace.manage_members` (the existing "workspace admin
        config" action, same one that gates POST /members/{user_id}/roles) — enforced by reusing
        `requireManageMembers` (cmd/server/members_handler.go), the existing http.Handler middleware
        that already wraps this exact AuthorizePerms(perms, "workspace", "manage_members") check, not
        by reimplementing the gate inline. Deny -> 403 forbidden, same as every other
        requireManageMembers call site.
      security: [bearerAuth: []]
      responses:
        '302':
          description: Redirect to HubSpot's authorize URL.
        '403': { $ref: '#/components/responses/Forbidden' }

  /integrations/hubspot/callback:
    get:
      tags: [Integrations]
      operationId: hubspotOAuthCallback
      summary: OAuth authorization-code callback — exchanges code for tokens, seals + stores them.
      parameters:
        - name: code
          in: query
          schema: { type: string }
        - name: state
          in: query
          required: true
          schema: { type: string }
        - name: error
          in: query
          schema: { type: string }
          description: Present when the user denies consent (consent-denied failure state).
      responses:
        '200':
          description: Connected. Vault view returned (masked token only).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/HubSpotConnectionView' }
        '400':
          description: 'consent-denied or invalid state (`code: consent_denied` / `code: invalid_state`).'

  /integrations/hubspot/rotate:
    post:
      tags: [Integrations]
      operationId: rotateHubSpotConnection
      summary: Rotate the stored HubSpot refresh token via a token-refresh call, reseal, and re-verify scopes.
      security: [bearerAuth: []]
      responses:
        '200':
          description: Rotated. Vault view returned (masked token only).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/HubSpotConnectionView' }
        '409':
          description: 'token-refresh-failure (`code: token_refresh_failed`).'
        '404': { $ref: '#/components/responses/NotFound' }

  /integrations/hubspot/revoke:
    post:
      tags: [Integrations]
      operationId: revokeHubSpotConnection
      summary: One-action revoke — sets the connection to revoked; the next adapter call fails closed.
      security: [bearerAuth: []]
      responses:
        '200':
          description: Revoked.
        '409':
          description: 'revocation-failure (`code: revocation_failed`).'
        '404': { $ref: '#/components/responses/NotFound' }

  /integrations/hubspot/verify-scopes:
    post:
      tags: [Integrations]
      operationId: verifyHubSpotScopes
      summary: Re-verify the connection's scopes against HubSpot's live token-info endpoint (AC4).
      security: [bearerAuth: []]
      responses:
        '200':
          description: Live scopes returned.
          content:
            application/json:
              schema:
                type: object
                required: [scopes]
                properties:
                  scopes:
                    type: array
                    items: { type: string }
        '409':
          description: 'scope-verify-failure (`code: scope_verify_failed`).'
        '404': { $ref: '#/components/responses/NotFound' }

  # ------------------------------ /exports ----------------------------------
  /exports:
    post:
      operationId: createExport
      summary: Trigger a full self-serve workspace export bundle (async).
      tags: [Exports]
      responses:
        '202':
          description: Export run enqueued.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ExportRun' }
        '403': { $ref: '#/components/responses/Forbidden' }
  /exports/{id}:
    get:
      operationId: getExport
      summary: Get the status (and, when complete, artifact refs) of an export run.
      tags: [Exports]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: The export run.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ExportRun' }
        '404': { $ref: '#/components/responses/NotFound' }

  # ------------------------------ /imports ----------------------------------
  /imports:
    post:
      operationId: createImport
      summary: Start a mandatory dry-run over a seeded source (async, returns import_run with status validating/awaiting_approval).
      tags: [Imports]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateImportRequest' }
      responses:
        '202':
          description: Import dry-run enqueued.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ImportRun' }
        '403': { $ref: '#/components/responses/Forbidden' }
  /imports/{id}:
    get:
      operationId: getImport
      summary: Get the status and (when complete) validation report ref of an import run.
      tags: [Imports]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: The import run.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ImportRun' }
        '404': { $ref: '#/components/responses/NotFound' }
  /imports/{id}/approve:
    post:
      operationId: approveImport
      summary: Approve a dry-run result and enqueue the real import run (async, 202).
      tags: [Imports]
      parameters:
        - name: id
