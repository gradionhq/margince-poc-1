  /conversation-links:
    post:
      tags: [Conversations]
      operationId: linkConversation
      summary: Link a CRM record to an external conversation. 🟡 — agent calls are queued behind the approval gate.
      description: |
        Creates a `conversation_link` row joining a CRM record (`entity_type` + `entity_id`) to an
        external conversation (`conversation_system` + `conversation_id`). Idempotent on the UNIQUE
        natural key — re-linking the same pair is a no-op (returns the existing row, 201). Audited
        (action=create, entity=linked record). Provenance (`source` + `captured_by`) is mandatory.
      x-mcp-tool: { verb: link_conversation, tier: yellow }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateConversationLinkRequest' }
      responses:
        '201':
          description: Link created (or already existed — idempotent).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ConversationLink' }
        '400':
          description: Missing or invalid required fields.
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }
        '401':
          description: Unauthenticated.
  /conversation-links/{id}:
    delete:
      tags: [Conversations]
      operationId: unlinkConversation
      summary: Remove a conversation link by id. 🟡 — agent calls are queued behind the approval gate.
      description: |
        Hard-deletes the `conversation_link` row identified by `id`. Audited (action=archive,
        entity=linked record). Returns 204 on success, 404 if no row with that id exists in
        the caller's workspace.
      x-mcp-tool: { verb: unlink_conversation, tier: yellow }
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
