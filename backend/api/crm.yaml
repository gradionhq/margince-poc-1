            application/json:
              schema: { $ref: '#/components/schemas/ExportRun' }
        '404': { $ref: '#/components/responses/NotFound' }

  # ------------------------------ /imports ----------------------------------
  /imports:
    post:
      operationId: createImport
      summary: Start a mandatory dry-run over a seeded source (async, returns import_run with status validating/awaiting_approval).
      tags: [Imports]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateImportRequest' }
      responses:
        '202':
          description: Import dry-run enqueued.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ImportRun' }
        '403': { $ref: '#/components/responses/Forbidden' }
  /imports/{id}:
    get:
      operationId: getImport
      summary: Get the status and (when complete) validation report ref of an import run.
      tags: [Imports]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: The import run.
          content:
            application/json:
