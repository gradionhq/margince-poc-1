  # =========================================================================
  # =========================================================================
  # NET-NEW V1 RESOURCES (data-model.md §12.5) — first-class, but specified by
  # PATTERN here rather than expanded inline, to keep this file readable. Each
  # follows the SAME resource shape as /people|/deals above — list (cursor+Sort),
  # get, create, update (If-Match), archive — with schemas drawn 1:1 from the
  # §12.5 DDL. The contract-codegen + AC-MCP-3 lint MUST emit/verify these ops:
  #   /signals            (E08; MCP search_records/read_record; resolve via POST /signals/{id}/resolve)
  #   /deal-rooms         (E08/E12; engagement events are read via /deal-rooms/{id}/engagement)
  #   /voice-profiles     (E07; corpus sources via /voice-profiles/{id}/sources)
  #   /drafting-assets    (E07/E08; approval flips `approved` — admin/🟡)
  #   /agent-connections  (E10; revoke via POST /agent-connections/{id}/revoke; events read-only)
  # ------------------------------ /automations --------------------------------
  /automations:
    get:
      tags: [Automations]
      operationId: listAutomations
      summary: List all live automations in the workspace.
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: A list of automations.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AutomationListResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
    post:
      tags: [Automations]
      operationId: createAutomation
      summary: Create a catalog-backed automation. Trigger and action jsonb are validated against the closed catalog — 422 on any rejection.
      description: |
        Creates an `automation` row. The `trigger` and `action` jsonb are validated via
        `catalog.ValidateTrigger` / `catalog.ValidateAction`; a missing/mistyped bounded param
        returns `422`. The `tier` is derived from the catalog — never from the request body.
        Writes one `audit_log` row (action=create) in the same transaction.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateAutomationRequest' }
      responses:
        '201':
          description: Automation created.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Automation' }
        '400':
          description: Missing required fields.
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }
        '422':
          description: Catalog validation failed (invalid trigger_type, action_type, or bounded param).
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /automations/{id}:
    parameters:
      - $ref: '#/components/parameters/Id'
    get:
      tags: [Automations]
      operationId: getAutomation
      summary: Get one automation by id.
      responses:
        '200':
          description: The automation.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Automation' }
        '404': { $ref: '#/components/responses/NotFound' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
    patch:
      tags: [Automations]
      operationId: patchAutomation
      summary: Parameterize (edit trigger/action) or pause (enabled=false) an automation.
      description: |
        Supply any subset of `{trigger, action, enabled}`. Omitted fields are unchanged.
        `trigger`/`action` are re-validated against the closed catalog — 422 on rejection.
        `tier` is re-derived from the new action (if action is supplied). Writes one
        `audit_log` row (action=parameterize or action=pause) in the same transaction.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PatchAutomationRequest' }
      responses:
        '200':
          description: Automation after patch.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Automation' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422':
          description: Catalog validation failed.
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
    delete:
      tags: [Automations]
      operationId: deleteAutomation
      summary: Soft-delete (archive) an automation. Subsequent GET returns 404.
      description: |
        Sets `archived_at=now()` on the automation (soft-delete, preserving audit history).
        Writes one `audit_log` row (action=archive) in the same transaction.
      responses:
        '204':
          description: Automation archived.
        '404': { $ref: '#/components/responses/NotFound' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
  #   /saved-views        (E15; V1 enforces shared_scope=private)
  #   /quotas             (E09; owner XOR team)
  # field_mask, deal_channel, gtm_module_install are config/
  # join tables surfaced through admin/parent endpoints, not standalone CRUD.
  # conversation_link has its own polymorphic endpoint: POST /conversation-links +
  # DELETE /conversation-links/{id} (B-E14.2).
  #
  # OFFERS / ANGEBOTE (data-model.md §12.6; A48/ADR-0037) — bounded line-item
  # quote engine, NOT CPQ. Same resource shape (list/get/create/update If-Match/
  # archive), schemas drawn 1:1 from the §12.6 DDL, PLUS these non-CRUD actions:
  #   /products              (rate-card; MCP search_records/create_record, tier green; OPTIONAL — a workspace may quote free-form)
  #   /offer-templates       (branded DE/EN PDF layouts; admin; one default per locale)
  #   /deals/{id}/offers     (list/create an offer under a deal; offer.revision versioning)
  #   /offers/{id}           (get/update — update allowed only while status=draft; If-Match)
  #   /offers/{id}/line-items (nested CRUD; line totals are SERVER-COMPUTED, not client-set; 422 if client sends line_total)
  #   POST /offers/{id}/regenerate  (🟢 AI: regenerate-from-signal → new draft revision; x-mcp-tool verb draft_offer, tier green)
  #   POST /offers/{id}/render      (produce the branded PDF → pdf_asset_ref)
  #   POST /offers/{id}/send        (🟡 — leaves the workspace: publish to Deal Room / email PDF; x-mcp-tool tier yellow, ErrRequiresApproval; ADR-0036 token)
  #   POST /offers/{id}/accept      (flip status=accepted, sync deal.amount_minor from gross, emit offer.accepted; in-room action — no e-sign in V1)
  # Money totals (net/tax/gross) are DERIVED server-side from line items (P11
  # integer minor-units); a client-supplied total is rejected. Multi-currency
  # offers roll up to base via fx_rate (RT-PR-C2). Offer drafting obeys evidence-
  # or-omit (features/07) and NEVER fabricates a price (rate-card or blank).
  # =========================================================================

  /conversation-links:
    post:
      tags: [Conversations]
      operationId: linkConversation
      summary: Link a CRM record to an external conversation. 🟡 — agent calls are queued behind the approval gate.
      description: |
        Creates a `conversation_link` row joining a CRM record (`entity_type` + `entity_id`) to an
        external conversation (`conversation_system` + `conversation_id`). Idempotent on the UNIQUE
        natural key — re-linking the same pair is a no-op (returns the existing row, 201). Audited
        (action=create, entity=linked record). Provenance (`source` + `captured_by`) is mandatory.
      x-mcp-tool: { verb: link_conversation, tier: yellow }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateConversationLinkRequest' }
      responses:
        '201':
          description: Link created (or already existed — idempotent).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ConversationLink' }
        '400':
          description: Missing or invalid required fields.
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }
        '401':
          description: Unauthenticated.
  /conversation-links/{id}:
    delete:
      tags: [Conversations]
      operationId: unlinkConversation
      summary: Remove a conversation link by id. 🟡 — agent calls are queued behind the approval gate.
      description: |
        Hard-deletes the `conversation_link` row identified by `id`. Audited (action=archive,
        entity=linked record). Returns 204 on success, 404 if no row with that id exists in
        the caller's workspace.
      x-mcp-tool: { verb: unlink_conversation, tier: yellow }
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '204':
          description: Link removed.
        '404':
          description: Link not found in this workspace.
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }
        '401':
          description: Unauthenticated.

  # ------------------------------ /deal-rooms --------------------------------

  /deal-rooms/{id}/publish:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    post:
      tags: [DealRooms]
      operationId: publishDealRoom
      summary: Publish a deal room (internal — requires deal_room/publish grant). Refused when consent_state ∉ {granted}.
      description: |
        Sets `published_at = now()` on the deal room. Refused with 409 when `consent_state`
        is `pending` or `revoked` (the disclosed-consent gate). Writes exactly one `audit_log`
        entry (action=publish). Idempotent if already published (returns the room unchanged
        with 200). Requires the `deal_room/publish` RBAC grant — gated under `workspaceWrap →
        requireAuth` with an explicit RBAC check.
      responses:
        '200':
          description: The deal room after publish (published_at set).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DealRoom' }
        '409':
          description: Consent not granted — publish refused.
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }
              examples:
                consent_not_granted:
                  value:
                    type: 'https://errors.margince.com/consent_not_granted'
                    title: Consent Not Granted
                    status: 409
                    code: consent_not_granted
                    detail: The deal room cannot be published until consent_state is granted.
        '404': { $ref: '#/components/responses/NotFound' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /deal-rooms/by-token:
    get:
      tags: [DealRooms]
      operationId: resolveDealRoomByToken
      summary: Resolve a published deal room by its access token (unauthenticated public accessor).
      description: |
        Returns the deal room only when all three conditions hold: the room is published
        (`published_at IS NOT NULL`), `consent_state = 'granted'`, and the presented
        `access_token` matches. Any other condition returns 404 — never leaks existence.
        This endpoint is unauthenticated (no RBAC) — it is the external read path for
        recipients of a published deal-room link.
      security: []
      parameters:
        - name: token
          in: query
          required: true
          schema: { type: string }
          description: The access_token for the deal room.
        - name: workspace_id
          in: query
          required: true
          schema: { type: string, format: uuid }
          description: The workspace the deal room belongs to.
      responses:
        '200':
          description: The published, consent-granted deal room.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DealRoom' }
        '404':
          description: No published, consent-granted room found for this token + workspace.
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }

  # DEFERRED — stubs only (data-model.md §12). Intentionally NOT specified:
  #   /sequences, /sequences/{id}/steps, /enrollments   (outbound cadences; sends gated)
  #   /overlay/*                                         (overlay-on-incumbents read model)
  #   /calls, /telephony/*                               (telephony / click-to-call)
  #   /embeddings, /context-graph/*                      (pgvector retrieval store)
  #   /workflow-runs                                     (workflow registry run records)
  #   /attachments                                       (S3/MinIO refs — schema exists; endpoints fast-follow)
  #   /audit-log                                         (read API for AuditLogEntry — admin/compliance; fast-follow)
  #   /users, /teams, /roles                             (admin identity mgmt — schema below; CRUD fast-follow)
  # =========================================================================

# =============================================================================
components:

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        Bearer JWT. Claims carry the workspace (tenant) and the principal — either a human
        (`human:<user-uuid>`) or an agent acting under an Agent Seat Passport
        (`agent:<id>` + passport id + on-behalf-of human). The principal's effective RBAC
        (own/team/all + field masks) is enforced server-side; an agent can never exceed its
        granting human's permissions.

  # --------------------------- shared parameters ----------------------------
  parameters:
    Id:
      name: id
      in: path
      required: true
      schema: { type: string, format: uuid }
      description: Opaque resource id (UUID; ordering semantics are not exposed).
    Cursor:
      name: cursor
      in: query
      schema: { type: string }
      description: |
        Opaque keyset cursor from a prior response's `page.next_cursor`. The cursor encodes the
        effective `sort` and `filter` of the originating request plus the last row's keyset
        (sort-key tuple + `id` tie-breaker). **Stability:** results are stable under concurrent
        inserts/updates (keyset pagination, not offset). Supplying `cursor` together with a `sort`
        or filter that differs from the one the cursor was minted under returns
        `422 code: cursor_param_mismatch` — re-issue the query without the cursor.
    Limit:
      name: limit
      in: query
      schema: { type: integer, minimum: 1, maximum: 200, default: 50 }
      description: Max items in the page.
    Sort:
      name: sort
      in: query
      schema: { type: string }
      description: |
        Sort spec: comma-separated fields, `-` prefix = descending (e.g. `-updated_at,full_name`).
        `id` is always appended as the final tie-breaker so ordering is total and the keyset cursor
        is deterministic. **Allowed sort fields per resource** are the indexed columns enumerated in
        data-model.md §13 (Sort/filter vocabulary); the default sort when omitted is `-created_at,id`.
        An out-of-vocabulary field returns `422 code: sort_field_not_allowed`.
    IncludeArchived:
      name: include_archived
      in: query
      schema: { type: boolean, default: false }
      description: Include soft-deleted (archived) rows. Default false.
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      schema: { type: string, maxLength: 255 }
      description: |
        Client-supplied key making a POST safe to retry. **Scope:** the key is unique within
        `(workspace_id, principal, request-path)` and retained **24h**; a replay within that window
        returns the original status + body. Reusing the same key with a *different* request body
        returns `409 code: idempotency_key_conflict` (never a silent replay of mismatched intent).
        **Precedence vs natural keys:** on `logActivity`/`createLead`, the Idempotency-Key (transport
        retry-safety) is checked first; if absent, the `(source_system, source_id)` natural key
        (data-model dedupe) governs. The two never both create a row. Strongly recommended on all POSTs.
    ApprovalToken:
      name: X-Approval-Token
      in: header
      schema: { type: string }
      description: |
        A signed, single-use approval token (see schema `ApprovalToken`) minted by
        POST /approvals/{id}/approve, authorizing exactly one 🟡 confirm-first operation. It is a
        compact JWS whose claims **bind** the token to a specific approval, effect, tenant and
        principal — it is NOT a bare opaque string (ADR-0036). The server rejects a token that is
        expired, already consumed, or whose `diff_hash`/`workspace_id`/`passport_id`/`tool` does not
        match the operation being executed (`403 code: approval_token_invalid`). Required when an
        AGENT principal invokes a 🟡 operation; a human's direct call is itself the approval.
    IfMatch:
      name: If-Match
      in: header
      schema: { type: string }
      description: |
        Optional optimistic-concurrency precondition for a mutating request (PATCH/advance/merge):
        the last-seen entity `version`. If the row's current `version` differs, the write is
        rejected with `409 code: version_skew` (ErrVersionSkew) and no change is made — re-read,
        re-apply, retry. Omitting it is last-write-wins (discouraged for agent/automated writers).
        Accepted on every native-mode mutating endpoint that returns a versioned entity.

  # --------------------------- shared responses -----------------------------
  responses:
    Unauthorized:
      description: Missing or invalid bearer token.
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }
          examples:
            unauth:
              value: { type: 'https://errors.margince.com/unauthorized', title: Unauthorized, status: 401, code: unauthorized, detail: Missing or invalid bearer token. }
    Forbidden:
      description: Authenticated but not permitted (RBAC row/field scope, or 🟡 approval missing).
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }
          examples:
            rbac:
              value: { type: 'https://errors.margince.com/forbidden', title: Forbidden, status: 403, code: forbidden, detail: Your role does not permit this action. }
    NotFound:
      description: No such resource in this workspace (or out of RBAC scope).
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }
          examples:
            notFound:
              value: { type: 'https://errors.margince.com/not_found', title: Not found, status: 404, code: not_found, detail: Resource not found. }
    Conflict:
      description: State conflict (duplicate key, concurrent edit, already-decided, default-pipeline collision).
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }
    VersionConflict:
      description: 'Optimistic-lock failure — the entity changed since the version in If-Match (`code: version_skew`).'
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }
          examples:
            skew:
              value: { type: 'https://errors.margince.com/version_skew', title: Version conflict, status: 409, code: version_skew, detail: The resource changed since your last read; re-read and retry. }
    ValidationError:
      description: Request failed validation (RFC 7807 with field-level `details.errors`).
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }
          examples:
            invalid:
              value:
                type: 'https://errors.margince.com/validation_error'
                title: Validation failed
                status: 422
                code: validation_error
                detail: One or more fields are invalid.
                details:
                  errors:
                    - { field: 'emails[0].email', code: invalid_email }

  # ------------------------------- schemas ----------------------------------
  schemas:

    # ---- identity: workspace bootstrap, auth, passports ----
    WorkspaceCreateRequest:
      type: object
      required: [name, slug, base_currency, admin_email, admin_password, admin_display_name]
      properties:
        name: { type: string }
        slug: { type: string }
        base_currency: { type: string, minLength: 3, maxLength: 3 }
        admin_email: { type: string, format: email }
        admin_password: { type: string, minLength: 8 }
        admin_display_name: { type: string }

    WorkspaceResponse:
      type: object
      required: [id, name, slug, base_currency, created_at]
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        slug: { type: string }
        base_currency: { type: string, minLength: 3, maxLength: 3 }
        created_at: { type: string, format: date-time }

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string }

    LoginResponse:
      type: object
      required: [user_id, workspace_id]
      properties:
        user_id: { type: string, format: uuid }
        workspace_id: { type: string, format: uuid }

    PassportCreateRequest:
      type: object
      required: [scopes, expires_in_seconds]
      properties:
        scopes: { type: array, items: { type: string } }
        expires_in_seconds: { type: integer, minimum: 60, maximum: 2592000 }

    HubSpotConnectionView:
      type: object
      required: [connector, status, scopes, connected_at, masked_token]
      properties:
        connector: { type: string, example: hubspot }
        status: { type: string, enum: [active, revoked] }
        scopes:
          type: array
          items: { type: string }
        connected_at: { type: string, format: date-time }
        last_rotated_at: { type: string, format: date-time, nullable: true }
        masked_token:
          type: string
          description: Fixed-length masked suffix only (e.g. "••••••••ab12") — never the real token.

    PassportResponse:
      type: object
      required: [id, granted_by, scopes, expires_at, revoked_at]
      properties:
        id: { type: string, format: uuid }
        granted_by: { type: string, format: uuid }
        scopes: { type: array, items: { type: string } }
        expires_at: { type: string, format: date-time }
        revoked_at: { type: string, format: date-time, nullable: true }
        token: { type: string, description: "Only present on create response" }

    # ---- error (RFC 7807) ----
    Problem:
      type: object
      description: RFC 7807 problem+json with a stable machine `code` and structured `details`.
      required: [status, code]
      properties:
        type:
          type: string
          format: uri
          default: about:blank
          description: A URI identifying the problem type.
        title: { type: string, description: Short, human-readable summary. }
        status: { type: integer, description: HTTP status code. }
        code:
          type: string
          description: Stable machine-readable error code (e.g. duplicate_email, validation_error).
        detail: { type: string, description: Human-readable explanation for this occurrence. }
        instance: { type: string, format: uri, description: URI of the specific occurrence. }
        details:
          type: object
          additionalProperties: true
          description: |
            Structured machine context — e.g. `existing_id` on 409 duplicate, or an
            `errors` array of `{ field, code, message }` on 422 validation.

    # ---- pagination envelope ----
    PageInfo:
      type: object
      required: [has_more]
      properties:
        next_cursor:
          type: [string, 'null']
          description: Opaque cursor for the next page, or null if none.
        has_more: { type: boolean }

    # ---- mixins ----
    Provenance:
      type: object
      description: Provenance carried on every captured/user-entered domain row (data-model §1.6).
      required: [source, captured_by]
      properties:
        source:
          type: string
          description: 'What produced the row: email:<id> | calendar:<id> | connector:<n>:<id> | api | import:<batch> | ui | coldstart.'
        captured_by:
          type: string
          description: 'Who produced it: human:<uuid> | agent:<id> | connector:<name>.'
        raw:
          type: [object, 'null']
          additionalProperties: true
          description: Re-parseable original capture payload (off the query hot path); usually omitted in list views.
    Timestamps:
      type: object
      required: [created_at, updated_at]
      properties:
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        archived_at:
          type: [string, 'null']
          format: date-time
          description: Soft-delete marker. Null = live.

    Address:
      type: [object, 'null']
      description: Structured postal address.
      properties:
        line1: { type: [string, 'null'] }
        line2: { type: [string, 'null'] }
        city: { type: [string, 'null'] }
        region: { type: [string, 'null'] }
        postal_code: { type: [string, 'null'] }
        country: { type: [string, 'null'], description: ISO-3166 alpha-2. }
      additionalProperties: true

    Money:
      type: object
      description: Money as integer minor-units + ISO-4217 currency. Never a float.
      properties:
        amount_minor:
          type: [integer, 'null']
          format: int64
          description: Smallest currency unit (e.g. cents). 100000 EUR-cents = €1,000.00.
        currency:
          type: [string, 'null']
          pattern: '^[A-Z]{3}$'
          description: ISO-4217 uppercase.

    # ---- Person + children ----
    PersonEmail:
      type: object
      required: [id, email, email_type, is_primary, position, source, captured_by]
      properties:
        id: { type: string, format: uuid }
        person_id: { type: string, format: uuid }
        email: { type: string, format: email, description: Stored lowercased. }
        email_type: { type: string, enum: [work, personal, other], default: work }
        is_primary: { type: boolean, default: false, description: At most one primary per type (DB-enforced). }
        position: { type: integer, default: 0, description: Explicit ordering. }
        source: { type: string }
        captured_by: { type: string }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        archived_at: { type: [string, 'null'], format: date-time }

    PersonPhone:
      type: object
      required: [id, phone, phone_type, is_primary, position, source, captured_by]
      properties:
        id: { type: string, format: uuid }
        person_id: { type: string, format: uuid }
        phone: { type: string, description: E.164 normalized. }
        phone_type: { type: string, enum: [work, mobile, home, other], default: work }
        is_primary: { type: boolean, default: false }
        position: { type: integer, default: 0 }
        source: { type: string }
        captured_by: { type: string }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        archived_at: { type: [string, 'null'], format: date-time }

    Person:
      type: object
      description: A contact. Mirrors the `person` table.
      required: [id, workspace_id, full_name, source, captured_by, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        workspace_id: { type: string, format: uuid }
        first_name: { type: [string, 'null'] }
        last_name: { type: [string, 'null'] }
        full_name: { type: string, description: Always present (display name). }
        title: { type: [string, 'null'], description: Denormalized current title; authoritative title is on the employment relationship. }
        owner_id: { type: [string, 'null'], format: uuid }
        social:
          type: object
          additionalProperties: true
          description: '{ linkedin, twitter, github, ... }'
        address: { $ref: '#/components/schemas/Address' }
        emails:
          type: array
          items: { $ref: '#/components/schemas/PersonEmail' }
        phones:
          type: array
          items: { $ref: '#/components/schemas/PersonPhone' }
        consent:
          type: array
          readOnly: true
          description: |
            Per-purpose consent summary (A22/ADR-0011). Read-only derived view of the `person_consent`
            rows; one entry per purpose the workspace tracks. The single flat `consent_state` flag was
            REMOVED — consent is per-purpose and demonstrable (data-model.md §3.4). Mutate via
            `POST /people/{id}/consent`; read the full proof log via `GET /people/{id}/consent`.
          items: { $ref: '#/components/schemas/PersonConsentState' }
        merged_into_id: { type: [string, 'null'], format: uuid, description: Set when this row was merged away. }
        converted_from_lead_id: { type: [string, 'null'], format: uuid, description: Canonical origin pointer if promoted from a lead. }
        source: { type: string }
        captured_by: { type: string }
        raw: { type: [object, 'null'], additionalProperties: true }
        version: { $ref: '#/components/schemas/RowVersion' }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        archived_at: { type: [string, 'null'], format: date-time }
      additionalProperties: true
      x-extension: true
      x-extension-note: |
        additionalProperties:true admits client custom fields (data-model §9 — custom fields
        are real columns added by migration, surfaced additively through this same contract).

    CreatePersonRequest:
      type: object
      required: [full_name, source, captured_by]
      properties:
        full_name: { type: string }
        first_name: { type: [string, 'null'] }
        last_name: { type: [string, 'null'] }
        title: { type: [string, 'null'] }
        owner_id: { type: [string, 'null'], format: uuid }
        social: { type: object, additionalProperties: true }
        address: { $ref: '#/components/schemas/Address' }
        emails:
          type: array
          items:
            type: object
            required: [email]
            properties:
              email: { type: string, format: email }
              email_type: { type: string, enum: [work, personal, other], default: work }
              is_primary: { type: boolean, default: false }
              position: { type: integer, default: 0 }
        phones:
          type: array
          items:
            type: object
            required: [phone]
            properties:
              phone: { type: string }
              phone_type: { type: string, enum: [work, mobile, home, other], default: work }
              is_primary: { type: boolean, default: false }
              position: { type: integer, default: 0 }
        source: { type: string }
        captured_by: { type: string }
      additionalProperties: true
      x-extension: true

    UpdatePersonRequest:
      type: object
      description: Partial update. Omitted fields are unchanged.
      properties:
        full_name: { type: string }
        first_name: { type: [string, 'null'] }
        last_name: { type: [string, 'null'] }
        title: { type: [string, 'null'] }
        owner_id: { type: [string, 'null'], format: uuid }
        social: { type: object, additionalProperties: true }
        address: { $ref: '#/components/schemas/Address' }
      additionalProperties: true
      x-extension: true
      x-consent-note: |
        Consent is NOT mutable through person update (A22/ADR-0011). Use POST /people/{id}/consent
        so that every change writes an append-only `consent_event` proof row.

    PersonListResponse:
      type: object
      required: [data, page]
      properties:
        data:
          type: array
          items: { $ref: '#/components/schemas/Person' }
        page: { $ref: '#/components/schemas/PageInfo' }

    # ---- Organization + domain ----
    OrganizationDomain:
      type: object
      required: [id, domain, is_primary, source, captured_by]
      properties:
        id: { type: string, format: uuid }
        organization_id: { type: string, format: uuid }
        domain: { type: string, description: Lowercased, no scheme, no www. }
        is_primary: { type: boolean, default: false }
        source: { type: string }
        captured_by: { type: string }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        archived_at: { type: [string, 'null'], format: date-time }

    Organization:
      type: object
      description: A company. Mirrors the `organization` table.
      required: [id, workspace_id, display_name, source, captured_by, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        workspace_id: { type: string, format: uuid }
        display_name: { type: string }
        legal_name: { type: [string, 'null'] }
        industry: { type: [string, 'null'] }
        size_band:
          type: [string, 'null']
          enum: [null, '1-10', '11-50', '51-200', '201-500', '501-1000', '1001-5000', '5000+']
        address: { $ref: '#/components/schemas/Address' }
        owner_id: { type: [string, 'null'], format: uuid }
        parent_org_id: { type: [string, 'null'], format: uuid, description: Single-level hierarchy FK; no cycles. }
        merged_into_id: { type: [string, 'null'], format: uuid }
        domains:
          type: array
          items: { $ref: '#/components/schemas/OrganizationDomain' }
        classification: { type: [string, 'null'], enum: [null, customer, prospect, partner, vendor, other], description: "An org IS a partner iff classification='partner' AND it has a `partner` row (A41/ADR-0032)." }
        source: { type: string }
        captured_by: { type: string }
        raw: { type: [object, 'null'], additionalProperties: true }
        partner: { $ref: '#/components/schemas/Partner' }
        version: { $ref: '#/components/schemas/RowVersion' }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        archived_at: { type: [string, 'null'], format: date-time }
      additionalProperties: true
      x-extension: true

    CreateOrganizationRequest:
      type: object
      required: [display_name, source, captured_by]
      properties:
        display_name: { type: string }
        legal_name: { type: [string, 'null'] }
        industry: { type: [string, 'null'] }
        size_band: { type: [string, 'null'], enum: [null, '1-10', '11-50', '51-200', '201-500', '501-1000', '1001-5000', '5000+'] }
        address: { $ref: '#/components/schemas/Address' }
        owner_id: { type: [string, 'null'], format: uuid }
        parent_org_id: { type: [string, 'null'], format: uuid }
        domains:
          type: array
          items:
            type: object
            required: [domain]
            properties:
              domain: { type: string }
              is_primary: { type: boolean, default: false }
        source: { type: string }
        captured_by: { type: string }
      additionalProperties: true
      x-extension: true

    UpdateOrganizationRequest:
      type: object
      properties:
        display_name: { type: string }
        legal_name: { type: [string, 'null'] }
        industry: { type: [string, 'null'] }
        size_band: { type: [string, 'null'], enum: [null, '1-10', '11-50', '51-200', '201-500', '501-1000', '1001-5000', '5000+'] }
        address: { $ref: '#/components/schemas/Address' }
        owner_id: { type: [string, 'null'], format: uuid }
        parent_org_id: { type: [string, 'null'], format: uuid }
      additionalProperties: true
      x-extension: true

    OrganizationListResponse:
      type: object
      required: [data, page]
      properties:
        data: { type: array, items: { $ref: '#/components/schemas/Organization' } }
        page: { $ref: '#/components/schemas/PageInfo' }

    # ---- Relationship ----
    Relationship:
      type: object
      description: |
        The typed edge. Mirrors `relationship` (data-model §5). Shapes by `kind`:
        `employment` (person↔org), `deal_stakeholder` (deal↔person), and the partner edges
        (A41/ADR-0032, org↔org via `counterparty_org_id`): `partner_of` (org served by a partner
        org), `referred_by` (org referred by a partner org), `co_sell_with` (org co-sold with a partner org).
      required: [id, workspace_id, kind, source, captured_by, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        workspace_id: { type: string, format: uuid }
        kind: { type: string, enum: [employment, deal_stakeholder, partner_of, referred_by, co_sell_with] }
        person_id: { type: [string, 'null'], format: uuid }
        organization_id: { type: [string, 'null'], format: uuid }
        counterparty_org_id: { type: [string, 'null'], format: uuid, description: 'The other org on a partner edge (partner_of/referred_by/co_sell_with). Null for employment/deal_stakeholder.' }
        deal_id: { type: [string, 'null'], format: uuid }
        role:
          type: [string, 'null']
          description: 'employment: cto/vp_sales/...; stakeholder: champion/economic_buyer/blocker/influencer/user.'
        is_current_primary: { type: boolean, default: false, description: Employment — the one current primary employer (≤1 per person). }
        started_at: { type: [string, 'null'], format: date }
        ended_at: { type: [string, 'null'], format: date, description: Null = current/ongoing. }
        source: { type: string }
        captured_by: { type: string }
        version: { $ref: '#/components/schemas/RowVersion' }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        archived_at: { type: [string, 'null'], format: date-time }

    CreateRelationshipRequest:
      type: object
      required: [kind, source, captured_by]
      properties:
        kind: { type: string, enum: [employment, deal_stakeholder, partner_of, referred_by, co_sell_with] }
        person_id: { type: [string, 'null'], format: uuid }
        organization_id: { type: [string, 'null'], format: uuid }
        counterparty_org_id: { type: [string, 'null'], format: uuid }
        deal_id: { type: [string, 'null'], format: uuid }
        role: { type: [string, 'null'] }
        is_current_primary: { type: boolean, default: false }
        started_at: { type: [string, 'null'], format: date }
        ended_at: { type: [string, 'null'], format: date }
        source: { type: string }
        captured_by: { type: string }

    UpdateRelationshipRequest:
      type: object
      properties:
        role: { type: [string, 'null'] }
        is_current_primary: { type: boolean }
        started_at: { type: [string, 'null'], format: date }
        ended_at: { type: [string, 'null'], format: date }

    RelationshipListResponse:
      type: object
      required: [data, page]
      properties:
        data: { type: array, items: { $ref: '#/components/schemas/Relationship' } }
        page: { $ref: '#/components/schemas/PageInfo' }

    # ---- Deal ----
    Deal:
      type: object
      description: A deal. Mirrors the `deal` table.
      required: [id, workspace_id, name, pipeline_id, stage_id, status, source, captured_by, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        workspace_id: { type: string, format: uuid }
        name: { type: string }
        amount_minor: { type: [integer, 'null'], format: int64 }
        currency: { type: [string, 'null'], pattern: '^[A-Z]{3}$' }
        fx_rate_to_base: { type: [string, 'null'], description: 'Native→base, frozen at close (null while open). Decimal-as-string to avoid float rounding of the 10-dp rate.' }
        fx_rate_date: { type: [string, 'null'], format: date }
        pipeline_id: { type: string, format: uuid }
        stage_id: { type: string, format: uuid, description: Must belong to pipeline_id. }
        organization_id: { type: [string, 'null'], format: uuid, description: Primary org; never a raw lead. }
        partner_org_id: { type: [string, 'null'], format: uuid, description: 'Deal registration/attribution to a partner org (A38/A41/ADR-0032). The org must have a `partner` row.' }
        owner_id: { type: [string, 'null'], format: uuid }
        status: { type: string, enum: [open, won, lost], default: open }
        lost_reason: { type: [string, 'null'], description: Required when status=lost. }
        forecast_category: { type: [string, 'null'], enum: [null, commit, best_case, pipeline, omitted] }
        expected_close_date: { type: [string, 'null'], format: date }
        wait_until: { type: [string, 'null'], format: date, description: "'Customer asked us to wait until' date; suppresses the stalled flag but not the overdue close-date flag." }
        closed_at: { type: [string, 'null'], format: date-time }
        last_activity_at: { type: [string, 'null'], format: date-time, description: Drives the deterministic stalled flag. }
        stalled: { type: boolean, readOnly: true, description: Derived — no activity past the threshold (absolute duration). }
        source: { type: string }
        captured_by: { type: string }
        raw: { type: [object, 'null'], additionalProperties: true }
        version: { $ref: '#/components/schemas/RowVersion' }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        archived_at: { type: [string, 'null'], format: date-time }
      additionalProperties: true
      x-extension: true

    CreateDealRequest:
      type: object
      required: [name, pipeline_id, stage_id, source, captured_by]
      properties:
        name: { type: string }
        amount_minor: { type: [integer, 'null'], format: int64 }
        currency: { type: [string, 'null'], pattern: '^[A-Z]{3}$' }
        pipeline_id: { type: string, format: uuid }
        stage_id: { type: string, format: uuid }
        organization_id: { type: [string, 'null'], format: uuid }
        owner_id: { type: [string, 'null'], format: uuid }
        expected_close_date: { type: [string, 'null'], format: date }
        source: { type: string }
        captured_by: { type: string }
      additionalProperties: true
      x-extension: true

    UpdateDealRequest:
      type: object
      properties:
        name: { type: string }
        amount_minor: { type: [integer, 'null'], format: int64 }
        currency: { type: [string, 'null'], pattern: '^[A-Z]{3}$' }
        organization_id: { type: [string, 'null'], format: uuid }
        partner_org_id: { type: [string, 'null'], format: uuid }
        owner_id: { type: [string, 'null'], format: uuid }
        status: { type: string, enum: [open, won, lost] }
        lost_reason: { type: [string, 'null'] }
        fx_rate_to_base: { type: [string, 'null'], description: 'Native→base rate to FREEZE at close. Required (server may also compute it from the FX table) when transitioning to won with a non-base currency — satisfies the deal_closed_fx CHECK (formulas §6.1). Ignored while open.' }
        fx_rate_date: { type: [string, 'null'], format: date }
        forecast_category: { type: [string, 'null'], enum: [null, commit, best_case, pipeline, omitted] }
        expected_close_date: { type: [string, 'null'], format: date }
        wait_until: { type: [string, 'null'], format: date }
      additionalProperties: true
      x-extension: true

    AdvanceDealRequest:
      type: object
      required: [to_stage_id]
      properties:
        to_stage_id: { type: string, format: uuid, description: Target stage (must belong to the deal's pipeline). }
        status: { type: string, enum: [open, won, lost], description: Set when advancing into a terminal stage. }
        lost_reason: { type: [string, 'null'], description: Required if status=lost. }

    DealListResponse:
      type: object
      required: [data, page]
      properties:
        data: { type: array, items: { $ref: '#/components/schemas/Deal' } }
        page: { $ref: '#/components/schemas/PageInfo' }

    # ---- Pipeline + Stage ----
    Stage:
      type: object
      description: A pipeline stage. Mirrors the `stage` table.
      required: [id, workspace_id, pipeline_id, name, position, semantic, win_probability, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        workspace_id: { type: string, format: uuid }
        pipeline_id: { type: string, format: uuid }
        name: { type: string }
        position: { type: integer, description: Unique within the pipeline. }
        semantic: { type: string, enum: [open, won, lost], default: open }
        win_probability: { type: integer, minimum: 0, maximum: 100, description: 'won=100, lost=0, open=0..100.' }
        version: { $ref: '#/components/schemas/RowVersion' }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        archived_at: { type: [string, 'null'], format: date-time }

    CreateStageRequest:
      type: object
      required: [pipeline_id, name, position]
      properties:
        pipeline_id: { type: string, format: uuid }
        name: { type: string }
        position: { type: integer }
        semantic: { type: string, enum: [open, won, lost], default: open }
        win_probability: { type: integer, minimum: 0, maximum: 100, default: 0 }

    UpdateStageRequest:
      type: object
      properties:
        name: { type: string }
        position: { type: integer }
        semantic: { type: string, enum: [open, won, lost] }
        win_probability: { type: integer, minimum: 0, maximum: 100 }

    StageListResponse:
      type: object
      required: [data, page]
      properties:
        data: { type: array, items: { $ref: '#/components/schemas/Stage' } }
        page: { $ref: '#/components/schemas/PageInfo' }

    Pipeline:
      type: object
      description: A pipeline. Mirrors the `pipeline` table (with embedded stages on GET).
      required: [id, workspace_id, name, is_default, position, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        workspace_id: { type: string, format: uuid }
        name: { type: string }
        is_default: { type: boolean, default: false, description: Exactly one default per workspace. }
        position: { type: integer, default: 0 }
        stages:
          type: array
          items: { $ref: '#/components/schemas/Stage' }
        version: { $ref: '#/components/schemas/RowVersion' }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        archived_at: { type: [string, 'null'], format: date-time }

    CreatePipelineRequest:
      type: object
      required: [name]
      properties:
        name: { type: string }
        is_default: { type: boolean, default: false }
        position: { type: integer, default: 0 }
        stages:
          type: array
          description: Optional initial stages.
          items: { $ref: '#/components/schemas/CreateStageRequest' }

    UpdatePipelineRequest:
      type: object
      properties:
        name: { type: string }
        is_default: { type: boolean }
        position: { type: integer }

    PipelineListResponse:
      type: object
      required: [data, page]
      properties:
        data: { type: array, items: { $ref: '#/components/schemas/Pipeline' } }
        page: { $ref: '#/components/schemas/PageInfo' }

    # ---- Activity + link ----
    ActivityLink:
      type: object
      required: [entity_type, entity_id]
      properties:
        id: { type: string, format: uuid }
        activity_id: { type: string, format: uuid }
        entity_type: { type: string, enum: [person, organization, deal, lead] }
        entity_id: { type: string, format: uuid }

    Activity:
      type: object
      description: |
        A polymorphic timeline item. Mirrors the `activity` table + `activity_link`.
        **Per-kind field constraints** (enforced server-side to match the DB `activity_task_fields`
        CHECK; the OpenAPI cannot express these conditionally): `due_at`/`assignee_id`/`remind_at`/`is_done`/
        `done_at` are valid ONLY when `kind=task`; `meeting_status` ONLY when `kind=meeting`;
        `duration_seconds` only for meeting/call; `direction` is null for note/task. Setting a
        disallowed field for the kind returns `422 code: field_not_valid_for_kind` (the API rejects
        what the DB CHECK would reject, rather than 500-ing at write time).
      required: [id, workspace_id, kind, occurred_at, source, captured_by, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        workspace_id: { type: string, format: uuid }
        kind: { type: string, enum: [email, call, meeting, note, task, whatsapp, telegram] }
        subject: { type: [string, 'null'] }
        body: { type: [string, 'null'] }
        occurred_at: { type: string, format: date-time }
        due_at: { type: [string, 'null'], format: date-time, description: Task only. }
        assignee_id: { type: [string, 'null'], format: uuid, description: Task only. }
        remind_at: { type: [string, 'null'], format: date-time, description: Task only. }
        is_done: { type: boolean, default: false, description: Task only. }
        done_at: { type: [string, 'null'], format: date-time }
        duration_seconds: { type: [integer, 'null'], description: Meeting/call only. }
        direction: { type: [string, 'null'], enum: [null, inbound, outbound], description: 'inbound/outbound for email/call; null for note/task.' }
        meeting_status: { type: [string, 'null'], enum: [null, booked, held, no_show, canceled], description: 'Set only when kind=meeting.' }
        source_system: { type: [string, 'null'], description: 'gmail/gcal/outlook/transcript — idempotency key part.' }
        source_id: { type: [string, 'null'], description: Provider message/event id — idempotency key part. }
        links:
          type: array
          description: One activity may link to >1 entity (person + deal).
          items: { $ref: '#/components/schemas/ActivityLink' }
        source: { type: string }
        captured_by: { type: string }
        raw: { type: [object, 'null'], additionalProperties: true }
        version: { $ref: '#/components/schemas/RowVersion' }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        archived_at: { type: [string, 'null'], format: date-time }

    CreateActivityRequest:
      type: object
      required: [kind, source, captured_by]
      properties:
        kind: { type: string, enum: [email, call, meeting, note, task, whatsapp, telegram] }
        subject: { type: [string, 'null'] }
        body: { type: [string, 'null'] }
        occurred_at: { type: string, format: date-time }
        due_at: { type: [string, 'null'], format: date-time }
        assignee_id: { type: [string, 'null'], format: uuid }
        remind_at: { type: [string, 'null'], format: date-time }
        duration_seconds: { type: [integer, 'null'] }
        direction: { type: [string, 'null'], enum: [null, inbound, outbound] }
        meeting_status: { type: [string, 'null'], enum: [null, booked, held, no_show, canceled] }
        source_system: { type: [string, 'null'] }
        source_id: { type: [string, 'null'] }
        links:
          type: array
          items:
            type: object
            required: [entity_type, entity_id]
            properties:
              entity_type: { type: string, enum: [person, organization, deal] }
              entity_id: { type: string, format: uuid }
        source: { type: string }
        captured_by: { type: string }
        raw: { type: [object, 'null'], additionalProperties: true }

    UpdateActivityRequest:
      type: object
      properties:
        subject: { type: [string, 'null'] }
        body: { type: [string, 'null'] }
        occurred_at: { type: string, format: date-time }
        due_at: { type: [string, 'null'], format: date-time }
        assignee_id: { type: [string, 'null'], format: uuid }
        remind_at: { type: [string, 'null'], format: date-time }
        is_done: { type: boolean, description: Completing a task writes one audit row + task.completed event. }

    ActivityListResponse:
      type: object
      required: [data, page]
      properties:
        data: { type: array, items: { $ref: '#/components/schemas/Activity' } }
        page: { $ref: '#/components/schemas/PageInfo' }

    EmailDraft:
      type: object
      description: A drafted email (never sent by drafting). Send via /activities/{id}/send-email (🟡).
      required: [subject, body]
      properties:
        subject: { type: string }
        body: { type: string }
        to: { type: array, items: { type: string, format: email } }
        in_reply_to_activity_id: { type: [string, 'null'], format: uuid }

    SendEmailRequest:
      type: object
      required: [subject, body, to, consent_purpose]
      properties:
        subject: { type: string }
        body: { type: string, description: The (possibly edited) final body that is sent. }
        to: { type: array, items: { type: string, format: email } }
        cc: { type: array, items: { type: string, format: email } }
        consent_purpose:
          type: string
          description: |
            The consent purpose this send falls under (e.g. `transactional`, `marketing_email`).
            The send is suppressed (409 `consent_not_granted`) unless every recipient has an active
            `granted` `person_consent` for THIS purpose (default-deny per purpose, A22/ADR-0011).

    # ---- Lead ----
    Lead:
      type: object
      description: A thin, segregated prospect. Mirrors the `lead` table. NO organization FK.
      required: [id, workspace_id, status, score, source, captured_by, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        workspace_id: { type: string, format: uuid }
        full_name: { type: [string, 'null'] }
        email: { type: [string, 'null'], format: email, description: Lowercased; lead-internal dedupe key. }
        title: { type: [string, 'null'] }
        company_name: { type: [string, 'null'], description: FREE TEXT — NOT an organization FK. }
        candidate_org_key: { type: [string, 'null'], description: Loose key for ABM routing without creating an org. }
        status: { type: string, enum: [new, working, promoted, disqualified], default: new }
        score: { type: integer, default: 0, description: Lead-local scoring; never reads the contact graph. }
        owner_id: { type: [string, 'null'], format: uuid }
        source_system: { type: [string, 'null'] }
        source_id: { type: [string, 'null'] }
        promoted_person_id: { type: [string, 'null'], format: uuid, description: Set on promotion (convenience mirror). }
        promoted_at: { type: [string, 'null'], format: date-time }
        source: { type: string }
        captured_by: { type: string }
        raw: { type: [object, 'null'], additionalProperties: true }
        version: { $ref: '#/components/schemas/RowVersion' }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        archived_at: { type: [string, 'null'], format: date-time }

    CreateLeadRequest:
      type: object
      required: [source, captured_by]
      properties:
        full_name: { type: [string, 'null'] }
        email: { type: [string, 'null'], format: email }
        title: { type: [string, 'null'] }
        company_name: { type: [string, 'null'] }
        candidate_org_key: { type: [string, 'null'] }
        status: { type: string, enum: [new, working, promoted, disqualified], default: new }
        owner_id: { type: [string, 'null'], format: uuid }
        source_system: { type: [string, 'null'] }
        source_id: { type: [string, 'null'] }
        source: { type: string }
        captured_by: { type: string }

    LeadScoreFactor:
      type: object
      description: One line of a lead's "Explain This Score" breakdown (formulas-and-rules.md §3.1).
      required: [factor, points, source_activity_ids]
      properties:
        factor: { type: string, description: 'e.g. decision_maker_title, high_intent_source, reply, link_click.' }
        points: { type: number }
        source_activity_ids: { type: array, items: { type: string, format: uuid } }

    LeadScoreExplanation:
      type: object
      required: [score, factors]
      properties:
        score: { type: integer }
        factors: { type: array, items: { $ref: '#/components/schemas/LeadScoreFactor' } }

    OverrideLeadScoreRequest:
      type: object
      description: Exactly one of `score` (set an explicit value) or `clear:true` (lift a prior override) is meaningful per call.
      properties:
        score: { type: [integer, 'null'] }
        clear: { type: boolean, default: false }

    UpdateLeadRequest:
      type: object
      description: |
        Partial update. `status` may move only between `new`/`working` here. **Disqualifying is done
        via DELETE /leads/{id}** (which sets status=disqualified AND archives — the invariant
        "disqualified ⇒ archived" is enforced on that one path); `promoted` is reachable only via
        POST /leads/{id}/promote. Both terminal states are therefore excluded from this enum.
      properties:
        full_name: { type: [string, 'null'] }
        email: { type: [string, 'null'], format: email }
        title: { type: [string, 'null'] }
        company_name: { type: [string, 'null'] }
        candidate_org_key: { type: [string, 'null'], description: 'Loose ABM routing key. Format: lowercased registrable domain when known (`acme.com`), else a slug of company_name. Never an organization FK.' }
        status: { type: string, enum: [new, working] }
        score: { type: [integer, 'null'], minimum: 0, maximum: 100, description: 'Manual human score override (formulas §3.1, AC-S1). Omit to keep the computed lead-local score.' }
        owner_id: { type: [string, 'null'], format: uuid }

    PromoteLeadRequest:
      type: object
      required: [trigger]
      properties:
        trigger:
          type: string
          enum: [inbound_reply, meeting_booked, meeting_held, human_qualify]
          description: |
            The genuine-engagement trigger. cold_outbound_no_reply is NOT permitted and is
            rejected with 422 — promotion is engagement, not import or an outbound touch.
        evidence:
          type: object
          description: Which inbound email/meeting (or human) triggered promotion; recorded in audit.
          properties:
            activity_id: { type: [string, 'null'], format: uuid }
            note: { type: [string, 'null'] }

    PromoteLeadResponse:
      type: object
      required: [person, merged]
      properties:
        person: { $ref: '#/components/schemas/Person' }
        merged:
          type: boolean
          description: True if promotion merged into an existing person (no duplicate); false if a new person was created.
        lead_id: { type: string, format: uuid }

    LeadListResponse:
      type: object
      required: [data, page]
      properties:
        data: { type: array, items: { $ref: '#/components/schemas/Lead' } }
        page: { $ref: '#/components/schemas/PageInfo' }

    # ---- Product (rate-card) ----
    Product:
      type: object
      description: A rate-card product. unit_price_minor is integer minor-units — no float money.
      required: [id, workspace_id, name, unit_price_minor, currency, active, source, captured_by, version, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        workspace_id: { type: string, format: uuid }
        name: { type: string }
        sku: { type: [string, 'null'], description: Optional stock-keeping unit; unique per workspace when supplied. }
        unit_price_minor: { type: integer, format: int64, description: 'Unit price in smallest currency unit (e.g. cents). 150000 EUR-cents = €1,500.00. Never a float.' }
        currency: { type: string, pattern: '^[A-Z]{3}$', description: ISO-4217 uppercase (e.g. EUR, USD). }
        default_tax_rate: { type: [number, 'null'], description: 'Default VAT/tax rate as a decimal (e.g. 0.19 = 19%). Nullable — rate varies by customer/country.' }
        unit: { type: [string, 'null'], description: 'Unit of measure (e.g. day, hour, seat, license). Free text.' }
        active: { type: boolean, default: true, description: Inactive products are hidden from new line-items but remain on existing offers. }
        source: { type: string }
        captured_by: { type: string }
        version: { type: integer, format: int64, description: Monotonic row version for optimistic concurrency (If-Match). }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        archived_at: { type: [string, 'null'], format: date-time }

    CreateProductRequest:
      type: object
      required: [name, unit_price_minor, currency, source, captured_by]
      properties:
        name: { type: string }
        sku: { type: [string, 'null'] }
        unit_price_minor: { type: integer, format: int64, description: 'Unit price in smallest currency unit. Never a float.' }
        currency: { type: string, pattern: '^[A-Z]{3}$' }
        default_tax_rate: { type: [number, 'null'] }
        unit: { type: [string, 'null'] }
        active: { type: boolean, default: true }
        source: { type: string }
        captured_by: { type: string }

    UpdateProductRequest:
      type: object
      description: Partial update via PUT. Only the fields present in the body are changed; omitted fields are left unchanged. Pass If-Match for optimistic concurrency.
      properties:
        name: { type: string }
        sku: { type: [string, 'null'] }
        unit_price_minor: { type: integer, format: int64, description: 'Unit price in smallest currency unit. Never a float.' }
        currency: { type: string, pattern: '^[A-Z]{3}$' }
        default_tax_rate: { type: [number, 'null'] }
        unit: { type: [string, 'null'] }
        active: { type: boolean }
        source: { type: string }
        captured_by: { type: string }

    ProductListResponse:
      type: object
      required: [data, page]
      properties:
        data: { type: array, items: { $ref: '#/components/schemas/Product' } }
        page: { $ref: '#/components/schemas/PageInfo' }

    # ---- DraftingAsset ----
    DraftingAsset:
      type: object
      description: A governed drafting asset (template, copy fragment, or reusable content) in the retrieval store.
      required: [id, workspace_id, kind, title, body, approval_state, owner, source, captured_by, version, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        workspace_id: { type: string, format: uuid }
        kind: { type: string, description: 'Asset kind (e.g. template, snippet, brief). Free text.' }
        title: { type: string, description: Human-readable asset title. }
        body: { type: string, description: 'Asset body / content. Retrieval-only — no rendering or template-execution here.' }
        approval_state: { type: string, enum: [draft, approved, expired], description: Lifecycle state. Only approved assets appear in ListAvailable. }
        owner: { type: string, description: 'Owner identifier (e.g. human:<uuid> or team:<uuid>).' }
        expires_at: { type: [string, 'null'], format: date-time, description: 'Optional expiry timestamp. Past this point the asset is excluded from ListAvailable even if approval_state=approved.' }
        approved_by: { type: [string, 'null'], format: uuid, description: Set when approval_state transitions to approved. }
        approved_at: { type: [string, 'null'], format: date-time, description: Set when approval_state transitions to approved. }
        source: { type: string, description: 'How this asset was captured (e.g. ui, import, agent).' }
        captured_by: { type: string, description: 'Actor that captured the asset (e.g. human:<uuid>, agent:<id>).' }
        version: { type: integer, format: int64, description: Monotonic row version for optimistic concurrency (If-Match). }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        archived_at: { type: [string, 'null'], format: date-time }

    DraftingAssetCreate:
      type: object
      required: [kind, title, body, owner, source, captured_by]
      properties:
        kind: { type: string }
        title: { type: string }
        body: { type: string }
        owner: { type: string }
        expires_at: { type: [string, 'null'], format: date-time }
        source: { type: string }
        captured_by: { type: string }

    DraftingAssetUpdate:
      type: object
      description: Partial update — only the fields present in the body are changed; pass If-Match for optimistic concurrency.
      properties:
        kind: { type: string }
        title: { type: string }
        body: { type: string }
        owner: { type: string }
        expires_at: { type: [string, 'null'], format: date-time }

    DraftingAssetListResponse:
      type: object
      required: [data, page]
      properties:
        data: { type: array, items: { $ref: '#/components/schemas/DraftingAsset' } }
        page: { $ref: '#/components/schemas/PageInfo' }

    # ---- Invoice ----
    Invoice:
      type: object
      description: An invoice derived from an accepted offer. Money fields are integer minor-units — no float money.
      required: [id, workspace_id, offer_id, invoice_number, status, currency, net_minor, tax_minor, gross_minor, source, captured_by, version, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        workspace_id: { type: string, format: uuid }
        offer_id: { type: string, format: uuid, description: The offer this invoice was derived from. }
        invoice_number: { type: string, description: Human-readable invoice identifier; unique per workspace. }
        status: { type: string, enum: [draft, issued], description: draft on creation; issued after the invoice is sent. }
        currency: { type: string, pattern: '^[A-Z]{3}$', description: ISO-4217 uppercase (e.g. EUR, USD). Copied from the source offer. }
        net_minor: { type: integer, format: int64, description: 'Net amount in smallest currency unit (e.g. cents). Copied from offer — never free-typed.' }
        tax_minor: { type: integer, format: int64, description: 'Tax amount in smallest currency unit. Copied from offer — never free-typed.' }
        gross_minor: { type: integer, format: int64, description: 'Gross amount (net + tax) in smallest currency unit. Copied from offer — never free-typed.' }
        issued_at: { type: [string, 'null'], format: date-time, description: Set when status transitions to issued. }
        source: { type: string }
        captured_by: { type: string }
        version: { type: integer, format: int64, description: Monotonic row version for optimistic concurrency. }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    GenerateInvoiceRequest:
      type: object
      description: |
        Request to generate an invoice from an accepted offer.
        net/tax/gross totals are derived from the offer — do NOT pass money fields here.
      required: [offer_id, invoice_number, source, captured_by]
      properties:
        offer_id: { type: string, format: uuid, description: The accepted offer to derive totals from. }
        invoice_number: { type: string, description: Human-readable invoice identifier; must be unique per workspace. }
        source: { type: string }
        captured_by: { type: string }

    InvoiceListResponse:
      type: object
      required: [data, page]
      properties:
        data: { type: array, items: { $ref: '#/components/schemas/Invoice' } }
        page: { $ref: '#/components/schemas/PageInfo' }

    # ---- List / Tag ----
    List:
      type: object
      description: A static membership set or a dynamic segment. Mirrors the `list` table.
      required: [id, workspace_id, name, entity_type, list_type]
      properties:
        id: { type: string, format: uuid }
        workspace_id: { type: string, format: uuid }
        name: { type: string }
        entity_type: { type: string, enum: [person, organization, deal, lead] }
        list_type: { type: string, enum: [static, dynamic], default: static }
        definition: { type: [object, 'null'], additionalProperties: true, description: Dynamic — validated query plan; static — null. }
        owner_id: { type: [string, 'null'], format: uuid }
        team_id: { type: [string, 'null'], format: uuid }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        archived_at: { type: [string, 'null'], format: date-time }

    CreateListRequest:
      type: object
      required: [name, entity_type]
      properties:
        name: { type: string }
        entity_type: { type: string, enum: [person, organization, deal, lead] }
        list_type: { type: string, enum: [static, dynamic], default: static }
        definition: { type: [object, 'null'], additionalProperties: true }
        owner_id: { type: [string, 'null'], format: uuid }
        team_id: { type: [string, 'null'], format: uuid }

    ListMember:
      type: object
      required: [id, list_id, entity_type, entity_id]
      properties:
        id: { type: string, format: uuid }
        list_id: { type: string, format: uuid }
        entity_type: { type: string, enum: [person, organization, deal, lead] }
        entity_id: { type: string, format: uuid }
        added_by: { type: string }
        created_at: { type: string, format: date-time }

    AddListMemberRequest:
      type: object
      required: [entity_type, entity_id]
      properties:
        entity_type: { type: string, enum: [person, organization, deal, lead] }
        entity_id: { type: string, format: uuid }

    ListListResponse:
      type: object
      required: [data, page]
      properties:
        data: { type: array, items: { $ref: '#/components/schemas/List' } }
        page: { $ref: '#/components/schemas/PageInfo' }

    ListMemberListResponse:
      type: object
      required: [data, page]
      properties:
        data: { type: array, items: { $ref: '#/components/schemas/ListMember' } }
        page: { $ref: '#/components/schemas/PageInfo' }

    Tag:
      type: object
      description: A tag. Mirrors the `tag` table.
      required: [id, workspace_id, name]
      properties:
        id: { type: string, format: uuid }
        workspace_id: { type: string, format: uuid }
        name: { type: string }
        color: { type: [string, 'null'] }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        archived_at: { type: [string, 'null'], format: date-time }

    CreateTagRequest:
      type: object
      required: [name]
      properties:
        name: { type: string }
        color: { type: [string, 'null'] }

    Taggable:
      type: object
      required: [id, tag_id, entity_type, entity_id]
      properties:
        id: { type: string, format: uuid }
        tag_id: { type: string, format: uuid }
        entity_type: { type: string, enum: [person, organization, deal, lead] }
        entity_id: { type: string, format: uuid }
        created_at: { type: string, format: date-time }

    ApplyTagRequest:
      type: object
      required: [entity_type, entity_id]
      properties:
        entity_type: { type: string, enum: [person, organization, deal, lead] }
        entity_id: { type: string, format: uuid }

    TagListResponse:
      type: object
      required: [data, page]
      properties:
        data: { type: array, items: { $ref: '#/components/schemas/Tag' } }
        page: { $ref: '#/components/schemas/PageInfo' }

    # ---- Identity (User / Team / Role) ----
    User:
      type: object
      description: A seat — human or first-party agent. Mirrors `app_user`.
      required: [id, workspace_id, email, display_name, status, is_agent]
      properties:
        id: { type: string, format: uuid }
        workspace_id: { type: string, format: uuid }
        email: { type: string, format: email }
        display_name: { type: string }
        timezone: { type: string, default: UTC, description: IANA name. }
        status: { type: string, enum: [active, suspended, deactivated], default: active }
        is_agent: { type: boolean, default: false, description: First-party Agent Runner identity vs a human seat. }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        archived_at: { type: [string, 'null'], format: date-time }

    Team:
      type: object
      description: Mirrors the `team` table.
      required: [id, workspace_id, name]
      properties:
        id: { type: string, format: uuid }
        workspace_id: { type: string, format: uuid }
        name: { type: string }
        parent_team_id: { type: [string, 'null'], format: uuid }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        archived_at: { type: [string, 'null'], format: date-time }

    Role:
      type: object
      description: An RBAC role bundle. Mirrors the `role` table.
      required: [id, workspace_id, key, name, is_system, permissions]
      properties:
        id: { type: string, format: uuid }
        workspace_id: { type: string, format: uuid }
        key: { type: string, description: 'admin | manager | rep | read_only | ops | <code-defined>.' }
        name: { type: string }
        is_system: { type: boolean, default: false }
        permissions:
          type: object
          additionalProperties: true
          description: '{ object: {crud}, field_masks: [...], row_scope: own|team|all }.'
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        archived_at: { type: [string, 'null'], format: date-time }

    Member:
      type: object
      required: [user_id, email, display_name, status, is_agent, roles]
      properties:
        user_id: { type: string, format: uuid }
        email: { type: string, format: email }
        display_name: { type: string }
        status: { type: string, enum: [active, suspended, deactivated] }
        is_agent: { type: boolean }
        roles:
          type: array
          items: { type: string }
          description: 'Assigned role keys (admin | manager | rep | read_only | ops | <code-defined>).'
    MemberListResponse:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items: { $ref: '#/components/schemas/Member' }
    RoleListResponse:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items: { $ref: '#/components/schemas/Role' }
    AssignRoleRequest:
      type: object
      properties:
        role_key: { type: string, description: 'Role key to assign (admin | manager | rep | read_only | ops). One of role_key / role_id required.' }
        role_id: { type: string, format: uuid, description: 'Role id to assign. One of role_key / role_id required.' }

    MeResponse:
      type: object
      required: [user, roles, teams]
      properties:
        user: { $ref: '#/components/schemas/User' }
        roles:
          type: array
          items: { type: string }
          description: Effective role keys for this principal.
        teams:
          type: array
          items: { type: string, format: uuid }
        passport:
          type: [object, 'null']
          description: Present when the principal is an agent acting under an Agent Seat Passport.
          properties:
            passport_id: { type: string, format: uuid }
            on_behalf_of: { type: string, format: uuid }
            scopes:
              type: array
              items: { type: string, enum: [read_only, draft_only, act_with_approval, auto_execute_low_risk] }

    # ---- Audit ----
    AuditLogEntry:
      type: object
      description: An append-only audit row. Mirrors the `audit_log` table.
      required: [id, workspace_id, actor_type, actor_id, action, entity_type, occurred_at]
      properties:
        id: { type: string, format: uuid }
        workspace_id: { type: string, format: uuid }
        actor_type: { type: string, enum: [human, agent, system, connector] }
        actor_id: { type: string, description: "User uuid, agent id, connector name (e.g. connector:gmail), or 'system'." }
        passport_id: { type: [string, 'null'], format: uuid, description: Agent Seat Passport that authorized an agent action. }
        on_behalf_of: { type: [string, 'null'], format: uuid, description: The human authority for an agent action. }
        action:
          type: string
          # Every mutation is attributable (P12). connector captures audit as actor_type=connector.
          # Kept in lockstep with the audit_log_action_check DDL CHECK (migration 000048);
          # gated by scripts/check-audit-action-coherence.sh in `make check`.
          enum: [create, update, archive, merge, promote, disqualify, restore, export, erase, anonymize, login, assign, advance_stage, send_email, consent_grant, consent_withdraw, approve, reject, record_share, record_unshare, capture, modify, expired, generate, import, publish, parameterize, pause, bulk_set_field, bulk_archive, bulk_reassign, score_override]
        entity_type: { type: string }
        entity_id: { type: [string, 'null'], format: uuid }
        before: { type: [object, 'null'], additionalProperties: true }
        after: { type: [object, 'null'], additionalProperties: true }
        authorization_rule: { type: [string, 'null'], description: Which RBAC/scope rule allowed it. }
        evidence: { type: [object, 'null'], additionalProperties: true, description: e.g. which inbound email/meeting triggered a promotion. }
        occurred_at: { type: string, format: date-time }

    AuditHistoryEntry:
      type: object
      description: |
        One rendered history line for a record mutation. `before` and `after` are
        field-masked to the viewer's readable fields — absent keys were hidden, not null.
      required: [id, actor_type, actor_id, action, occurred_at, summary]
      properties:
        id: { type: string, format: uuid }
        actor_type: { type: string, enum: [human, agent, system, connector] }
        actor_id: { type: string }
        on_behalf_of: { type: [string, 'null'], format: uuid, description: "Granting human's user UUID for agent actions." }
        on_behalf_of_name: { type: [string, 'null'], description: "Resolved display_name for on_behalf_of." }
        action: { type: string }
        occurred_at: { type: string, format: date-time }
        authorization_rule: { type: [string, 'null'] }
        before: { type: [object, 'null'], additionalProperties: true, description: "Masked to viewer-readable fields." }
        after: { type: [object, 'null'], additionalProperties: true, description: "Masked to viewer-readable fields." }
        summary: { type: string, description: "Server-composed plain-language line, e.g. 'Devin changed Stage from Discovery to Proposal'." }

    AuditHistoryResponse:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items: { $ref: '#/components/schemas/AuditHistoryEntry' }

    # ---- Reports ----
    RunReportRequest:
      type: object
      description: |
        A typed, validated query plan (not free-form SQL). For prebuilt reports, filters
        parameterize the plan; for ad-hoc, the object/group_by/aggregates compile to a plan.
        **Field vocabulary:** every key in `filters`, every entry in `group_by`, and every
        `aggregates[].field` MUST be a field in the target report's declared vocabulary
        (the per-report allowed dimension/measure list in data-model.md §13 / contract README).
        An out-of-vocabulary field returns `422 code: report_field_not_allowed`. `additionalProperties`
        is open only to admit *values*, never to admit arbitrary SQL identifiers.
        **`/reports/{report}` path param:** a value matching the UUID format resolves to a saved
        report; any other value resolves against the prebuilt-report key catalog (README "Prebuilt
        reports"). A prebuilt key is never a UUID, so there is no collision.
      properties:
        filters:
          type: object
          additionalProperties: true
          description: Typed predicates (period, status, owner, ...) — keys must be in the report vocabulary.
        group_by:
          type: array
          items: { type: string }
        aggregates:
          type: array
          items:
            type: object
            required: [fn]
            properties:
              fn: { type: string, enum: [count, count_distinct, sum, avg, min, max] }
              field: { type: [string, 'null'] }
              as: { type: [string, 'null'] }
        as_of_date: { type: [string, 'null'], format: date, description: Snapshot / historical reporting via deal_stage_history. }

    ReportResult:
      type: object
      required: [report, plan, columns, rows]
      properties:
        report: { type: string }
        plan:
          type: object
          additionalProperties: true
          description: The validated query plan that was executed (shown before/after run).
        columns:
          type: array
          items: { type: string }
        rows:
          type: array
          items: { type: object, additionalProperties: true }
        total_rows: { type: integer }
        generated_at: { type: string, format: date-time }
        derivation_url:
          type: [string, 'null']
          description: Handle for "Explain This Number" drill-through to source rows.

    DerivationResult:
      type: object
      required: [definition, rows]
      properties:
        definition:
          type: string
          description: Plain-language explanation of the filter/group/aggregate this number came from.
        rows:
          type: array
          items: { type: object, additionalProperties: true }
          description: The exact underlying source rows; summing their relevant field reproduces the aggregate.

    # ---- Search ----
    SearchResult:
      type: object
      required: [type, id]
      properties:
        type: { type: string, enum: [person, organization, deal, activity, lead] }
        id: { type: string, format: uuid }
        title: { type: [string, 'null'], description: Display label (name/subject). }
        snippet: { type: [string, 'null'] }
        score: { type: [number, 'null'], description: Relevance score. }

    SearchResponse:
      type: object
      required: [data, page]
      properties:
        data: { type: array, items: { $ref: '#/components/schemas/SearchResult' } }
        page: { $ref: '#/components/schemas/PageInfo' }

    # ---- AI: cold-start ----
    ColdStartRequest:
      type: object
      required: [url]
      properties:
        url: { type: string, format: uri, description: Company website URL to read back. }

    ColdStartField:
      type: object
      description: One read-back field. EVERY field carries non-empty evidence + confidence, or it is omitted (no-guess gate).
      required: [field, value, evidence_snippet, source_url, confidence]
      properties:
        field: { type: string, enum: [icp, buying_center, value_proposition, usp, buying_intents, legal_name, registered_address, register_vat, industry, history] }
        value: { type: string }
        evidence_snippet: { type: string, minLength: 1, description: Verbatim source text — non-empty or the field is absent. }
        source_url: { type: string, format: uri }
        confidence: { type: number, minimum: 0, maximum: 1 }

    ColdStartProposal:
      type: object
      description: A staged proposal. NOTHING is written to real records until accepted via /approvals.
      required: [proposal_id, source_url, status, fields]
      properties:
        proposal_id: { type: string, format: uuid }
        source_url: { type: string, format: uri }
        status: { type: string, enum: [staged], description: Always staged — accept via the approval inbox. }
        fields:
          type: array
          items: { $ref: '#/components/schemas/ColdStartField' }
        created_at: { type: string, format: date-time }

    # ---- Approvals ----
    Approval:
      type: object
      description: A staged 🟡 confirm-first action awaiting human decision.
      required: [id, workspace_id, kind, status, proposed_by, created_at]
      properties:
        id: { type: string, format: uuid }
        workspace_id: { type: string, format: uuid }
        kind: { type: string, description: 'coldstart | send_email | advance_deal | promote_lead | overnight | transcript_proposal.' }
        status: { type: string, enum: [pending, approved, rejected, expired] }
        proposal_id: { type: [string, 'null'], format: uuid, description: 'For kind=coldstart, the ColdStartProposal this approval accepts (links the staged proposal to its approval item).' }
        proposed_by: { type: string, description: 'agent:<id> / connector:<n> that staged this.' }
        on_behalf_of: { type: [string, 'null'], format: uuid }
        expires_at: { type: [string, 'null'], format: date-time, description: 'When the staged action expires unactioned (mirrors approval.requested.expires_at). After this it auto-transitions to status=expired and cannot be approved.' }
        target_entity_type: { type: [string, 'null'], description: Entity the effect mutates (for precondition re-validation). }
        target_entity_id: { type: [string, 'null'], format: uuid }
        target_version: { type: [integer, 'null'], description: 'The `version` of the target row when the diff was staged. On approve-execute the server RE-READS the row; if its current version ≠ target_version the execution is rejected with 409 ErrVersionSkew (the world changed since the human last saw the diff — re-stage). This closes the stage→approval race (ADR-0036).' }
        diff_hash: { type: [string, 'null'], description: 'Hash of the staged proposed_change; the minted approval_token is bound to this hash so a token cannot authorize a different effect.' }
        summary: { type: [string, 'null'], description: One-line description of the proposed change. }
        proposed_change:
          type: object
          additionalProperties: true
          description: The staged diff/payload that will execute on approve.
        evidence:
          type: array
          description: Per-claim evidence (snippet + source id) backing the proposal.
          items:
            type: object
            properties:
              evidence_snippet: { type: string }
              source_type: { type: [string, 'null'], enum: [activity, deal, signal, relationship, page, null] }
              source_id: { type: [string, 'null'], format: uuid }
        confidence: { type: [number, 'null'], minimum: 0, maximum: 1 }
        result_entity_type: { type: [string, 'null'] }
        result_entity_id: { type: [string, 'null'], format: uuid }
        approval_token: { type: [string, 'null'], description: 'Signed single-use token minted on approve (schema ApprovalToken, serialized as compact JWS); authorizes exactly the downstream 🟡 operation it is bound to.' }
        decided_by: { type: [string, 'null'], format: uuid }
        decided_at: { type: [string, 'null'], format: date-time }
        created_at: { type: string, format: date-time }

    ApproveRequest:
      type: object
      description: |
        Approve a staged 🟡 action. **Who may approve:** the principal must hold the RBAC required
        to perform the action on the target (≥ the on_behalf_of human's authority for that effect);
        a lower-privilege user cannot approve an action they could not themselves perform. **Edit
        path:** if `edited_payload` is supplied, the edited effect RE-ENTERS the admission gate from
        scratch (re-tiered, re-RBAC-checked, new diff_hash) before a token is minted — an edit can
        never escalate a 🟢 staged note into an external send without re-gating (ADR-0036).
      properties:
        edited_payload:
          type: object
          additionalProperties: true
          description: Optional edits — the edited payload is re-admitted, then it executes (edit-then-send).

    ApprovalListResponse:
      type: object
      required: [data, page]
      properties:
        data: { type: array, items: { $ref: '#/components/schemas/Approval' } }
        page: { $ref: '#/components/schemas/PageInfo' }

    # ---- Optimistic concurrency ----
    RowVersion:
      type: integer
      format: int64
      readOnly: true
      minimum: 1
      description: |
        Monotonic row version, incremented by the server on every mutation (data-model §1.7).
        Echoed back as the `version` field on every mutable entity. To make a write conditional,
        send the last-seen value in `If-Match`; a mismatch returns `409 code: version_skew`
        (ErrVersionSkew) so the client re-reads before retrying. Applies to the native path,
        not only overlay mode.

    # ---- Approval token (ADR-0036) ----
    ApprovalToken:
      type: object
      description: |
        The claims carried by the signed `X-Approval-Token` (serialized as a compact JWS; the wire
        value is the string). It is single-use and bound to one effect — it is NOT a bare opaque
        string. The server verifies the signature, that `jti` has not been consumed, that `exp` is
        in the future, and that `workspace_id`/`passport_id`/`tool`/`diff_hash` match the operation
        being executed; any mismatch → `403 code: approval_token_invalid`.
      required: [jti, approval_id, workspace_id, tool, diff_hash, exp, single_use]
      properties:
        jti: { type: string, description: Unique token id; recorded as consumed on first use (replay → 403). }
        approval_id: { type: string, format: uuid, description: The Approval this token authorizes. }
        workspace_id: { type: string, format: uuid }
        passport_id: { type: [string, 'null'], format: uuid, description: Agent Seat Passport the token was minted for; null for a human-minted token. }
        on_behalf_of: { type: [string, 'null'], format: uuid }
        tool: { type: string, description: 'The exact 🟡 operation authorized (e.g. send_email, advance_deal). A token for one tool cannot authorize another.' }
        diff_hash: { type: string, description: Hash of the approved effect; binds the token to that specific staged change. }
        target_version: { type: [integer, 'null'], description: Row version the diff was staged against; re-checked at execute (see Approval.target_version). }
        exp: { type: string, format: date-time, description: Expiry (short TTL — minutes, not hours). }
        single_use: { type: boolean, default: true }

    # ---- Partner (A41/ADR-0032) ----
    Partner:
      type: object
      description: |
        First-class partner state as a 1:1 extension of an organization (an org IS a partner iff it
        has a `partner` row + classification='partner'). Company identity is never duplicated.
      required: [organization_id, partner_role, cert_status, created_at, updated_at]
      properties:
        organization_id: { type: string, format: uuid, description: The org this partner record extends (PK = FK). }
        partner_role: { type: string, enum: [hosting, consulting, strategic], description: Functional role (A44/ADR-0034); implementation + dev are Gradion's turf. }
        cert_status: { type: string, enum: [prospect, in_certification, certified, suspended, churned] }
        margin_tier: { type: [string, 'null'], description: Scenario-C margin tier (business/14-partner-program.md). }
        gate_metrics: { type: [object, 'null'], additionalProperties: true, description: Program gate metrics (certified seats, CSAT, ...). }
        version: { $ref: '#/components/schemas/RowVersion' }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        archived_at: { type: [string, 'null'], format: date-time }

    UpsertPartnerRequest:
      type: object
      required: [partner_role]
      properties:
        partner_role: { type: string, enum: [hosting, consulting, strategic] }
        cert_status: { type: string, enum: [prospect, in_certification, certified, suspended, churned] }
        margin_tier: { type: [string, 'null'] }
        gate_metrics: { type: [object, 'null'], additionalProperties: true }

    # ---- Per-purpose consent (A22/ADR-0011) ----
    ConsentPurpose:
      type: object
      required: [id, workspace_id, key, label, created_at]
      properties:
        id: { type: string, format: uuid }
        workspace_id: { type: string, format: uuid }
        key: { type: string, description: 'Stable machine key (e.g. transactional, marketing_email, profiling). Referenced by send_email.consent_purpose.' }
        label: { type: string }
        requires_double_opt_in: { type: boolean, default: false, description: 'When true, a grant is only effective after a confirmed DOI event (German email norm).' }
        legal_basis: { type: [string, 'null'], enum: [null, consent, contract, legitimate_interest], description: GDPR Art. 6 basis. }
        created_at: { type: string, format: date-time }

    CreateConsentPurposeRequest:
      type: object
      required: [key, label]
      properties:
        key: { type: string }
        label: { type: string }
        requires_double_opt_in: { type: boolean, default: false }
        legal_basis: { type: [string, 'null'], enum: [null, consent, contract, legitimate_interest] }

    PersonConsentState:
      type: object
      description: A person's current consent for one purpose.
      required: [purpose_id, state]
      properties:
        purpose_id: { type: string, format: uuid }
        purpose_key: { type: [string, 'null'] }
        state: { type: string, enum: [unknown, granted, withdrawn] }
        basis: { type: [string, 'null'] }
        double_opt_in_confirmed_at: { type: [string, 'null'], format: date-time }
        updated_at: { type: [string, 'null'], format: date-time }

    ConsentEvent:
      type: object
      description: An append-only proof row (Art. 7 demonstrability). Never updated or deleted.
      required: [id, purpose_id, new_state, occurred_at]
      properties:
        id: { type: string, format: uuid }
        purpose_id: { type: string, format: uuid }
        new_state: { type: string, enum: [granted, withdrawn], description: Proof rows record only transitions to granted/withdrawn (never to unknown). }
        basis: { type: [string, 'null'] }
        source: { type: [string, 'null'], description: 'How consent was captured (e.g. webform, import, double_opt_in).' }
        actor_type: { type: string, enum: [human, agent, system, connector] }
        actor_id: { type: [string, 'null'] }
        occurred_at: { type: string, format: date-time }

    RecordConsentRequest:
      type: object
      required: [purpose_id, new_state]
      properties:
        purpose_id: { type: string, format: uuid }
        new_state: { type: string, enum: [granted, withdrawn] }
        basis: { type: [string, 'null'] }
        source: { type: [string, 'null'] }
        double_opt_in_token: { type: [string, 'null'], description: Required to make a grant effective when the purpose has requires_double_opt_in=true. }

    RecordGrant:
      type: object
      description: A manual per-record share (A52/ADR-0039) — widens own/team/all base scope for one record.
      required: [id, record_type, record_id, subject_type, subject_id, access, granted_by, created_at]
      properties:
        id: { type: string, format: uuid }
        record_type: { type: string, enum: [deal, person, organization, lead] }
        record_id: { type: string, format: uuid }
        subject_type: { type: string, enum: [user, team] }
        subject_id: { type: string, format: uuid, description: 'app_user(id) or team(id) per subject_type.' }
        access: { type: string, enum: [read, write], description: "'write' also satisfies 'read'." }
        granted_by: { type: string, format: uuid }
        reason: { type: [string, 'null'], description: 'Accountability/lawful-basis note surfaced in the audit row.' }
        expires_at: { type: [string, 'null'], format: date-time, description: 'Optional TTL; an expired grant matches no rows.' }
        created_at: { type: string, format: date-time }
        version: { type: integer, format: int64 }

    ExportRun:
      type: object
      required: [id, workspace_id, status, created_by, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        workspace_id: { type: string, format: uuid }
        status:
          type: string
          enum: [pending, running, complete, failed]
        artifact_ref: { type: string, nullable: true }
        manifest_ref: { type: string, nullable: true }
        created_by: { type: string, format: uuid }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    CreateImportRequest:
      type: object
      required: [source_ref, mapping]
      properties:
        source_ref:
          type: string
          description: Blobstore ref to the source payload.
        mapping:
          type: object
          required: [object_kind, columns]
          properties:
            object_kind:
              type: string
              enum: [person, organization, lead]
            columns:
              type: object
              additionalProperties:
                type: string
              description: Map of source column name → core object field name.
        source_rows:
          type: array
          description: 'In-memory/seeded source rows for the generic engine. Each row must have source_system, source_id, kind, and a fields map.'
          items:
            type: object
            required: [source_system, source_id, kind, fields]
            properties:
              source_system: { type: string }
              source_id: { type: string }
              kind: { type: string, enum: [person, organization, lead] }
              fields:
                type: object
                additionalProperties: true

    ImportRun:
      type: object
      required: [id, workspace_id, status, source_ref, mapping, checkpoint, created_by, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        workspace_id: { type: string, format: uuid }
        status:
          type: string
          enum: [pending, validating, awaiting_approval, running, complete, failed]
        mapping:
          type: object
          required: [object_kind, columns]
          properties:
            object_kind:
              type: string
              enum: [person, organization, lead]
            columns:
              type: object
              additionalProperties:
                type: string
        source_ref: { type: string }
        report_ref: { type: string, nullable: true }
        checkpoint: { type: integer }
        created_by: { type: string, format: uuid }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    CreateRecordGrantRequest:
      type: object
      required: [record_type, record_id, subject_type, subject_id, access]
      properties:
        record_type: { type: string, enum: [deal, person, organization, lead] }
        record_id: { type: string, format: uuid }
        subject_type: { type: string, enum: [user, team] }
        subject_id: { type: string, format: uuid }
        access: { type: string, enum: [read, write] }
        reason: { type: [string, 'null'] }
        expires_at: { type: [string, 'null'], format: date-time }

    DealRoom:
      type: object
      description: A deal-linked shared space with consent state and first-party engagement tracking (B-E08.5/B-E08.6).
      required: [id, workspace_id, deal_id, consent_state, access_token, source, captured_by, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        workspace_id: { type: string, format: uuid }
        deal_id: { type: string, format: uuid }
        consent_state: { type: string, enum: [pending, granted, revoked], description: 'Disclosed-consent state. Publish requires granted.' }
        access_token: { type: string, description: Opaque token used by external recipients to access the room. }
        published_at: { type: [string, 'null'], format: date-time, description: 'Set when the room is published. NULL means unpublished.' }
        source: { type: string }
        captured_by: { type: string }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    ConversationLink:
      type: object
      required: [id, workspace_id, entity_type, entity_id, conversation_system, conversation_id, source, captured_by, created_at, updated_at]
      properties:
        id:                  { type: string, format: uuid }
        workspace_id:        { type: string, format: uuid }
        entity_type:         { type: string, enum: [person, organization, deal, lead] }
        entity_id:           { type: string, format: uuid }
        conversation_system: { type: string, enum: [dispact, slack, teams] }
        conversation_id:     { type: string }
        source:              { type: string }
        captured_by:         { type: string }
        created_at:          { type: string, format: date-time }
        updated_at:          { type: string, format: date-time }

    CreateConversationLinkRequest:
      type: object
      required: [entity_type, entity_id, conversation_system, conversation_id, source, captured_by]
      properties:
        entity_type:         { type: string, enum: [person, organization, deal, lead] }
        entity_id:           { type: string, format: uuid }
        conversation_system: { type: string, enum: [dispact, slack, teams] }
        conversation_id:     { type: string }
        source:              { type: string }
        captured_by:         { type: string }

    InferredNextStep:
      type: object
      required: [inferred]
      properties:
        inferred: { type: boolean }
        suggestion: { type: string }
        evidence_snippet: { type: string, description: Verbatim line/text the step was read from. }
        evidence_source_id: { type: string, format: uuid, description: The source activity id. }
        due_date: { type: string, format: date-time, nullable: true }
        owner: { type: string, format: uuid, nullable: true }
    AcceptNextStepRequest:
      type: object
      required: [evidence_source_id]
      properties:
        evidence_source_id: { type: string, format: uuid }
        suggestion: { type: string }
        owner: { type: string, format: uuid, nullable: true }
        due_date: { type: string, format: date-time, nullable: true }
        edited: { type: boolean, description: True when the user edited owner/due/text; flips provenance to human. }

    DealKPISignals:
      type: object
      required: [signals]
      properties:
        signals:
          type: array
          items: { $ref: '#/components/schemas/KPISignal' }

    KPISignal:
      type: object
      required: [key, value, evidence_snippet, evidence_source_id, confidence]
      properties:
        key:
          type: string
          description: One of close_likelihood | service_line | expected_volume | timing.
        value:
          type: string
          description: The inferred or human-corrected value for this KPI.
        evidence_snippet:
          type: string
          description: Verbatim text the value was read from (always non-empty for a returned signal).
        evidence_source_id:
          type: string
          format: uuid
          description: The source activity id the snippet came from.
        confidence:
          type: string
          description: One of high | medium | low.
        overridden:
          type: boolean
          description: True when the value is a human correction (verdict=corrected in ai_feedback), not AI-inferred.

    KPIOverrideRequest:
      type: object
      required: [corrected_value]
      properties:
        corrected_value:
          type: string
          description: The human-provided replacement value for this KPI.
        note:
          type: string
          nullable: true
          description: Optional free-text note explaining the correction.

    KPIOverrideResponse:
      type: object
      required: [id, claim_key, verdict, corrected_value, created_by]
      properties:
        id:
          type: string
          format: uuid
        claim_key:
          type: string
        verdict:
          type: string
        corrected_value:
          type: string
          nullable: true
        note:
          type: string
          nullable: true
        created_by:
          type: string
          format: uuid
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    # ------------------------------ Automation ---------------------------------
    Automation:
      type: object
      description: A workspace automation rule (closed trigger × action catalog pair). ADR-0035.
      required: [id, workspace_id, name, origin, trigger, action, enabled, tier, version, created_at, updated_at]
      properties:
        id:            { type: string, format: uuid }
        workspace_id:  { type: string, format: uuid }
        name:          { type: string }
        origin:        { type: string, enum: [catalog, agent_authored] }
        trigger:       { type: object, description: "Closed catalog trigger jsonb — must carry trigger_type from the catalog set." }
        action:        { type: object, description: "Closed catalog action jsonb — must carry action_type from the catalog set." }
        owner_id:      { type: string, format: uuid, nullable: true }
        enabled:       { type: boolean }
        tier:          { type: string, enum: [green, yellow], description: "Registry-derived tier — never trusted from the client." }
        version:       { $ref: '#/components/schemas/RowVersion' }
        created_at:    { type: string, format: date-time }
        updated_at:    { type: string, format: date-time }
        archived_at:   { type: string, format: date-time, nullable: true }
        last_run_at:   { type: string, format: date-time, nullable: true, description: "Most recent automation_run.ran_at for this automation, or null if it has never fired." }

    CreateAutomationRequest:
      type: object
      description: Create a new automation. `trigger` and `action` are validated against the closed catalog — a missing/mistyped bounded param returns 422. `tier` is derived from the catalog; any client-supplied value is ignored.
      required: [name, origin, trigger, action]
      properties:
        name:     { type: string }
        origin:   { type: string, enum: [catalog, agent_authored] }
        trigger:  { type: object, description: "Catalog trigger jsonb." }
        action:   { type: object, description: "Catalog action jsonb." }
        owner_id: { type: string, format: uuid, nullable: true }
        enabled:  { type: boolean, default: true }
        tier:     { type: string, enum: [green, yellow], description: "Ignored — catalog-derived. Accepted to avoid breaking callers." }

    PatchAutomationRequest:
      type: object
      description: Parameterize (edit trigger/action) or pause (enabled=false) an automation. All fields optional — supply only what to change.
      properties:
        trigger:  { type: object, description: "New catalog trigger jsonb — validated on write." }
        action:   { type: object, description: "New catalog action jsonb — validated on write." }
        enabled:  { type: boolean, description: "Set false to pause, true to re-enable." }

    AutomationListResponse:
      type: object
      required: [data]
      properties:
        data: { type: array, items: { $ref: '#/components/schemas/Automation' } }

    # ------------------------------ People Signals (B-E05.5) -----------------
    DealPeopleSignals:
      type: object
      required: [people]
      properties:
        people:
          type: array
          items: { $ref: '#/components/schemas/PersonSignalItem' }

    PersonSignalItem:
      type: object
      required: [person_id, label, contact_ids, activity_ids]
      properties:
        person_id:
          type: string
          format: uuid
          description: The person's id.
        label:
          type: string
          enum: [warm, neutral, blocking]
          description: The derived or human-corrected relationship label.
        contact_ids:
          type: array
          items: { type: string, format: uuid }
          description: >
            Relationship edge source ids that justify the label (non-empty for warm/blocking;
            empty for neutral — no fabricated evidence).
        activity_ids:
          type: array
          items: { type: string, format: uuid }
          description: >
            Activity ids linked to this person that support the label (non-empty for warm/blocking
            when activity evidence exists; empty for neutral or no-activity evidence).
        corrected:
          type: boolean
          description: True when the label is a human correction rather than a derived one.

    PersonSignalCorrectRequest:
      type: object
      required: [corrected_value]
      properties:
        corrected_value:
          type: string
          enum: [warm, neutral, blocking]
          description: The human-provided replacement label for this person's signal.
        note:
          type: string
          nullable: true
          description: Optional free-text note explaining the correction.

    PersonSignalCorrectResponse:
      type: object
      required: [id, claim_key, verdict, corrected_value]
      properties:
        id:
          type: string
          format: uuid
        claim_key:
          type: string
        verdict:
          type: string
        corrected_value:
          type: string
          nullable: true
        note:
          type: string
          nullable: true
        created_by:
          type: string
          format: uuid
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
