sonar.projectKey=gradionhq_margince-poc-1
sonar.organization=gradion

# Generated code is not authored and its internal repetition is a codegen
# artifact, not a quality signal -- excluded from analysis entirely,
# matching the existing convention already used to exclude generated files
# from other gates (scripts/check-go-file-length.sh's *_gen.go/.gen.go glob).
sonar.exclusions=**/*_gen.go,**/*.gen.go

# Test-helper duplication across internal/modules/*/{adapters,transport} is a
# deliberate, pre-existing, documented convention (see any module's own
# helpers_shared_test.go doc comment): each Go package duplicates a small set
# of test-only helpers (uniq/openTestDB/setRLS/seedWorkspace) because a
# _test.go file's unexported symbols cannot cross a package boundary without
# becoming a real importable (non-test) cross-module dependency, which the
# module-split intentionally avoids to keep each entity module
# self-contained.
sonar.cpd.exclusions=**/*_test.go,**/transport/handler_http.go
