# SonarQube Cloud (sonarcloud.io) project configuration.
sonar.projectKey=gradionhq_margince-poc-1
sonar.organization=gradionhq

# Exclude noisy / low-value / generated paths from analysis. Mirrors the ignore
# rules in .coderabbit.yaml (path_filters) so both tools skip the same files,
# plus vendored / installed / build output that should never be scanned.
sonar.exclusions=\
  **/*.md,\
  **/*.mdx,\
  docs/**,\
  workspace/manual-test/**,\
  **/*.lock,\
  pnpm-lock.yaml,\
  vendor/**,\
  node_modules/**,\
  bin/**,\
  **/testdata/**

# Test sources are still analyzed. Add sonar.test.exclusions /
# sonar.coverage.exclusions here if you want to tune that later.
